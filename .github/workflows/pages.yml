name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare static site
        run: |
          mkdir -p _site/src/clearscan_cv/static
          cp index.html _site/index.html
          cp src/clearscan_cv/static/index.html _site/src/clearscan_cv/static/index.html
          cp src/clearscan_cv/static/manifest.webmanifest _site/src/clearscan_cv/static/manifest.webmanifest
          cp src/clearscan_cv/static/sw.js _site/src/clearscan_cv/static/sw.js
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
