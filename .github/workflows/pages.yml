name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static site
        run: |
          mkdir -p _site/src/clearscan_cv/static
          cp index.html _site/index.html
          cp src/clearscan_cv/static/index.html _site/src/clearscan_cv/static/index.html
          cp src/clearscan_cv/static/manifest.webmanifest _site/src/clearscan_cv/static/manifest.webmanifest
          cp src/clearscan_cv/static/sw.js _site/src/clearscan_cv/static/sw.js
          touch _site/.nojekyll
      - name: Publish to gh-pages
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy GitHub Pages"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
