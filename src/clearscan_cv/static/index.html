      function xmlEscape(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function docxParagraphXml(text, style = "") {
        const styleXml = style ? `<w:pPr><w:pStyle w:val="${style}"/></w:pPr>` : "";
        return `<w:p>${styleXml}<w:r><w:t xml:space="preserve">${xmlEscape(text)}</w:t></w:r></w:p>`;
      }

      function docxParagraphsFromMarkdown(markdown, title) {
        const paragraphs = [docxParagraphXml(title, "Title")];
        const blocks = String(markdown || "")
          .trim()
          .split(/\n\s*\n/g)
          .map((block) => block.trim())
          .filter(Boolean);
        blocks.forEach((block) => {
          if (block.startsWith("## ")) {
            paragraphs.push(docxParagraphXml(block.slice(3).trim(), "Heading2"));
          } else if (block.startsWith("# ")) {
            paragraphs.push(docxParagraphXml(block.slice(2).trim(), "Heading2"));
          } else {
            paragraphs.push(docxParagraphXml(block.replace(/\s*\n\s*/g, " ")));
          }
        });
        return paragraphs;
      }

      function docxContentTypesXml() {
        return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
  <Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>
  <Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>
</Types>`;
      }

      function docxRelsXml() {
        return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/>
  <Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/>
</Relationships>`;
      }

      function docxDocumentRelsXml() {
        return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;
      }

      function docxStylesXml() {
        return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/><w:qFormat/><w:rPr><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr></w:style>
  <w:style w:type="paragraph" w:styleId="Title"><w:name w:val="Title"/><w:qFormat/><w:pPr><w:spacing w:after="240"/></w:pPr><w:rPr><w:b/><w:sz w:val="34"/><w:szCs w:val="34"/></w:rPr></w:style>
  <w:style w:type="paragraph" w:styleId="Heading2"><w:name w:val="heading 2"/><w:basedOn w:val="Normal"/><w:qFormat/><w:pPr><w:spacing w:before="180" w:after="80"/></w:pPr><w:rPr><w:b/><w:sz w:val="28"/><w:szCs w:val="28"/></w:rPr></w:style>
</w:styles>`;
      }

      function docxDocumentXml(markdown, title) {
        return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    ${docxParagraphsFromMarkdown(markdown, title).join("")}
    <w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="708" w:footer="708" w:gutter="0"/></w:sectPr>
  </w:body>
</w:document>`;
      }

      function docxCoreXml(title) {
        const now = new Date().toISOString().replace(/\.\d{3}Z$/, "Z");
        return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <dc:title>${xmlEscape(title)}</dc:title>
  <dc:creator>PocketCV PDF</dc:creator>
  <cp:lastModifiedBy>PocketCV PDF</cp:lastModifiedBy>
  <dcterms:created xsi:type="dcterms:W3CDTF">${now}</dcterms:created>
  <dcterms:modified xsi:type="dcterms:W3CDTF">${now}</dcterms:modified>
</cp:coreProperties>`;
      }

      function docxAppXml() {
        return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Properties xmlns="http://schemas.openxmlformats.org/officeDocument/2006/extended-properties" xmlns:vt="http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes">
  <Application>PocketCV PDF</Application><Company>PocketCV PDF</Company>
</Properties>`;
      }

      let crc32Table = null;
      function crc32(bytes) {
        if (!crc32Table) {
          crc32Table = new Uint32Array(256);
          for (let index = 0; index < 256; index += 1) {
            let value = index;
            for (let bit = 0; bit < 8; bit += 1) {
              value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
            }
            crc32Table[index] = value >>> 0;
          }
        }
        let crc = 0xffffffff;
        for (let index = 0; index < bytes.length; index += 1) {
          crc = crc32Table[(crc ^ bytes[index]) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      function dosDateTime(date = new Date()) {
        const time = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
        const dosDate = ((date.getFullYear() - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate();
        return { time, date: dosDate };
      }

      function writeZipHeader(view, offset, signature, fields) {
        view.setUint32(offset, signature, true);
        let cursor = offset + 4;
        fields.forEach((field) => {
          if (field.size === 2) {
            view.setUint16(cursor, field.value, true);
          } else {
            view.setUint32(cursor, field.value, true);
          }
          cursor += field.size;
        });
      }

      function buildZipStore(files) {
        const entries = files.map((file) => ({
          name: textBytes(file.name),
          data: typeof file.content === "string" ? textBytes(file.content) : file.content,
        }));
        const { time, date } = dosDateTime();
        let localOffset = 0;
        const locals = [];
        const centrals = [];
        entries.forEach((entry) => {
          const crc = crc32(entry.data);
          const local = new Uint8Array(30 + entry.name.length + entry.data.length);
          const localView = new DataView(local.buffer);
          writeZipHeader(localView, 0, 0x04034b50, [
            { size: 2, value: 20 },
            { size: 2, value: 0x0800 },
            { size: 2, value: 0 },
            { size: 2, value: time },
            { size: 2, value: date },
            { size: 4, value: crc },
            { size: 4, value: entry.data.length },
            { size: 4, value: entry.data.length },
            { size: 2, value: entry.name.length },
            { size: 2, value: 0 },
          ]);
          local.set(entry.name, 30);
          local.set(entry.data, 30 + entry.name.length);
          locals.push(local);

          const central = new Uint8Array(46 + entry.name.length);
          const centralView = new DataView(central.buffer);
          writeZipHeader(centralView, 0, 0x02014b50, [
            { size: 2, value: 20 },
            { size: 2, value: 20 },
            { size: 2, value: 0x0800 },
            { size: 2, value: 0 },
            { size: 2, value: time },
            { size: 2, value: date },
            { size: 4, value: crc },
            { size: 4, value: entry.data.length },
            { size: 4, value: entry.data.length },
            { size: 2, value: entry.name.length },
            { size: 2, value: 0 },
            { size: 2, value: 0 },
            { size: 2, value: 0 },
            { size: 2, value: 0 },
            { size: 4, value: 0 },
            { size: 4, value: localOffset },
          ]);
          central.set(entry.name, 46);
          centrals.push(central);
          localOffset += local.length;
        });

        const centralOffset = locals.reduce((sum, item) => sum + item.length, 0);
        const centralSize = centrals.reduce((sum, item) => sum + item.length, 0);
        const end = new Uint8Array(22);
        const endView = new DataView(end.buffer);
        writeZipHeader(endView, 0, 0x06054b50, [
          { size: 2, value: 0 },
          { size: 2, value: 0 },
          { size: 2, value: entries.length },
          { size: 2, value: entries.length },
          { size: 4, value: centralSize },
          { size: 4, value: centralOffset },
          { size: 2, value: 0 },
        ]);
        return concatBytes([...locals, ...centrals, end]);
      }

      function buildDocxBytes(markdown, title) {
        return buildZipStore([
          { name: "[Content_Types].xml", content: docxContentTypesXml() },
          { name: "_rels/.rels", content: docxRelsXml() },
          { name: "word/_rels/document.xml.rels", content: docxDocumentRelsXml() },
          { name: "word/document.xml", content: docxDocumentXml(markdown, title) },
          { name: "word/styles.xml", content: docxStylesXml() },
          { name: "docProps/core.xml", content: docxCoreXml(title) },
          { name: "docProps/app.xml", content: docxAppXml() },
        ]);
      }

      function downloadDocxDocument() {
        const content = state.layoutText || state.ocrText;
        if (!content) {
          return;
        }

        const title = sanitizePdfName(filenameInput.value);
        const blob = new Blob([buildDocxBytes(content, title)], {
          type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${title}.docx`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 800);
        setOcrStatus("DOCXを保存しました。");
      }

      function loadImage(blob) {
        if ("createImageBitmap" in window) {
          return createImageBitmap(blob, { imageOrientation: "from-image" }).catch(() => createImageBitmap(blob));
        }

        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(blob);
          const image = new Image();
          image.onload = () => {
            URL.revokeObjectURL(url);
            resolve(image);
          };
          image.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error("画像を読み込めませんでした。"));
          };
          image.src = url;
        });
      }

      function drawImageToCanvas(image) {
        const width = image.width || image.naturalWidth;
        const height = image.height || image.naturalHeight;
        const edgeScale = MAX_SOURCE_IMAGE_EDGE / Math.max(width, height);
        const pixelScale = Math.sqrt(MAX_SOURCE_IMAGE_PIXELS / Math.max(1, width * height));
        const scale = Math.min(1, edgeScale, pixelScale);
        const output = document.createElement("canvas");
        output.width = Math.max(1, Math.round(width * scale));
        output.height = Math.max(1, Math.round(height * scale));
        output.dataset.originalWidth = String(width);
        output.dataset.originalHeight = String(height);
        const context = output.getContext("2d");
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";
        context.drawImage(image, 0, 0, output.width, output.height);
        return output;
      }

      function luminance(r, g, b) {
        return 0.299 * r + 0.587 * g + 0.114 * b;
      }

      function pointDistance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function polygonArea(points) {
        let area = 0;
        for (let i = 0; i < points.length; i += 1) {
          const current = points[i];
          const next = points[(i + 1) % points.length];
          area += current.x * next.y - next.x * current.y;
        }
        return Math.abs(area) / 2;
      }

      function orderQuadPoints(points) {
        const ordered = new Array(4);
        let minSum = Infinity;
        let maxSum = -Infinity;
        let minDiff = Infinity;
        let maxDiff = -Infinity;
        points.forEach((point) => {
          const sum = point.x + point.y;
          const diff = point.x - point.y;
          if (sum < minSum) {
            minSum = sum;
            ordered[0] = point;
          }
          if (diff > maxDiff) {
            maxDiff = diff;
            ordered[1] = point;
          }
          if (sum > maxSum) {
            maxSum = sum;
            ordered[2] = point;
          }
          if (diff < minDiff) {
            minDiff = diff;
            ordered[3] = point;
          }
        });

        if (new Set(ordered).size === 4) {
          return ordered.map((point) => ({ x: point.x, y: point.y }));
        }

        const byY = points.slice().sort((a, b) => a.y - b.y);
        const top = byY.slice(0, 2).sort((a, b) => a.x - b.x);
        const bottom = byY.slice(2).sort((a, b) => a.x - b.x);
        return [
          { x: top[0].x, y: top[0].y },
          { x: top[1].x, y: top[1].y },
          { x: bottom[1].x, y: bottom[1].y },
          { x: bottom[0].x, y: bottom[0].y },
        ];
      }

      function expandQuad(points, width, height, ratio = 0.006) {
        const center = points.reduce((sum, point) => ({ x: sum.x + point.x / points.length, y: sum.y + point.y / points.length }), {
          x: 0,
          y: 0,
        });
        return points.map((point) => ({
          x: clamp(center.x + (point.x - center.x) * (1 + ratio), 0, width - 1),
          y: clamp(center.y + (point.y - center.y) * (1 + ratio), 0, height - 1),
        }));
      }

      function shouldRejectPartialBrightQuad(points, width, height, areaRatio) {
        const minX = Math.min(...points.map((point) => point.x));
        const maxX = Math.max(...points.map((point) => point.x));
        const minY = Math.min(...points.map((point) => point.y));
        const maxY = Math.max(...points.map((point) => point.y));
        const widthCoverage = (maxX - minX) / Math.max(1, width);
        const heightCoverage = (maxY - minY) / Math.max(1, height);
        const missesTop = minY > height * 0.12;
        const missesBottom = maxY < height * 0.86;
        return widthCoverage > 0.76 && heightCoverage < 0.9 && areaRatio < 0.9 && (missesTop || missesBottom);
      }

      function shouldRejectUnsafeFullFrameQuad(points, width, height, areaRatio) {
        const minX = Math.min(...points.map((point) => point.x));
        const maxX = Math.max(...points.map((point) => point.x));
        const maxY = Math.max(...points.map((point) => point.y));
        const topAverage = (points[0].y + points[1].y) / 2;
        const topSkew = Math.abs(points[0].y - points[1].y);
        const touchesLeft = minX <= width * 0.025;
        const touchesRight = maxX >= width * 0.975;
        const touchesBottom = maxY >= height * 0.975;
        const wouldCropTopContent = topAverage > height * 0.16 || topSkew > height * 0.09;
        return areaRatio > 0.62 && touchesLeft && touchesRight && touchesBottom && wouldCropTopContent;
      }

      function validateDetectedQuad(points, width, height) {
        const ordered = orderQuadPoints(points);
        const expanded = expandQuad(ordered, width, height);
        const areaRatio = polygonArea(expanded) / (width * height);
        const topWidth = pointDistance(expanded[0], expanded[1]);
        const bottomWidth = pointDistance(expanded[3], expanded[2]);
        const leftHeight = pointDistance(expanded[0], expanded[3]);
        const rightHeight = pointDistance(expanded[1], expanded[2]);
        const minSide = Math.min(topWidth, bottomWidth, leftHeight, rightHeight);
        if (areaRatio < 0.15 || areaRatio > 0.97 || minSide < Math.min(width, height) * 0.16) {
          return null;
        }
        if (shouldRejectPartialBrightQuad(expanded, width, height, areaRatio)) {
          return null;
        }
        if (shouldRejectUnsafeFullFrameQuad(expanded, width, height, areaRatio)) {
          return null;
        }
        return { corners: expanded, areaRatio };
      }

      function detectConnectedPaperQuad(sourceCanvas, image, step, histogram, samples) {
        const { width, height } = sourceCanvas;
        const data = image.data;
        const paperThreshold = clamp(
          Math.min(otsuThreshold(histogram, samples) - 10, percentileFromHistogram(histogram, samples, 0.2) + 8),
          70,
          150
        );
        const gridWidth = Math.ceil(width / step);
        const gridHeight = Math.ceil(height / step);
        const cellCount = gridWidth * gridHeight;
        const mask = new Uint8Array(cellCount);
        const visited = new Uint8Array(cellCount);

        for (let gy = 0; gy < gridHeight; gy += 1) {
          const y = Math.min(height - 1, gy * step);
          for (let gx = 0; gx < gridWidth; gx += 1) {
            const x = Math.min(width - 1, gx * step);
            const index = (y * width + x) * 4;
            if (luminance(data[index], data[index + 1], data[index + 2]) >= paperThreshold) {
              mask[gy * gridWidth + gx] = 1;
            }
          }
        }

        const stack = new Int32Array(cellCount);
        let best = null;
        for (let start = 0; start < cellCount; start += 1) {
          if (!mask[start] || visited[start]) {
            continue;
          }

          let length = 0;
          let count = 0;
          let topLeft = { score: Infinity, point: null };
          let topRight = { score: -Infinity, point: null };
          let bottomRight = { score: -Infinity, point: null };
          let bottomLeft = { score: Infinity, point: null };
          visited[start] = 1;
          stack[length] = start;
          length += 1;

          while (length > 0) {
            length -= 1;
            const cell = stack[length];
            const gx = cell % gridWidth;
            const gy = Math.floor(cell / gridWidth);
            const x = Math.min(width - 1, gx * step);
            const y = Math.min(height - 1, gy * step);
            const sumScore = x + y;
            const diffScore = x - y;

            if (sumScore < topLeft.score) {
              topLeft = { score: sumScore, point: { x, y } };
            }
            if (diffScore > topRight.score) {
              topRight = { score: diffScore, point: { x, y } };
            }
            if (sumScore > bottomRight.score) {
              bottomRight = { score: sumScore, point: { x, y } };
            }
            if (diffScore < bottomLeft.score) {
              bottomLeft = { score: diffScore, point: { x, y } };
            }
            count += 1;

            for (let yOffset = -1; yOffset <= 1; yOffset += 1) {
              for (let xOffset = -1; xOffset <= 1; xOffset += 1) {
                if (xOffset === 0 && yOffset === 0) {
                  continue;
                }
                const nx = gx + xOffset;
                const ny = gy + yOffset;
                if (nx < 0 || ny < 0 || nx >= gridWidth || ny >= gridHeight) {
                  continue;
                }
                const next = ny * gridWidth + nx;
                if (mask[next] && !visited[next]) {
                  visited[next] = 1;
                  stack[length] = next;
                  length += 1;
                }
              }
            }
          }

          if (!best || count > best.count) {
            best = {
              count,
              corners: [topLeft.point, topRight.point, bottomRight.point, bottomLeft.point],
            };
          }
        }

        if (!best || best.count < cellCount * 0.08 || best.corners.some((point) => !point)) {
          return null;
        }

        const validated = validateDetectedQuad(best.corners, width, height);
        if (!validated) {
          return null;
        }
        return {
          found: true,
          confidence: clamp(validated.areaRatio * 1.1 + Math.min(best.count / cellCount, 0.35), 0.18, 0.96),
          corners: validated.corners,
          threshold: paperThreshold,
          method: "connected_paper",
        };
      }

      function houghLineFromRhoTheta(rho, theta, support, group, width, height) {
        const cos = Math.cos(theta);
        const sin = Math.sin(theta);
        const centerX = width / 2;
        const centerY = height / 2;
        const midX = Math.abs(cos) > 0.18 ? (rho - centerY * sin) / cos : centerX;
        const midY = Math.abs(sin) > 0.18 ? (rho - centerX * cos) / sin : centerY;
        return {
          a: cos,
          b: sin,
          c: -rho,
          support,
          group,
          midX,
          midY,
        };
      }

      function intersectHoughLines(lineA, lineB) {
        const determinant = lineA.a * lineB.b - lineB.a * lineA.b;
        if (Math.abs(determinant) < 1e-6) {
          return null;
        }
        return {
          x: (lineA.b * lineB.c - lineB.b * lineA.c) / determinant,
          y: (lineA.c * lineB.a - lineB.c * lineA.a) / determinant,
        };
      }

      function houghSideCandidates(lines, side, width, height) {
        const maxSupport = Math.max(1, ...lines.map((line) => line.support));
        return lines
          .map((line) => {
            const supportScore = Math.min(1, line.support / maxSupport);
            let edgeScore = 0;
            if (side === "top") {
              if (line.midY > height * 0.62) {
                return null;
              }
              edgeScore = 1 - line.midY / Math.max(1, height);
            } else if (side === "bottom") {
              if (line.midY < height * 0.38) {
                return null;
              }
              edgeScore = line.midY / Math.max(1, height);
            } else if (side === "left") {
              if (line.midX > width * 0.62) {
                return null;
              }
              edgeScore = 1 - line.midX / Math.max(1, width);
            } else {
              if (line.midX < width * 0.38) {
                return null;
              }
              edgeScore = line.midX / Math.max(1, width);
            }
            return { line, score: edgeScore * 0.72 + supportScore * 0.28 };
          })
          .filter(Boolean)
          .sort((a, b) => b.score - a.score)
          .slice(0, 8)
          .map((candidate) => candidate.line);
      }

      function detectHoughLineQuad(sourceCanvas, image, step) {
        const { width, height } = sourceCanvas;
        const data = image.data;
        const sampleStep = Math.max(step, Math.floor(Math.max(width, height) / 620));
        const edgePoints = [];
        const maxEdgePoints = 24000;

        for (let y = sampleStep; y < height - sampleStep; y += sampleStep) {
          for (let x = sampleStep; x < width - sampleStep; x += sampleStep) {
            const leftIndex = (y * width + x - sampleStep) * 4;
            const rightIndex = (y * width + x + sampleStep) * 4;
            const topIndex = ((y - sampleStep) * width + x) * 4;
            const bottomIndex = ((y + sampleStep) * width + x) * 4;
            const gradient =
              Math.abs(luminance(data[rightIndex], data[rightIndex + 1], data[rightIndex + 2]) - luminance(data[leftIndex], data[leftIndex + 1], data[leftIndex + 2])) +
              Math.abs(luminance(data[bottomIndex], data[bottomIndex + 1], data[bottomIndex + 2]) - luminance(data[topIndex], data[topIndex + 1], data[topIndex + 2]));
            if (gradient > 42) {
              edgePoints.push({ x, y });
            }
          }
        }

        if (edgePoints.length < ((width / sampleStep) * (height / sampleStep)) * 0.004) {
          return null;
        }

        const points =
          edgePoints.length > maxEdgePoints
            ? edgePoints.filter((_, index) => index % Math.ceil(edgePoints.length / maxEdgePoints) === 0)
            : edgePoints;
        const diagonal = Math.hypot(width, height);
        const binSize = Math.max(4, sampleStep * 2);
        const supportThreshold = Math.max(18, Math.round(Math.min(width, height) / sampleStep * 0.08));
        const angleGroups = [
          { group: "vertical", degrees: [-28, -22, -16, -10, -4, 0, 4, 10, 16, 22, 28] },
          { group: "horizontal", degrees: [62, 68, 74, 80, 86, 90, 94, 100, 106, 112, 118] },
        ];
        const candidateLines = [];

        angleGroups.forEach(({ group, degrees }) => {
          degrees.forEach((degree) => {
            const theta = (degree * Math.PI) / 180;
            const cos = Math.cos(theta);
            const sin = Math.sin(theta);
            const bins = new Map();
            points.forEach((point) => {
              const rho = point.x * cos + point.y * sin;
              const bin = Math.round((rho + diagonal) / binSize);
              bins.set(bin, (bins.get(bin) || 0) + 1);
            });

            [...bins.entries()]
              .filter((entry) => entry[1] >= supportThreshold)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5)
              .forEach(([bin, support]) => {
                const rho = bin * binSize - diagonal;
                candidateLines.push(houghLineFromRhoTheta(rho, theta, support, group, width, height));
              });
          });
        });

        const horizontal = candidateLines.filter((line) => line.group === "horizontal");
        const vertical = candidateLines.filter((line) => line.group === "vertical");
        if (horizontal.length < 2 || vertical.length < 2) {
          return null;
        }

        const topCandidates = houghSideCandidates(horizontal, "top", width, height);
        const bottomCandidates = houghSideCandidates(horizontal, "bottom", width, height);
        const leftCandidates = houghSideCandidates(vertical, "left", width, height);
        const rightCandidates = houghSideCandidates(vertical, "right", width, height);
        if (!topCandidates.length || !bottomCandidates.length || !leftCandidates.length || !rightCandidates.length) {
          return null;
        }

        let best = null;
        const marginX = width * 0.08;
        const marginY = height * 0.08;
        topCandidates.forEach((top) => {
          bottomCandidates.forEach((bottom) => {
            if (bottom.midY - top.midY < height * 0.28) {
              return;
            }
            leftCandidates.forEach((left) => {
              rightCandidates.forEach((right) => {
                if (right.midX - left.midX < width * 0.28) {
                  return;
                }
                const corners = [
                  intersectHoughLines(top, left),
                  intersectHoughLines(top, right),
                  intersectHoughLines(bottom, right),
                  intersectHoughLines(bottom, left),
                ];
                if (corners.some((point) => !point)) {
                  return;
                }
                if (
                  corners.some(
                    (point) => point.x < -marginX || point.x > width - 1 + marginX || point.y < -marginY || point.y > height - 1 + marginY
                  )
                ) {
                  return;
                }
                const clipped = corners.map((point) => ({
                  x: clamp(point.x, 0, width - 1),
                  y: clamp(point.y, 0, height - 1),
                }));
                const validated = validateDetectedQuad(clipped, width, height);
                if (!validated) {
                  return;
                }
                const supportScore = (top.support + bottom.support + left.support + right.support) / Math.max(1, points.length);
                const score = validated.areaRatio * 0.82 + Math.min(0.18, supportScore);
                if (!best || score > best.score) {
                  best = { corners: validated.corners, areaRatio: validated.areaRatio, score };
                }
              });
            });
          });
        });

        if (!best) {
          return null;
        }

        return {
          found: true,
          confidence: clamp(0.24 + best.areaRatio * 0.56 + best.score * 0.16, 0.16, 0.9),
          corners: best.corners,
          threshold: supportThreshold,
          method: "hough_lines",
        };
      }

      function detectDocumentQuad(sourceCanvas) {
        const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const { width, height } = sourceCanvas;
        const image = context.getImageData(0, 0, width, height);
        const data = image.data;
        const step = Math.max(1, Math.floor(Math.max(width, height) / 760));

        let sum = 0;
        let sumSquares = 0;
        let samples = 0;
        const histogram = new Array(256).fill(0);
        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const index = (y * width + x) * 4;
            const value = luminance(data[index], data[index + 1], data[index + 2]);
            sum += value;
            sumSquares += value * value;
            histogram[Math.round(value)] += 1;
            samples += 1;
          }
        }

        const connectedCandidate = detectConnectedPaperQuad(sourceCanvas, image, step, histogram, samples);
        if (connectedCandidate) {
          return connectedCandidate;
        }

        const houghCandidate = detectHoughLineQuad(sourceCanvas, image, step);
        if (houghCandidate) {
          return houghCandidate;
        }

        const mean = sum / Math.max(1, samples);
        const variance = sumSquares / Math.max(1, samples) - mean * mean;
        const threshold = clamp(
          Math.max(percentileFromHistogram(histogram, samples, 0.62), mean + Math.sqrt(Math.max(0, variance)) * 0.1),
          95,
          238
        );

        const extremes = {
          topLeft: { score: Infinity, point: null },
          topRight: { score: -Infinity, point: null },
          bottomRight: { score: -Infinity, point: null },
          bottomLeft: { score: Infinity, point: null },
        };

        let hits = 0;
        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const index = (y * width + x) * 4;
            if (luminance(data[index], data[index + 1], data[index + 2]) > threshold) {
              const sumScore = x + y;
              const diffScore = x - y;
              if (sumScore < extremes.topLeft.score) {
                extremes.topLeft = { score: sumScore, point: { x, y } };
              }
              if (diffScore > extremes.topRight.score) {
                extremes.topRight = { score: diffScore, point: { x, y } };
              }
              if (sumScore > extremes.bottomRight.score) {
                extremes.bottomRight = { score: sumScore, point: { x, y } };
              }
              if (diffScore < extremes.bottomLeft.score) {
                extremes.bottomLeft = { score: diffScore, point: { x, y } };
              }
              hits += 1;
            }
          }
        }

        const corners = [extremes.topLeft.point, extremes.topRight.point, extremes.bottomRight.point, extremes.bottomLeft.point];
        if (hits < samples * 0.04 || corners.some((point) => !point)) {
          return { found: false, confidence: 0, corners: null, threshold };
        }

        const validated = validateDetectedQuad(corners, width, height);
        if (!validated) {
          return { found: false, confidence: 0, corners: null, threshold };
        }

        return {
          found: true,
          confidence: clamp(validated.areaRatio * 1.35 + Math.min(hits / samples, 0.55), 0.1, 0.98),
          corners: validated.corners,
          threshold,
          method: "bright_extreme",
        };
      }

      function solveLinearSystem(matrix, values) {
        const size = values.length;
        const a = matrix.map((row, index) => row.concat(values[index]));

        for (let col = 0; col < size; col += 1) {
          let pivot = col;
          for (let row = col + 1; row < size; row += 1) {
            if (Math.abs(a[row][col]) > Math.abs(a[pivot][col])) {
              pivot = row;
            }
          }

          if (Math.abs(a[pivot][col]) < 1e-9) {
            throw new Error("透視補正の計算に失敗しました。");
          }

          [a[col], a[pivot]] = [a[pivot], a[col]];
          const divisor = a[col][col];
          for (let item = col; item <= size; item += 1) {
            a[col][item] /= divisor;
          }

          for (let row = 0; row < size; row += 1) {
            if (row === col) {
              continue;
            }
            const factor = a[row][col];
            for (let item = col; item <= size; item += 1) {
              a[row][item] -= factor * a[col][item];
            }
          }
        }

        return a.map((row) => row[size]);
      }

      function perspectiveCoefficients(corners, width, height) {
        const destination = [
          { x: 0, y: 0 },
          { x: width - 1, y: 0 },
          { x: width - 1, y: height - 1 },
          { x: 0, y: height - 1 },
        ];
        const matrix = [];
        const values = [];

        for (let i = 0; i < 4; i += 1) {
          const u = destination[i].x;
          const v = destination[i].y;
          const x = corners[i].x;
          const y = corners[i].y;
          matrix.push([u, v, 1, 0, 0, 0, -u * x, -v * x]);
          values.push(x);
          matrix.push([0, 0, 0, u, v, 1, -u * y, -v * y]);
          values.push(y);
        }

        return solveLinearSystem(matrix, values);
      }

      function sampleBilinear(data, width, height, x, y, channel) {
        if (x < 0 || y < 0 || x >= width - 1 || y >= height - 1) {
          return 255;
        }
        const x0 = Math.floor(x);
        const y0 = Math.floor(y);
        const xWeight = x - x0;
        const yWeight = y - y0;
        const index00 = (y0 * width + x0) * 4 + channel;
        const index10 = index00 + 4;
        const index01 = index00 + width * 4;
        const index11 = index01 + 4;
        const top = data[index00] * (1 - xWeight) + data[index10] * xWeight;
        const bottom = data[index01] * (1 - xWeight) + data[index11] * xWeight;
        return top * (1 - yWeight) + bottom * yWeight;
      }

      function warpPerspectiveCanvas(sourceCanvas, corners) {
        const orderedCorners = orderQuadPoints(corners);
        const targetWidth = Math.max(
          80,
          Math.round(Math.max(pointDistance(orderedCorners[0], orderedCorners[1]), pointDistance(orderedCorners[3], orderedCorners[2])))
        );
        const targetHeight = Math.max(
          80,
          Math.round(Math.max(pointDistance(orderedCorners[0], orderedCorners[3]), pointDistance(orderedCorners[1], orderedCorners[2])))
        );
        const edgeScale = MAX_SOURCE_IMAGE_EDGE / Math.max(targetWidth, targetHeight);
        const pixelScale = Math.sqrt(MAX_SOURCE_IMAGE_PIXELS / Math.max(1, targetWidth * targetHeight));
        const scale = Math.min(1, edgeScale, pixelScale);
        const width = Math.max(1, Math.round(targetWidth * scale));
        const height = Math.max(1, Math.round(targetHeight * scale));
        const scaledCorners = orderedCorners.map((point) => ({ x: point.x, y: point.y }));
        const coefficients = perspectiveCoefficients(scaledCorners, width, height);

        const sourceContext = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const source = sourceContext.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        const output = document.createElement("canvas");
        output.width = width;
        output.height = height;
        const outputContext = output.getContext("2d");
        const target = outputContext.createImageData(width, height);
        const [a, b, c, d, e, f, g, h] = coefficients;

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const denominator = g * x + h * y + 1;
            const sourceX = (a * x + b * y + c) / denominator;
            const sourceY = (d * x + e * y + f) / denominator;
            const targetIndex = (y * width + x) * 4;
            target.data[targetIndex] = sampleBilinear(source.data, sourceCanvas.width, sourceCanvas.height, sourceX, sourceY, 0);
            target.data[targetIndex + 1] = sampleBilinear(source.data, sourceCanvas.width, sourceCanvas.height, sourceX, sourceY, 1);
            target.data[targetIndex + 2] = sampleBilinear(source.data, sourceCanvas.width, sourceCanvas.height, sourceX, sourceY, 2);
            target.data[targetIndex + 3] = 255;
          }
        }

        outputContext.putImageData(target, 0, 0);
        return output;
      }

      function estimateHoughTextLineSkew(sourceCanvas) {
        const { width, height } = sourceCanvas;
        if (Math.min(width, height) < 80) {
          return { angle: 0, confidence: 0 };
        }

        const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const image = context.getImageData(0, 0, width, height);
        const data = image.data;
        const step = Math.max(1, Math.floor(Math.max(width, height) / 1000));
        const points = [];
        const pointLimit = 90000;
        const pointStride = Math.max(step, Math.floor(Math.sqrt((width * height) / pointLimit)));

        for (let y = pointStride; y < height - pointStride; y += pointStride) {
          for (let x = pointStride; x < width - pointStride; x += pointStride) {
            const index = (y * width + x) * 4;
            const center = luminance(data[index], data[index + 1], data[index + 2]);
            const leftIndex = (y * width + x - pointStride) * 4;
            const rightIndex = (y * width + x + pointStride) * 4;
            const topIndex = ((y - pointStride) * width + x) * 4;
            const bottomIndex = ((y + pointStride) * width + x) * 4;
            const horizontalGradient = Math.abs(
              luminance(data[rightIndex], data[rightIndex + 1], data[rightIndex + 2]) -
                luminance(data[leftIndex], data[leftIndex + 1], data[leftIndex + 2])
            );
            const verticalGradient = Math.abs(
              luminance(data[bottomIndex], data[bottomIndex + 1], data[bottomIndex + 2]) -
                luminance(data[topIndex], data[topIndex + 1], data[topIndex + 2])
            );
            const gradient = horizontalGradient + verticalGradient;
            if (gradient > 58 && center < 235 && verticalGradient >= horizontalGradient * 0.42) {
              points.push({ x: x - width / 2, y: y - height / 2 });
            }
          }
        }

        if (points.length < 12) {
          return { angle: 0, confidence: 0 };
        }

        const diagonal = Math.ceil(Math.hypot(width, height)) + 3;
        const offset = Math.floor(diagonal / 2);
        let bestAngle = 0;
        let bestScore = -1;
        let zeroScore = 0;
        for (let angle = -6; angle <= 6.0001; angle += 0.5) {
          const radians = (angle * Math.PI) / 180;
          const cos = Math.cos(radians);
          const sin = Math.sin(radians);
          const bins = new Uint32Array(diagonal);
          points.forEach((point) => {
            const projectedY = Math.round(point.y * cos - point.x * sin) + offset;
            if (projectedY >= 0 && projectedY < diagonal) {
              bins[projectedY] += 1;
            }
          });

          let score = 0;
          for (let index = 0; index < bins.length; index += 1) {
            score += bins[index] * bins[index];
          }
          score /= Math.max(1, points.length);
          if (Math.abs(angle) < 0.01) {
            zeroScore = score;
          }
          if (score > bestScore) {
            bestScore = score;
            bestAngle = angle;
          }
        }

        const confidence = bestScore / Math.max(zeroScore, 1);
        if (Math.abs(bestAngle) < 0.25 || confidence < 1.045) {
          return { angle: 0, confidence: Math.round(confidence * 1000) / 1000 };
        }
        return { angle: Math.round(bestAngle * 1000) / 1000, confidence: Math.round(confidence * 1000) / 1000 };
      }

      function estimateTextLineSkew(sourceCanvas) {
        const { width, height } = sourceCanvas;
        if (Math.min(width, height) < 80) {
          return { angle: 0, confidence: 0 };
        }

        const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const image = context.getImageData(0, 0, width, height);
        const data = image.data;
        const step = Math.max(1, Math.floor(Math.max(width, height) / 900));
        const histogram = new Array(256).fill(0);
        let samples = 0;
        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const index = (y * width + x) * 4;
            const value = Math.round(luminance(data[index], data[index + 1], data[index + 2]));

        const points = [];
        const pointLimit = 90000;
        const pointStep = Math.max(step, Math.floor(Math.sqrt((width * height) / pointLimit)));
        for (let y = 0; y < height; y += pointStep) {

        const diagonal = Math.ceil(Math.hypot(width, height)) + 3;
        const offset = Math.floor(diagonal / 2);
        let bestAngle = 0;
        let bestScore = -1;
        let zeroScore = 0;
        for (let angle = -6; angle <= 6.0001; angle += 0.5) {
          const radians = (angle * Math.PI) / 180;
          const cos = Math.cos(radians);
          const sin = Math.sin(radians);
          const bins = new Uint32Array(diagonal);
          points.forEach((point) => {
            const projectedY = Math.round(point.y * cos - point.x * sin) + offset;
            if (projectedY >= 0 && projectedY < diagonal) {
              bins[projectedY] += 1;
            }
          });

          let score = 0;
          for (let index = 0; index < bins.length; index += 1) {
            score += bins[index] * bins[index];
          }
          score /= Math.max(1, points.length);
          if (Math.abs(angle) < 0.01) {
            zeroScore = score;
          }
          if (score > bestScore) {
            bestScore = score;
            bestAngle = angle;
          }
        }

        const confidence = bestScore / Math.max(zeroScore, 1);
        if (Math.abs(bestAngle) < 0.25 || confidence < 1.035) {
          const hough = estimateHoughTextLineSkew(sourceCanvas);
          if (Math.abs(hough.angle) >= 0.25 && hough.confidence >= 1.045) {
            return hough;
          }
          return { angle: 0, confidence: Math.round(Math.max(confidence, hough.confidence) * 1000) / 1000 };
        }
        return { angle: Math.round(bestAngle * 1000) / 1000, confidence: Math.round(confidence * 1000) / 1000 };
      }

      function rotateCanvasKeepContent(sourceCanvas, angle) {
        if (Math.abs(angle) < 0.25) {
          return sourceCanvas;
        }

        const radians = (angle * Math.PI) / 180;
        const sin = Math.abs(Math.sin(radians));
        const cos = Math.abs(Math.cos(radians));
        const width = Math.max(1, Math.round(sourceCanvas.width * cos + sourceCanvas.height * sin));
        const height = Math.max(1, Math.round(sourceCanvas.width * sin + sourceCanvas.height * cos));
        const output = document.createElement("canvas");
        output.width = width;
        output.height = height;
        const context = output.getContext("2d");
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, width, height);
        context.translate(width / 2, height / 2);
        context.rotate(radians);
        context.drawImage(sourceCanvas, -sourceCanvas.width / 2, -sourceCanvas.height / 2);

      function deskewCanvasByTextLines(sourceCanvas, detection) {

          canvas: rotateCanvasKeepContent(sourceCanvas, deskew.angle),
          detection: { ...detection, deskewAngle: deskew.angle, deskewConfidence: deskew.confidence },

      function normalizeTextlineProjection(projection) {
        const weights = [1, 2, 3, 4, 5, 4, 3, 2, 1];
        const radius = Math.floor(weights.length / 2);
        const smoothed = new Float32Array(projection.length);
        let sum = 0;
        for (let y = 0; y < projection.length; y += 1) {
          let weighted = 0;
          let weightSum = 0;
          for (let offset = -radius; offset <= radius; offset += 1) {
            const index = clamp(y + offset, 0, projection.length - 1);
            const weight = weights[offset + radius];
            weighted += projection[index] * weight;
            weightSum += weight;
          }
          smoothed[y] = weighted / Math.max(1, weightSum);
          sum += smoothed[y];
        }

        const mean = sum / Math.max(1, smoothed.length);
        let norm = 0;
        for (let y = 0; y < smoothed.length; y += 1) {
          smoothed[y] -= mean;
          norm += smoothed[y] * smoothed[y];
        }
        norm = Math.sqrt(norm);
        if (norm <= 1e-6) {
          return smoothed;
        }
        for (let y = 0; y < smoothed.length; y += 1) {
          smoothed[y] /= norm;
        }
        return smoothed;
      }

      function bestVerticalProjectionShift(reference, projection, maxShift) {
        let bestShift = 0;
        let bestScore = -1;
        for (let shift = -maxShift; shift <= maxShift; shift += 1) {
          let referenceStart = 0;
          let projectionStart = 0;
          let length = reference.length;
          if (shift < 0) {
            length = reference.length + shift;
            projectionStart = -shift;
          } else if (shift > 0) {
            referenceStart = shift;
            length = reference.length - shift;
          }
          if (length < 24) {
            continue;
          }

          let score = 0;
          for (let index = 0; index < length; index += 1) {
            score += reference[referenceStart + index] * projection[projectionStart + index];
          }
          if (score > bestScore) {
            bestScore = score;
            bestShift = shift;
          }
        }
        return { shift: bestShift, score: bestScore };

      function smoothOffsetSeries(offsets) {

        const output = offsets.slice();
        for (let index = 0; index < offsets.length; index += 1) {
          const left = offsets[Math.max(0, index - 1)];
          const center = offsets[index];
          const right = offsets[Math.min(offsets.length - 1, index + 1)];
          output[index] = (left + center * 2 + right) / 4;
        }
        return output;
      }

      function estimateTextlineColumnOffsetsCanvas(sourceCanvas, stripCount = 31, maxShiftRatio = 0.045) {
        const { width, height } = sourceCanvas;
        if (Math.min(width, height) < 120) {
          return { centers: [], shifts: [], confidence: 0, reason: "small_canvas" };
        }

        const scale = Math.min(1, 900 / Math.max(width, height));
        const analysisCanvas = document.createElement("canvas");
        analysisCanvas.width = Math.max(1, Math.round(width * scale));
        analysisCanvas.height = Math.max(1, Math.round(height * scale));
        const analysisContext = analysisCanvas.getContext("2d", { willReadFrequently: true });
        analysisContext.imageSmoothingEnabled = true;
        analysisContext.imageSmoothingQuality = "high";
        analysisContext.drawImage(sourceCanvas, 0, 0, analysisCanvas.width, analysisCanvas.height);

        const image = analysisContext.getImageData(0, 0, analysisCanvas.width, analysisCanvas.height);
        const data = image.data;
        const pixelCount = analysisCanvas.width * analysisCanvas.height;
        const lum = new Uint8ClampedArray(pixelCount);
        const histogram = new Array(256).fill(0);
        for (let pixel = 0; pixel < pixelCount; pixel += 1) {
          const offset = pixel * 4;
          const value = Math.round(luminance(data[offset], data[offset + 1], data[offset + 2]));
          lum[pixel] = value;
          histogram[value] += 1;
        }

        const threshold = clamp(
          Math.min(otsuThreshold(histogram, pixelCount), percentileFromHistogram(histogram, pixelCount, 0.35)) - 2,
          35,
          185

        const darkMask = new Uint8Array(pixelCount);
        let darkCount = 0;
        for (let pixel = 0; pixel < pixelCount; pixel += 1) {
          if (lum[pixel] <= threshold) {
            darkMask[pixel] = 1;
            darkCount += 1;
          }
        }
        if (darkCount / Math.max(1, pixelCount) < 0.004) {
          return { centers: [], shifts: [], confidence: 0, threshold, reason: "insufficient_text" };
        }

        const smallWidth = analysisCanvas.width;
        const smallHeight = analysisCanvas.height;
        const strips = Math.max(9, Math.min(stripCount, smallWidth >= 160 ? Math.floor(smallWidth / 16) : 9));
        const centers = [];
        const projections = [];
        for (let strip = 0; strip < strips; strip += 1) {
          const x0 = Math.round((strip * smallWidth) / strips);
          const x1 = Math.round(((strip + 1) * smallWidth) / strips);
          if (x1 <= x0 + 2) {
            continue;
          }

          const projection = new Float32Array(smallHeight);
          let maxProjection = 0;
          for (let y = 0; y < smallHeight; y += 1) {
            let rowCount = 0;
            const row = y * smallWidth;
            for (let x = x0; x < x1; x += 1) {
              rowCount += darkMask[row + x];
            }
            projection[y] = rowCount;
            maxProjection = Math.max(maxProjection, rowCount);
          }

          if (maxProjection < Math.max(2, (x1 - x0) * 0.05)) {
            continue;
          }
          centers.push(((x0 + x1) / 2) / scale);
          projections.push(normalizeTextlineProjection(projection));
        }

        if (projections.length < 7) {
          return { centers: [], shifts: [], confidence: 0, threshold, reason: "insufficient_strips" };
        }

        const reference = projections[Math.floor(projections.length / 2)];
        const maxShift = Math.max(2, Math.round(smallHeight * maxShiftRatio));
        let confidenceSum = 0;
        const shifts = projections.map((projection) => {
          const match = bestVerticalProjectionShift(reference, projection, maxShift);
          confidenceSum += Math.max(0, match.score);
          return match.shift / scale;
        });
        const smoothedShifts = smoothOffsetSeries(shifts);
        return {
          centers,
          shifts: smoothedShifts,
          confidence: clamp(confidenceSum / Math.max(1, projections.length), 0, 1),
          threshold,
          reason: "ok",

      }

      function interpolateOffsetAt(x, xPoints, offsets, cursor) {
        while (cursor.index < xPoints.length - 2 && x > xPoints[cursor.index + 1]) {
          cursor.index += 1;
        }
        const leftX = xPoints[cursor.index];
        const rightX = xPoints[cursor.index + 1];
        const ratio = rightX <= leftX ? 0 : (x - leftX) / (rightX - leftX);
        return offsets[cursor.index] + (offsets[cursor.index + 1] - offsets[cursor.index]) * ratio;
      }

      function dewarpCanvasByTextlineColumns(sourceCanvas, detection) {

            detection: {

              dewarpApplied: false,
              dewarpConfidence: Math.round(estimate.confidence * 1000) / 1000,
              dewarpMaxOffset: Math.round(maxOffset * 100) / 100,
              dewarpReason: "flat_or_low_confidence",

            canvas: sourceCanvas,
            detection: {
              ...detection,
              dewarpApplied: false,
              dewarpConfidence: Math.round(estimate.confidence * 1000) / 1000,
              dewarpMaxOffset: Math.round(maxOffset * 100) / 100,
              dewarpReason: "unstable_offsets",

        const output = document.createElement("canvas");
        output.width = sourceCanvas.width;
        output.height = sourceCanvas.height;
        const context = output.getContext("2d");
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, output.width, output.height);
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";

        const xPoints = [0, ...estimate.centers, sourceCanvas.width - 1];
        const offsets = [estimate.shifts[0], ...estimate.shifts, estimate.shifts[estimate.shifts.length - 1]];
        const cursor = { index: 0 };
        for (let x = 0; x < sourceCanvas.width; x += 1) {
          const shift = interpolateOffsetAt(x, xPoints, offsets, cursor);
          context.drawImage(sourceCanvas, x, 0, 1, sourceCanvas.height, x, shift, 1, sourceCanvas.height);

        return {
          canvas: output,
          detection: {
            ...detection,
            dewarpApplied: true,
            dewarpConfidence: Math.round(estimate.confidence * 1000) / 1000,
            dewarpMaxOffset: Math.round(maxOffset * 100) / 100,
            dewarpStripCount: estimate.centers.length,
            dewarpReason: "textline_column_offsets",
          },
        };
      }

      function perspectiveCorrectCanvas(sourceCanvas, manualCorners = null) {
        const detection = detectDocumentQuad(sourceCanvas);
        const selectedCorners = manualCorners || (detection.found ? detection.corners : null);
        if (!selectedCorners) {
          return { canvas: sourceCanvas, detection, autoCorners: null };
        }

        try {
          const isManual = Boolean(manualCorners);
          return {
            canvas: warpPerspectiveCanvas(sourceCanvas, selectedCorners),
            detection: {
              ...detection,
              found: true,
              confidence: isManual ? 0.99 : detection.confidence,
              autoFound: detection.found,
              autoConfidence: detection.found ? detection.confidence : 0,
              corners: cloneCorners(selectedCorners),
              manual: isManual,
            },
            autoCorners: detection.found ? cloneCorners(detection.corners) : null,
          };
        } catch (error) {
          return { canvas: sourceCanvas, detection: { ...detection, found: false, confidence: 0 }, autoCorners: null };
        }
      }

      function percentileFromHistogram(histogram, total, percentile) {

        let seen = 0;
        for (let i = 0; i < histogram.length; i += 1) {
          seen += histogram[i];
          if (seen >= target) {
            return i;
          }
        }
        return histogram.length - 1;

      function otsuThreshold(histogram, total) {

        let weightBackground = 0;
        let maxVariance = -1;
        let threshold = 150;
        for (let i = 0; i < histogram.length; i += 1) {
          weightBackground += histogram[i];
          if (weightBackground === 0) {
            continue;
          }

          const weightForeground = total - weightBackground;
          if (weightForeground === 0) {
            break;
          }

          sumBackground += i * histogram[i];
          const meanBackground = sumBackground / weightBackground;
          const meanForeground = (sum - sumBackground) / weightForeground;
          const variance = weightBackground * weightForeground * (meanBackground - meanForeground) ** 2;
          if (variance > maxVariance) {
            maxVariance = variance;
            threshold = i;
          }

        return threshold;

      function localPercentileFromHistogram(histogram, total, percentile) {

      function percentileFromSortedValues(values, percentile) {

        return values[index];

      function smoothTileValues(values, gridWidth, gridHeight) {
        const smoothed = new Float32Array(values.length);
        for (let y = 0; y < gridHeight; y += 1) {
          for (let x = 0; x < gridWidth; x += 1) {
            let sum = 0;
            let weight = 0;
            for (let oy = -1; oy <= 1; oy += 1) {
              for (let ox = -1; ox <= 1; ox += 1) {
                const sx = clamp(x + ox, 0, gridWidth - 1);
                const sy = clamp(y + oy, 0, gridHeight - 1);
                const currentWeight = ox === 0 && oy === 0 ? 4 : 1;
                sum += values[sy * gridWidth + sx] * currentWeight;
                weight += currentWeight;
              }
            }
            smoothed[y * gridWidth + x] = sum / Math.max(1, weight);
          }
        }
        return smoothed;
      }

      function interpolatedTileValue(values, gridWidth, gridHeight, tileSize, x, y) {
        const gx = clamp(x / tileSize - 0.5, 0, gridWidth - 1);
        const gy = clamp(y / tileSize - 0.5, 0, gridHeight - 1);
        const x0 = Math.floor(gx);
        const y0 = Math.floor(gy);
        const x1 = Math.min(gridWidth - 1, x0 + 1);
        const y1 = Math.min(gridHeight - 1, y0 + 1);
        const wx = gx - x0;
        const wy = gy - y0;
        const top = values[y0 * gridWidth + x0] * (1 - wx) + values[y0 * gridWidth + x1] * wx;
        const bottom = values[y1 * gridWidth + x0] * (1 - wx) + values[y1 * gridWidth + x1] * wx;

      function buildIntegralImage(values, width, height) {
        const integral = new Float64Array((width + 1) * (height + 1));

          for (let x = 0; x < width; x += 1) {
            rowSum += values[y * width + x];
            const index = (y + 1) * (width + 1) + x + 1;
            integral[index] = integral[index - width - 1] + rowSum;

      function localMeanFromIntegral(integral, width, height, x, y, radius) {
        const x0 = Math.max(0, x - radius);
        const y0 = Math.max(0, y - radius);
        const x1 = Math.min(width - 1, x + radius);
        const y1 = Math.min(height - 1, y + radius);
        const stride = width + 1;
        const area = (x1 - x0 + 1) * (y1 - y0 + 1);
        const sum =
          integral[(y1 + 1) * stride + x1 + 1] -
          integral[y0 * stride + x1 + 1] -
          integral[(y1 + 1) * stride + x0] +
          integral[y0 * stride + x0];
        return sum / Math.max(1, area);
      }

      function localStatsFromIntegrals(integral, squaredIntegral, width, height, x, y, radius) {
        const x0 = Math.max(0, x - radius);
        const y0 = Math.max(0, y - radius);
        const x1 = Math.min(width - 1, x + radius);
        const y1 = Math.min(height - 1, y + radius);
        const stride = width + 1;
        const area = Math.max(1, (x1 - x0 + 1) * (y1 - y0 + 1));
        const sum =
          integral[(y1 + 1) * stride + x1 + 1] -
          integral[y0 * stride + x1 + 1] -
          integral[(y1 + 1) * stride + x0] +
          integral[y0 * stride + x0];
        const squaredSum =
          squaredIntegral[(y1 + 1) * stride + x1 + 1] -
          squaredIntegral[y0 * stride + x1 + 1] -
          squaredIntegral[(y1 + 1) * stride + x0] +
          squaredIntegral[y0 * stride + x0];

        const variance = Math.max(0, squaredSum / area - mean * mean);

      function sauvolaThresholdValue(mean, deviation, k = 0.28, dynamicRange = 128) {

      function cleanupBinaryImageData(data, width, height) {

          let tail = 0;
          let minX = width;
          let minY = height;

          let maxY = 0;

            const y = Math.floor(pixel / width);
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);

              for (let dx = -1; dx <= 1; dx += 1) {
                if (dx === 0 && dy === 0) {

                }
                const nextX = x + dx;
                if (nextX < 0 || nextX >= width) {
                  continue;
                }
                const nextPixel = nextY * width + nextX;
                if (!visited[nextPixel] && data[nextPixel * 4] <= 128) {
                  visited[nextPixel] = 1;
                  queue[tail] = nextPixel;
                  tail += 1;
                }

          const area = tail;
          const boxWidth = maxX - minX + 1;
          const boxHeight = maxY - minY + 1;
          const edgeMarginX = Math.max(6, Math.round(width * 0.025));
          const edgeMarginY = Math.max(6, Math.round(height * 0.025));
          const touchesOuterEdge = minX <= 1 || minY <= 1 || maxX >= width - 2 || maxY >= height - 2;
          const nearOuterEdge = minX <= edgeMarginX || minY <= edgeMarginY || maxX >= width - edgeMarginX || maxY >= height - edgeMarginY;
          const removeDust = area <= 3 || (area <= 9 && boxWidth <= 5 && boxHeight <= 5);

            area > Math.max(120, pixelCount * 0.00045) &&

          const aspect = Math.max(boxWidth, boxHeight) / Math.max(1, Math.min(boxWidth, boxHeight));
          const removeNearEdgeBlob = nearOuterEdge && area > Math.max(240, pixelCount * 0.0012) && (density > 0.22 || aspect > 4);

          if (removeDust || removeEdgeStain || removeNearEdgeBlob || removeLargeBlob) {

      function imageDataToBinaryMask(data, width, height) {

      function erodeBinaryMask3x3(mask, width, height) {

              mask[pixel - 1] &&
              mask[pixel + 1] &&

      function assessOutputScanMetrics(data, width, height, tileSize) {

      function qualityIssueLabel(advice) {

          renderMode === "binary"
            ? estimateBinaryFragmentMetrics(data, sourceCanvas.width, sourceCanvas.height)
            : { fragmentEdgeRatio: 0, isolatedDarkRatio: 0, brokenStrokeRisk: 0 };
        scanMetrics.fragmentEdgeRatio = fragmentMetrics.fragmentEdgeRatio;
        scanMetrics.isolatedDarkRatio = fragmentMetrics.isolatedDarkRatio;
        scanMetrics.brokenStrokeRisk = fragmentMetrics.brokenStrokeRisk;
        scanMetrics.strokeThinApplied = strokeThinReport.applied;
        scanMetrics.strokeThinInkBefore = strokeThinReport.beforeInkDensity;
        scanMetrics.strokeThinInkAfter = strokeThinReport.afterInkDensity;
        outputContext.putImageData(image, 0, 0);
        edgeContext.putImageData(edgeImage, 0, 0);
        const mean = sum / Math.max(1, pixelCount);
        const contrast = Math.sqrt(Math.max(0, sumSquares / Math.max(1, pixelCount) - mean * mean));
        const baseQuality =
          (detection.found ? detection.confidence * 32 : 10) +
          clamp(contrast / 95, 0, 1) * 28 +
          clamp(edgeCount / Math.max(1, pixelCount) / 0.16, 0, 1) * 28 +
          clamp((mean - 90) / 150, 0, 1) * 12;
        const qualityScore = clamp(
          baseQuality -
            (1 - scanMetrics.shadowScore) * 10 -
            scanMetrics.boldnessRisk * 8 -
            scanMetrics.brokenStrokeRisk * 14 -
            scanMetrics.paperGrayResidue * 16,
          0,
          100
        );
        return {
          canvas: output,
          edgeCanvas,
          metrics: {
            qualityScore,
            perspectiveConfidence: detection.found ? detection.confidence : 0,
            edgeDensity: edgeCount / Math.max(1, pixelCount),
            contrast,
            brightness: mean,
            threshold,
            deskewAngle: detection.deskewAngle || 0,
            deskewConfidence: detection.deskewConfidence || 0,
            dewarpApplied: Boolean(detection.dewarpApplied),
            dewarpConfidence: detection.dewarpConfidence || 0,
            dewarpMaxOffset: detection.dewarpMaxOffset || 0,
            dewarpStripCount: detection.dewarpStripCount || 0,
            dewarpReason: detection.dewarpReason || "",
            backgroundRange,
            useFrequencyDeshadow,
            useGatosSauvola,
            shadowResidual: scanMetrics.shadowResidual,
            shadowScore: scanMetrics.shadowScore,
            inkDensity: scanMetrics.inkDensity,
            boldnessRisk: scanMetrics.boldnessRisk,
            brokenStrokeRisk: scanMetrics.brokenStrokeRisk,
            fragmentEdgeRatio: scanMetrics.fragmentEdgeRatio,
            isolatedDarkRatio: scanMetrics.isolatedDarkRatio,
            strokeThinApplied: scanMetrics.strokeThinApplied,
            strokeThinInkBefore: scanMetrics.strokeThinInkBefore,
            strokeThinInkAfter: scanMetrics.strokeThinInkAfter,
            paperGrayResidue: scanMetrics.paperGrayResidue,
            requestedMode: mode,
            selectedMode: renderMode,
            autoSelection: null,
          },
        };
      }

      function buildColorGeometryResult(sourceCanvas, detection) {
        const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const image = context.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        const data = image.data;
        const tileSize = Math.max(42, Math.round(Math.max(sourceCanvas.width, sourceCanvas.height) / 34));
        const step = Math.max(1, Math.floor(Math.max(sourceCanvas.width, sourceCanvas.height) / 1500));
        let samples = 0;
        let sum = 0;
        let sumSquares = 0;
        let edgeCount = 0;

        for (let y = 0; y < sourceCanvas.height; y += step) {
          for (let x = 0; x < sourceCanvas.width; x += step) {
            const index = (y * sourceCanvas.width + x) * 4;
            const value = luminance(data[index], data[index + 1], data[index + 2]);
            sum += value;
            sumSquares += value * value;
            samples += 1;

            if (x + step < sourceCanvas.width && y + step < sourceCanvas.height) {
              const right = ((y * sourceCanvas.width + (x + step)) * 4);
              const bottom = (((y + step) * sourceCanvas.width + x) * 4);
              const rightValue = luminance(data[right], data[right + 1], data[right + 2]);
              const bottomValue = luminance(data[bottom], data[bottom + 1], data[bottom + 2]);
              if (Math.abs(rightValue - value) + Math.abs(bottomValue - value) > 42) {
                edgeCount += 1;
              }
            }
          }
        }

        const scanMetrics = assessOutputScanMetrics(data, sourceCanvas.width, sourceCanvas.height, tileSize);
        const mean = sum / Math.max(1, samples);
        const contrast = Math.sqrt(Math.max(0, sumSquares / Math.max(1, samples) - mean * mean));
        const baseQuality =
          (detection.found ? detection.confidence * 36 : 10) +
          clamp(contrast / 95, 0, 1) * 28 +
          clamp(edgeCount / Math.max(1, samples) / 0.16, 0, 1) * 24 +
          clamp((mean - 70) / 165, 0, 1) * 12;
        const qualityScore = clamp(baseQuality - (1 - scanMetrics.shadowScore) * 6, 0, 100);
        const edgeCanvas = document.createElement("canvas");
        edgeCanvas.width = sourceCanvas.width;
        edgeCanvas.height = sourceCanvas.height;
        edgeCanvas.getContext("2d").drawImage(sourceCanvas, 0, 0);
        return {
          canvas: sourceCanvas,
          edgeCanvas,
          metrics: {
            qualityScore,
            perspectiveConfidence: detection.found ? detection.confidence : 0,
            edgeDensity: edgeCount / Math.max(1, samples),
            contrast,
            brightness: mean,
            threshold: "-",
            deskewAngle: 0,
            deskewConfidence: 0,
            dewarpApplied: false,
            dewarpConfidence: 0,
            dewarpMaxOffset: 0,
            dewarpStripCount: 0,
            dewarpReason: "color_geometry_only",
            backgroundRange: 0,
            useFrequencyDeshadow: false,
            useGatosSauvola: false,
            shadowResidual: scanMetrics.shadowResidual,
            shadowScore: scanMetrics.shadowScore,
            inkDensity: scanMetrics.inkDensity,
            boldnessRisk: 0,
            brokenStrokeRisk: 0,
            fragmentEdgeRatio: 0,
            isolatedDarkRatio: 0,
            strokeThinApplied: false,
            strokeThinInkBefore: null,
            strokeThinInkAfter: null,
            paperGrayResidue: scanMetrics.paperGrayResidue,
            requestedMode: "color",
            selectedMode: "color",
            autoSelection: null,
          },
        };
      }

      function drawContained(context, sourceCanvas, x, y, width, height) {
        context.fillStyle = "#f2f4f7";
        context.fillRect(x, y, width, height);
        const scale = Math.min(width / sourceCanvas.width, height / sourceCanvas.height);
        const drawWidth = sourceCanvas.width * scale;
        const drawHeight = sourceCanvas.height * scale;
        const drawX = x + (width - drawWidth) / 2;
        const drawY = y + (height - drawHeight) / 2;
        context.drawImage(sourceCanvas, drawX, drawY, drawWidth, drawHeight);
      }

      function buildAnalysisCanvas(sourceCanvas, processedCanvas, edgeCanvas, metrics) {
        const report = document.createElement("canvas");
        report.width = 1200;
        report.height = 1600;
        const context = report.getContext("2d");

        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, report.width, report.height);

        context.fillStyle = "#17202a";
        context.font = "700 54px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillText("PocketCV 画像処理レポート", 64, 96);
        context.font = "700 24px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillStyle = "#687386";
        context.fillText("端末内画像処理: 透視補正、照明補正、コントラスト、エッジ", 64, 136);

        context.font = "700 28px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillStyle = "#17202a";
        context.fillText("元画像", 64, 206);
        context.fillText("処理後", 626, 206);
        drawContained(context, sourceCanvas, 64, 230, 510, 520);
        drawContained(context, processedCanvas, 626, 230, 510, 520);

        context.font = "700 28px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillStyle = "#17202a";
        context.fillText("エッジマップ", 64, 832);
        drawContained(context, edgeCanvas, 64, 856, 510, 410);

        context.fillStyle = "#17202a";
        context.fillText("評価指標", 626, 832);
        const advice = scanQualityAdvice(metrics);
        const rows = [
          ["総合品質", `${Math.round(metrics.qualityScore)} / 100`],
          ["診断", advice.label],
