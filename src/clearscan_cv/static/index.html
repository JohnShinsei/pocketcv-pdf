<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="data:," />
    <title>PocketCV PDF</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #687386;
        --line: #d9dee8;
        --surface: #f6f8fb;
        --accent: #157f72;
        --accent-dark: #0f5f56;
        --warn: #b73e6f;
        --shadow: 0 16px 45px rgba(26, 34, 44, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: #ffffff;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(360px, 440px) minmax(0, 1fr);
      }

      .panel {
        min-height: 100vh;
        height: 100vh;
        position: sticky;
        top: 0;
        overflow: auto;
        padding: max(22px, env(safe-area-inset-top)) 22px max(22px, env(safe-area-inset-bottom));
        border-right: 1px solid var(--line);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex: 0 0 auto;
      }

      .brand-copy {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.05;
      }

      .app-subtitle {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        line-height: 1.35;
      }

      .mode-wrap {
        display: grid;
        gap: 6px;
        min-width: 132px;
      }

      .mode-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
      }

      .mode {
        width: 100%;
        min-width: 132px;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        background: #ffffff;
        color: var(--ink);
        font-weight: 700;
      }

      .intake {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        min-height: 280px;
        box-shadow: var(--shadow);
        display: grid;
        align-content: center;
        gap: 16px;
        padding: 22px;
        flex: 0 0 auto;
      }

      .intake.has-pending {
        align-content: start;
      }

      .intake-title {
        margin: 0;
        font-size: 21px;
        line-height: 1.2;
      }

      .intake-copy {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.55;
      }

      .intake-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .pending-editor {
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      .pending-editor[hidden] {
        display: none;
      }

      .pending-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .pending-name {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        line-height: 1.4;
        word-break: break-all;
      }

      .pending-canvas {
        width: 100%;
        height: auto;
        max-height: min(52vh, 560px);
        border-radius: 8px;
        background: #0f1217;
        object-fit: contain;
        touch-action: none;
        cursor: crosshair;
      }

      .pending-tools {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .pending-tools .primary {
        grid-column: 1 / -1;
      }

      .privacy-note {
        border: 1px solid #cfe5df;
        border-radius: 8px;
        background: #ecf7f4;
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 900;
        line-height: 1.45;
        padding: 11px 12px;
      }

      .field-label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .filename-input {
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: #ffffff;
        color: var(--ink);
        font-weight: 800;
      }

      .controls {
        display: grid;
        gap: 10px;
        flex: 0 0 auto;
      }

      button,
      .file-button {
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px 14px;
        background: #ffffff;
        color: var(--ink);
        font-weight: 800;
        cursor: pointer;
        display: inline-grid;
        place-items: center;
        text-align: center;
      }

      button:disabled {
        opacity: 0.48;
        cursor: not-allowed;
        border-color: #d8dde6;
        background: #e9edf3;
        color: #7d8796;
      }

      .primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .primary:active {
        background: var(--accent-dark);
      }

      .danger {
        border-color: #f0c5d5;
        color: var(--warn);
      }

      .file {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .workspace {
        padding: 22px;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto minmax(0, 1fr);
        gap: 18px;
        min-width: 0;
        height: 100vh;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
      }

      .topbar-main {
        display: grid;
        gap: 7px;
        min-width: 0;
      }

      .status {
        color: var(--muted);
        font-weight: 700;
        min-height: 24px;
      }

      .quality-summary {
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 900;
      }

      .output-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 8px;
      }

      .download,
      .secondary-action {
        min-height: 40px;
        border: 1px solid #cfe5df;
        border-radius: 8px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 900;
        text-decoration: none;
        padding: 8px 12px;
        background: #ecf7f4;
      }

      .secondary-action {
        color: var(--ink);
        background: #ffffff;
      }

      .ocr-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
        min-width: 0;
      }

      .ocr-panel[hidden] {
        display: none;
      }

      .ocr-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }

      .ocr-title {
        margin: 0;
        font-size: 16px;
      }

      .ocr-status {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .ocr-controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 8px;
      }

      .ocr-select {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        background: #ffffff;
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      .ocr-output {
        width: 100%;
        min-height: 180px;
        border: 0;
        resize: vertical;
        padding: 12px;
        color: var(--ink);
        background: #fbfcfe;
        font: 14px/1.65 "Noto Sans JP", "Yu Gothic", ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      .ocr-body {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        border-top: 1px solid var(--line);
      }

      .ocr-result {
        min-width: 0;
      }

      .ocr-result + .ocr-result {
        border-left: 1px solid var(--line);
      }

      .ocr-label {
        display: block;
        padding: 10px 12px 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .pages {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 14px;
        align-content: start;
        min-height: 0;
        overflow: auto;
        padding-right: 2px;
      }

      .page {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(26, 34, 44, 0.08);
      }

      .page img {
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        display: block;
        background: #eef1f5;
      }

      .page-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px;
      }

      .page-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .page-footer span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .page-meta {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.35;
        padding: 0 10px 10px;
      }

      .mini {
        min-height: 34px;
        min-width: 40px;
        padding: 0 8px;
        border-radius: 8px;
        font-size: 12px;
      }

      .placeholder {
        min-height: 360px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-weight: 800;
        text-align: center;
        padding: 24px;
      }

      @media (min-width: 1180px) {
        body {
          overflow: hidden;
        }

        .workspace.has-ocr {
          grid-template-columns: minmax(520px, 1fr) minmax(360px, 440px);
          grid-template-rows: auto minmax(0, 1fr);
        }

        .workspace.has-ocr .topbar {
          grid-column: 1 / -1;
        }

        .workspace.has-ocr .pages {
          grid-column: 1;
          grid-row: 2;
        }

        .workspace.has-ocr .ocr-panel {
          grid-column: 2;
          grid-row: 2;
          display: grid;
          grid-template-rows: auto minmax(0, 1fr);
          min-height: 0;
          max-height: 100%;
        }

        .workspace.has-ocr .ocr-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .workspace.has-ocr .ocr-controls {
          justify-content: flex-start;
          width: 100%;
        }

        .workspace.has-ocr .ocr-select,
        .workspace.has-ocr .ocr-controls button {
          flex: 1 1 150px;
        }

        .workspace.has-ocr .ocr-body {
          grid-template-columns: 1fr;
          min-height: 0;
          overflow: auto;
        }

        .workspace.has-ocr .ocr-result + .ocr-result {
          border-left: 0;
          border-top: 1px solid var(--line);
        }

        .workspace.has-ocr .ocr-output {
          min-height: 260px;
        }

        .pages:has(.placeholder) {
          grid-template-columns: 1fr;
        }
      }

      .corner-dialog {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(15, 18, 23, 0.7);
      }

      .corner-dialog[hidden] {
        display: none;
      }

      .corner-panel {
        width: min(100%, 1040px);
        max-height: calc(100vh - 32px);
        border-radius: 8px;
        background: #ffffff;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .corner-header,
      .corner-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .corner-actions {
        border-top: 1px solid var(--line);
        border-bottom: 0;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .corner-title {
        margin: 0;
        font-size: 18px;
      }

      .corner-stage {
        min-height: 0;
        padding: 14px;
        overflow: auto;
        background: #0f1217;
      }

      .corner-canvas {
        display: block;
        width: 100%;
        height: auto;
        min-height: 0;
        border-radius: 8px;
        background: #0f1217;
        touch-action: none;
        cursor: crosshair;
      }

      @media (max-width: 860px) {
        body {
          overflow: auto;
        }

        .app {
          grid-template-columns: 1fr;
          max-width: 100vw;
        }

        .panel {
          height: auto;
          position: static;
          overflow: visible;
          min-height: auto;
          width: 100%;
          max-width: 100vw;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .brand,
        .intake,
        .controls {
          min-width: 0;
        }

        .intake {
          min-height: 0;
        }

        .workspace {
          padding: 16px;
          height: auto;
          overflow: visible;
        }

        .pages {
          overflow: visible;
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          padding-right: 0;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .output-actions {
          justify-content: flex-start;
          width: 100%;
        }

        .ocr-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .ocr-controls {
          justify-content: flex-start;
          width: 100%;
        }

        .ocr-select,
        .ocr-controls button {
          flex: 1 1 136px;
        }

        .ocr-body {
          grid-template-columns: 1fr;
        }

        .ocr-result + .ocr-result {
          border-left: 0;
          border-top: 1px solid var(--line);
        }

        .brand {
          align-items: flex-start;
          flex-direction: column;
        }

        .mode-wrap {
          width: 100%;
        }

        .corner-panel {
          max-height: calc(100vh - 18px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <div class="brand">
          <div class="brand-copy">
            <h1>PocketCV PDF</h1>
            <p class="app-subtitle">スマホ内でスキャン画像とPDFを生成</p>
          </div>
          <label class="mode-wrap">
            <span class="mode-label">処理モード</span>
            <select id="mode" class="mode" aria-label="処理モード">
              <option value="auto">おすすめ自動</option>
              <option value="binary">白黒スキャン</option>
              <option value="gray">グレースキャン</option>
              <option value="color">カラースキャン</option>
              <option value="report">解析レポート</option>
              <option value="edges">エッジ</option>
            </select>
          </label>
        </div>

        <div id="intake" class="intake">
          <div id="intake-intro">
            <h2 class="intake-title">スキャン画像を追加</h2>
            <p class="intake-copy">撮影は端末のカメラ画面を直接開きます。アルバム選択では写真ライブラリだけを開きます。</p>
          </div>
          <div id="intake-actions" class="intake-actions">
            <button id="start" class="primary" type="button">撮影する</button>
            <label class="file-button" for="file">アルバムから選択</label>
            <input id="camera-file" class="file" type="file" accept="image/*" capture="environment" />
            <input id="file" class="file" type="file" accept="image/*" multiple />
          </div>
          <div id="pending-editor" class="pending-editor" hidden>
            <div class="pending-head">
              <div>
                <h2 class="intake-title">四隅を調整</h2>
                <p class="intake-copy">原稿の四隅をドラッグしてからスキャン画像を生成します。</p>
              </div>
              <div id="pending-name" class="pending-name"></div>
            </div>
            <canvas id="pending-corner-canvas" class="pending-canvas"></canvas>
            <div class="pending-tools">
              <button id="pending-reset" type="button">自動角に戻す</button>
              <button id="pending-cancel" class="danger" type="button">キャンセル</button>
              <button id="pending-process" class="primary" type="button">この四隅で生成</button>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="privacy-note">画像はアップロードされず、端末内で処理されます。</div>
          <label class="field-label">
            <span>PDFファイル名</span>
            <input id="filename" class="filename-input" type="text" value="pocketcv-scan" autocomplete="off" />
          </label>
          <button id="clear" class="danger" type="button" disabled>クリア</button>
          <button id="pdf" class="primary" type="button" disabled>スキャンPDFを生成</button>
        </div>
      </aside>

      <section class="workspace">
        <div class="topbar">
          <div class="topbar-main">
            <div id="status" class="status">0件 - 端末内処理</div>
            <div id="quality-summary" class="quality-summary">評価待ち</div>
          </div>
          <div class="output-actions">
            <a id="download" class="download" hidden download="pocketcv-scan.pdf">PDFを保存</a>
            <button id="share" class="secondary-action" type="button" hidden disabled>PDFを共有</button>
            <button id="install" class="secondary-action" type="button" hidden disabled>アプリを追加</button>
          </div>
        </div>
        <div id="pages" class="pages">
          <div class="placeholder">まだ画像がありません</div>
        </div>
        <section id="ocr-panel" class="ocr-panel" hidden>
          <div class="ocr-header">
            <div>
              <h2 class="ocr-title">OCR</h2>
              <div id="ocr-status" class="ocr-status">未実行</div>
            </div>
            <div class="ocr-controls">
              <select id="ocr-lang" class="ocr-select" aria-label="OCR言語">
                <option value="jpn+eng">日本語+英語</option>
                <option value="jpn">日本語</option>
                <option value="eng">英語</option>
                <option value="chi_sim+eng">中国語簡体字+英語</option>
              </select>
              <button id="ocr-run" class="secondary-action" type="button" disabled>OCR実行</button>
              <button id="layout-run" class="secondary-action" type="button" disabled>文書復元</button>
              <button id="ocr-copy" class="secondary-action" type="button" disabled>OCRコピー</button>
              <button id="ocr-download" class="secondary-action" type="button" disabled>TXT保存</button>
              <button id="layout-copy" class="secondary-action" type="button" disabled>MDコピー</button>
              <button id="layout-download" class="secondary-action" type="button" disabled>MD保存</button>
              <button id="docx-download" class="secondary-action" type="button" disabled>DOCX保存</button>
            </div>
          </div>
          <div class="ocr-body">
            <div class="ocr-result">
              <label class="ocr-label" for="ocr-output">OCRテキスト</label>
              <textarea id="ocr-output" class="ocr-output" readonly placeholder="OCR結果"></textarea>
            </div>
            <div class="ocr-result">
              <label class="ocr-label" for="layout-output">復元Markdown</label>
              <textarea id="layout-output" class="ocr-output" readonly placeholder="文書復元結果"></textarea>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div id="corner-dialog" class="corner-dialog" hidden>
      <section class="corner-panel" role="dialog" aria-modal="true" aria-labelledby="corner-title">
        <div class="corner-header">
          <h2 id="corner-title" class="corner-title">四隅を調整</h2>
          <button id="corner-close" class="mini" type="button">閉じる</button>
        </div>
        <div class="corner-stage">
          <canvas id="corner-editor-canvas" class="corner-canvas"></canvas>
        </div>
        <div class="corner-actions">
          <button id="corner-reset" type="button">自動角に戻す</button>
          <button id="corner-apply" class="primary" type="button">この四隅で生成</button>
        </div>
      </section>
    </div>

    <script>
      const MAX_SOURCE_IMAGE_EDGE = 3200;
      const MAX_SOURCE_IMAGE_PIXELS = 6500000;
      const A4_WIDTH = 595.28;
      const A4_HEIGHT = 841.89;
      const PAGE_MARGIN = 24;
      const PDF_MAX_IMAGE_EDGE = 3200;
      const PDF_MAX_IMAGE_PIXELS = 6500000;
      const TESSERACT_SCRIPT_URL = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
      let tesseractLoadPromise = null;

      const state = {
        pages: [],
        pendingScan: null,
        pendingQueue: [],
        pdfUrl: null,
        pdfBlob: null,
        pdfName: "",
        ocrText: "",
        ocrPages: [],
        ocrConfidence: null,
        ocrBusy: false,
        layoutText: "",
        layoutBusy: false,
        deferredInstallPrompt: null,
        busy: false,
      };

      const cornerEditor = {
        pageIndex: -1,
        corners: null,
        autoCorners: null,
        scale: 1,
        draggingIndex: -1,
      };

      const pendingEditor = {
        scale: 1,
        draggingIndex: -1,
      };

      const intakeEl = document.querySelector("#intake");
      const intakeIntro = document.querySelector("#intake-intro");
      const intakeActions = document.querySelector("#intake-actions");
      const pendingEditorEl = document.querySelector("#pending-editor");
      const pendingNameEl = document.querySelector("#pending-name");
      const pendingCanvas = document.querySelector("#pending-corner-canvas");
      const pendingResetButton = document.querySelector("#pending-reset");
      const pendingCancelButton = document.querySelector("#pending-cancel");
      const pendingProcessButton = document.querySelector("#pending-process");
      const startButton = document.querySelector("#start");
      const cameraFileInput = document.querySelector("#camera-file");
      const fileInput = document.querySelector("#file");
      const clearButton = document.querySelector("#clear");
      const pdfButton = document.querySelector("#pdf");
      const pagesEl = document.querySelector("#pages");
      const workspaceEl = document.querySelector(".workspace");
      const statusEl = document.querySelector("#status");
      const qualitySummaryEl = document.querySelector("#quality-summary");
      const downloadEl = document.querySelector("#download");
      const shareButton = document.querySelector("#share");
      const installButton = document.querySelector("#install");
      const filenameInput = document.querySelector("#filename");
      const modeEl = document.querySelector("#mode");
      const ocrPanel = document.querySelector("#ocr-panel");
      const ocrStatusEl = document.querySelector("#ocr-status");
      const ocrLangEl = document.querySelector("#ocr-lang");
      const ocrRunButton = document.querySelector("#ocr-run");
      const layoutRunButton = document.querySelector("#layout-run");
      const ocrCopyButton = document.querySelector("#ocr-copy");
      const ocrDownloadButton = document.querySelector("#ocr-download");
      const layoutCopyButton = document.querySelector("#layout-copy");
      const layoutDownloadButton = document.querySelector("#layout-download");
      const docxDownloadButton = document.querySelector("#docx-download");
      const ocrOutputEl = document.querySelector("#ocr-output");
      const layoutOutputEl = document.querySelector("#layout-output");
      const cornerDialog = document.querySelector("#corner-dialog");
      const cornerCanvas = document.querySelector("#corner-editor-canvas");
      const cornerCloseButton = document.querySelector("#corner-close");
      const cornerResetButton = document.querySelector("#corner-reset");
      const cornerApplyButton = document.querySelector("#corner-apply");

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function syncOcrControls() {
        const blocked = state.busy || state.ocrBusy || state.layoutBusy;
        ocrPanel.hidden = state.pages.length === 0 && !state.ocrText && !state.layoutText;
        workspaceEl.classList.toggle("has-ocr", !ocrPanel.hidden);
        ocrLangEl.disabled = blocked || state.pages.length === 0;
        ocrRunButton.disabled = blocked || state.pages.length === 0;
        layoutRunButton.disabled = blocked || state.ocrPages.length === 0;
        ocrCopyButton.disabled = blocked || !state.ocrText;
        ocrDownloadButton.disabled = blocked || !state.ocrText;
        layoutCopyButton.disabled = blocked || !state.layoutText;
        layoutDownloadButton.disabled = blocked || !state.layoutText;
        docxDownloadButton.disabled = blocked || (!state.layoutText && !state.ocrText);
      }

      function setBusy(value) {
        state.busy = value;
        startButton.disabled = value;
        cameraFileInput.disabled = value;
        fileInput.disabled = value;
        pendingResetButton.disabled = value || !state.pendingScan;
        pendingCancelButton.disabled = value || !state.pendingScan;
        pendingProcessButton.disabled = value || !state.pendingScan;
        clearButton.disabled = value || state.pages.length === 0;
        pdfButton.disabled = value || state.pages.length === 0;
        shareButton.disabled = value || !state.pdfBlob;
        installButton.disabled = value || !state.deferredInstallPrompt;
        cornerResetButton.disabled = value;
        cornerApplyButton.disabled = value;
        syncPendingEditor();
        syncOcrControls();
      }

      function syncPendingEditor() {
        const hasPending = Boolean(state.pendingScan);
        intakeEl.classList.toggle("has-pending", hasPending);
        intakeIntro.hidden = hasPending;
        intakeActions.hidden = hasPending;
        pendingEditorEl.hidden = !hasPending;
        pendingNameEl.textContent = hasPending ? state.pendingScan.name : "";
        pendingResetButton.disabled = state.busy || !hasPending;
        pendingCancelButton.disabled = state.busy || !hasPending;
        pendingProcessButton.disabled = state.busy || !hasPending;
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "var(--warn)" : "var(--muted)";
      }

      function setOcrStatus(message, isError = false) {
        ocrStatusEl.textContent = message;
        ocrStatusEl.style.color = isError ? "var(--warn)" : "var(--muted)";
      }

      function resetOcrResult() {
        state.ocrText = "";
        state.ocrPages = [];
        state.ocrConfidence = null;
        state.layoutText = "";
        ocrOutputEl.value = "";
        layoutOutputEl.value = "";
        setOcrStatus(state.pages.length ? "未実行" : "画像なし");
        syncOcrControls();
      }

      function setOcrBusy(value) {
        state.ocrBusy = value;
        syncOcrControls();
      }

      function setLayoutBusy(value) {
        state.layoutBusy = value;
        syncOcrControls();
      }

      function updateStatus() {
        const count = state.pages.length;
        setStatus(`${count}件 - 端末内処理`);
      }

      function qualityLabel(score) {
        if (score >= 82) {
          return "良好";
        }
        if (score >= 65) {
          return "確認";
        }
        return "再撮影推奨";
      }

      function scanQualityAdvice(metrics) {
        if (!metrics) {
          return { status: "pending", label: "評価待ち", action: "画像を追加してください" };
        }

        const issues = [];
        const addIssue = (severity, label, action) => {
          issues.push({ severity, label, action });
        };
        if (metrics.perspectiveConfidence < 0.28) {
          addIssue(3, "四隅を再調整", "四隅調整/再撮影");
        } else if (metrics.perspectiveConfidence < 0.48) {
          addIssue(2, "四隅確認", "端の切れを確認");
        }
        if (metrics.shadowResidual > 42 || metrics.shadowScore < 0.48) {
          addIssue(3, "影ムラ強め", "再撮影/グレー保存");
        } else if (metrics.shadowResidual > 28) {
          addIssue(2, "影ムラ確認", "白黒前に確認");
        }
        if (metrics.boldnessRisk > 0.55 || metrics.inkDensity > 0.16) {
          addIssue(3, "文字太り注意", "グレー保存/再撮影");
        } else if (metrics.boldnessRisk > 0.28) {
          addIssue(2, "文字太り確認", "小文字を確認");
        }
        if (metrics.brokenStrokeRisk > 0.52) {
          addIssue(3, "文字欠け注意", "グレー保存/再撮影");
        } else if (metrics.brokenStrokeRisk > 0.32) {
          addIssue(2, "文字欠け確認", "細字を確認");
        }
        if (metrics.paperGrayResidue > 0.08) {
          addIssue(2, "灰色残り", "再撮影/グレー保存");
        }
        if (metrics.qualityScore < 45) {
          addIssue(3, "再撮影推奨", "真上から撮り直す");
        } else if (metrics.qualityScore < 65) {
          addIssue(2, "品質確認", "レポート確認");
        }

        if (!issues.length) {
          return { status: "ready", label: "出力OK", action: "PDF化OK" };
        }
        issues.sort((a, b) => b.severity - a.severity);
        return { status: issues[0].severity >= 3 ? "retake" : "review", label: issues[0].label, action: issues[0].action };
      }

      function updateQualitySummary() {
        if (!state.pages.length) {
          qualitySummaryEl.textContent = "評価待ち";
          return;
        }

        const average = state.pages.reduce((sum, page) => sum + page.metrics.qualityScore, 0) / state.pages.length;
        const adviceList = state.pages.map((page) => scanQualityAdvice(page.metrics)).filter((advice) => advice.status !== "ready");
        const adviceText = adviceList.length ? ` · 要確認 ${adviceList.length}件: ${adviceList[0].label}` : "";
        qualitySummaryEl.textContent = `平均品質 ${Math.round(average)} / 100 · ${qualityLabel(average)}${adviceText}`;
      }

      function sanitizePdfName(value) {
        const cleaned = value.trim().replace(/[\\/:*?"<>|]+/g, "-").replace(/\s+/g, "-");
        return cleaned || "pocketcv-scan";
      }

      function formatFileSize(bytes) {
        if (bytes >= 1024 * 1024) {
          return `${Math.round((bytes / 1024 / 1024) * 10) / 10} MB`;
        }
        return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      }

      function formatSkewAngle(angle) {
        if (!Number.isFinite(angle) || Math.abs(angle) < 0.25) {
          return "傾き 0°";
        }
        return `傾き ${Math.round(angle * 10) / 10}°`;
      }

      function formatDewarpOffset(metrics) {
        if (!metrics || !metrics.dewarpApplied) {
          return "カーブ補正なし";
        }
        return `カーブ補正 ${Math.round((metrics.dewarpMaxOffset || 0) * 10) / 10}px`;
      }

      function formatResolution(page) {
        const current = `${page.sourceCanvas.width}×${page.sourceCanvas.height}`;
        if (
          Number.isFinite(page.sourceOriginalWidth) &&
          Number.isFinite(page.sourceOriginalHeight) &&
          (page.sourceOriginalWidth !== page.sourceCanvas.width || page.sourceOriginalHeight !== page.sourceCanvas.height)
        ) {
          return `解像度 元 ${page.sourceOriginalWidth}×${page.sourceOriginalHeight} → ${current}`;
        }
        return `解像度 ${current}`;
      }

      function cloneCorners(corners) {
        return corners ? corners.map((point) => ({ x: point.x, y: point.y })) : null;
      }

      function fallbackCorners(sourceCanvas) {
        const margin = Math.max(2, Math.min(sourceCanvas.width, sourceCanvas.height) * 0.006);
        return [
          { x: margin, y: margin },
          { x: sourceCanvas.width - margin, y: margin },
          { x: sourceCanvas.width - margin, y: sourceCanvas.height - margin },
          { x: margin, y: sourceCanvas.height - margin },
        ];
      }

      function revokePdfUrl() {
        if (state.pdfUrl) {
          URL.revokeObjectURL(state.pdfUrl);
          state.pdfUrl = null;
        }
        state.pdfBlob = null;
        state.pdfName = "";
        downloadEl.hidden = true;
        downloadEl.removeAttribute("href");
        shareButton.hidden = true;
        shareButton.disabled = true;
      }

      function updateInstallButton() {
        installButton.hidden = !state.deferredInstallPrompt;
        installButton.disabled = state.busy || !state.deferredInstallPrompt;
      }

      function refreshPages() {
        pagesEl.innerHTML = "";
        if (!state.pages.length) {
          const placeholder = document.createElement("div");
          placeholder.className = "placeholder";
          placeholder.textContent = "まだ画像がありません";
          pagesEl.appendChild(placeholder);
        }

        state.pages.forEach((page, index) => {
          const item = document.createElement("article");
          item.className = "page";

          const image = document.createElement("img");
          image.src = page.previewUrl;
          image.alt = `処理結果 ${index + 1}`;

          const footer = document.createElement("div");
          footer.className = "page-footer";

          const label = document.createElement("span");
          label.textContent = `${index + 1}件目 · ${page.displayName}`;

          const actions = document.createElement("div");
          actions.className = "page-actions";

          const moveUp = document.createElement("button");
          moveUp.className = "mini";
          moveUp.type = "button";
          moveUp.textContent = "上";
          moveUp.disabled = index === 0;
          moveUp.ariaLabel = `${index + 1}件目を上へ移動`;
          moveUp.addEventListener("click", () => {
            const previous = state.pages[index - 1];
            state.pages[index - 1] = page;
            state.pages[index] = previous;
            revokePdfUrl();
            resetOcrResult();
            refreshPages();
          });

          const moveDown = document.createElement("button");
          moveDown.className = "mini";
          moveDown.type = "button";
          moveDown.textContent = "下";
          moveDown.disabled = index === state.pages.length - 1;
          moveDown.ariaLabel = `${index + 1}件目を下へ移動`;
          moveDown.addEventListener("click", () => {
            const next = state.pages[index + 1];
            state.pages[index + 1] = page;
            state.pages[index] = next;
            revokePdfUrl();
            resetOcrResult();
            refreshPages();
          });

          const remove = document.createElement("button");
          remove.className = "mini danger";
          remove.type = "button";
          remove.textContent = "削除";
          remove.ariaLabel = `${index + 1}件目を削除`;
          remove.addEventListener("click", () => {
            URL.revokeObjectURL(page.previewUrl);
            state.pages.splice(index, 1);
            revokePdfUrl();
            resetOcrResult();
            refreshPages();
          });

          const corners = document.createElement("button");
          corners.className = "mini";
          corners.type = "button";
          corners.textContent = "角調整";
          corners.ariaLabel = `${index + 1}件目を上の四隅調整に戻す`;
          corners.addEventListener("click", () => editPageInIntake(index));

          const saveImage = document.createElement("button");
          saveImage.className = "mini";
          saveImage.type = "button";
          saveImage.textContent = "画像保存";
          saveImage.ariaLabel = `${index + 1}件目のスキャン画像を保存`;
          saveImage.addEventListener("click", () => savePageImage(index));

          actions.append(saveImage, corners, moveUp, moveDown, remove);
          footer.append(label, actions);
          const meta = document.createElement("div");
          meta.className = "page-meta";
          const advice = scanQualityAdvice(page.metrics);
          meta.textContent = page.metrics
            ? `品質 ${Math.round(page.metrics.qualityScore)} · ${qualityLabel(page.metrics.qualityScore)} · ${
                page.manualCorners ? "手動補正" : "自動補正"
              } ${Math.round(
                page.metrics.perspectiveConfidence * 100
              )}% · エッジ ${
                Math.round(page.metrics.edgeDensity * 1000) / 10
              }% · ${formatDewarpOffset(page.metrics)} · ${formatSkewAngle(page.metrics.deskewAngle)} · ${advice.label} · ${formatResolution(page)}`
            : "端末内で処理済み";

          item.append(image, footer, meta);
          pagesEl.appendChild(item);
        });

        updateStatus();
        updateQualitySummary();
        setBusy(false);
      }

      function dataUrlToBlob(dataUrl) {
        const [metadata, data] = dataUrl.split(",");
        const mime = metadata.match(/data:(.*);base64/)[1];
        const binary = atob(data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return new Blob([bytes], { type: mime });
      }

      async function savePageImage(index) {
        const page = state.pages[index];
        if (!page) {
          return;
        }

        try {
          const blob = await canvasToBlob(page.canvas, "image/png");
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${sanitizePdfName(filenameInput.value)}-${index + 1}.png`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.setTimeout(() => URL.revokeObjectURL(url), 800);
          setStatus(`スキャン画像を保存しました - ${index + 1}件目`);
        } catch (error) {
          setStatus(error.message || "画像を保存できませんでした。", true);
        }
      }

      function canvasToBlob(sourceCanvas, type = "image/jpeg", quality = 0.92) {
        return new Promise((resolve, reject) => {
          if (sourceCanvas.toBlob) {
            sourceCanvas.toBlob((blob) => {
              if (blob) {
                resolve(blob);
              } else {
                reject(new Error("画像を書き出せませんでした。"));
              }
            }, type, quality);
            return;
          }

          try {
            resolve(dataUrlToBlob(sourceCanvas.toDataURL(type, quality)));
          } catch (error) {
            reject(error);
          }
        });
      }

      function loadTesseract() {
        if (window.Tesseract) {
          return Promise.resolve(window.Tesseract);
        }

        if (!tesseractLoadPromise) {
          tesseractLoadPromise = new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = TESSERACT_SCRIPT_URL;
            script.async = true;
            script.onload = () => {
              if (window.Tesseract) {
                resolve(window.Tesseract);
              } else {
                reject(new Error("OCRエンジンを読み込めませんでした。"));
              }
            };
            script.onerror = () => reject(new Error("OCRエンジンを読み込めませんでした。通信状態を確認してください。"));
            document.head.appendChild(script);
          });
        }

        return tesseractLoadPromise;
      }

      function ocrProgressText(message) {
        const status = message.status ? String(message.status).replace(/_/g, " ") : "OCR";
        if (typeof message.progress === "number" && Number.isFinite(message.progress)) {
          return `${status} ${Math.round(message.progress * 100)}%`;
        }
        return status;
      }

      function formatOcrPageText(index, page, text, totalPages) {
        const cleaned = text.trim();
        if (totalPages === 1) {
          return cleaned;
        }
        return [`# ${index + 1}件目 ${page.displayName}`, cleaned || "文字を検出できませんでした。"].join("\n");
      }

      function buildOcrCanvas(page) {
        if (page.ocrCanvas) {
          return page.ocrCanvas;
        }

        const corrected = perspectiveCorrectCanvas(page.sourceCanvas, page.manualCorners);
        const dewarped = dewarpCanvasByTextlineColumns(corrected.canvas, corrected.detection);
        const deskewed = deskewCanvasByTextLines(dewarped.canvas, dewarped.detection);
        page.ocrCanvas = enhanceCanvas(deskewed.canvas, "gray", deskewed.detection).canvas;
        return page.ocrCanvas;
      }

      function normalizeOcrText(text) {
        return String(text || "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function normalizeOcrBox(source, width, height) {
        if (!source) {
          return null;
        }
        const x0 = Number(source.x0 ?? source.left ?? source.x ?? 0);
        const y0 = Number(source.y0 ?? source.top ?? source.y ?? 0);
        const x1 = Number(source.x1 ?? source.right ?? (Number(source.x) + Number(source.width)) ?? 0);
        const y1 = Number(source.y1 ?? source.bottom ?? (Number(source.y) + Number(source.height)) ?? 0);
        if (![x0, y0, x1, y1].every(Number.isFinite) || x1 <= x0 || y1 <= y0) {
          return null;
        }
        return {
          x0: clamp(Math.round(x0), 0, width),
          y0: clamp(Math.round(y0), 0, height),
          x1: clamp(Math.round(x1), 0, width),
          y1: clamp(Math.round(y1), 0, height),
        };
      }

      function unionOcrBoxes(items) {
        const boxes = items.map((item) => item.bbox).filter(Boolean);
        if (!boxes.length) {
          return null;
        }
        return {
          x0: Math.min(...boxes.map((box) => box.x0)),
          y0: Math.min(...boxes.map((box) => box.y0)),
          x1: Math.max(...boxes.map((box) => box.x1)),
          y1: Math.max(...boxes.map((box) => box.y1)),
        };
      }

      function collectOcrWords(container, width, height) {
        const rawWords = Array.isArray(container && container.words) ? container.words : [];
        return rawWords
          .map((word) => ({
            text: normalizeOcrText(word.text),
            confidence: Number(word.confidence),
            bbox: normalizeOcrBox(word.bbox || word, width, height),
          }))
          .filter((word) => word.text);
      }

      function median(values) {
        const sorted = values.filter(Number.isFinite).sort((a, b) => a - b);
        if (!sorted.length) {
          return 0;
        }
        return sorted[Math.floor(sorted.length / 2)];
      }

      function createLineFromWords(words) {
        const lineWords = words.sort((a, b) => a.bbox.x0 - b.bbox.x0);
        return {
          text: lineWords.map((word) => word.text).join(" "),
          confidence: median(lineWords.map((word) => word.confidence)),
          bbox: unionOcrBoxes(lineWords),
          words: lineWords,
        };
      }

      function splitWordGroupByColumnGap(words, width) {
        const sorted = [...words].sort((a, b) => a.bbox.x0 - b.bbox.x0);
        const groups = [];
        let current = [];
        let previous = null;
        sorted.forEach((word) => {
          const gap = previous ? word.bbox.x0 - previous.bbox.x1 : 0;
          if (previous && gap > width * 0.11) {
            groups.push(current);
            current = [];
          }
          current.push(word);
          previous = word;
        });
        if (current.length) {
          groups.push(current);
        }
        return groups;
      }

      function groupWordsIntoLines(words, width) {
        if (!words.length) {
          return [];
        }
        const sorted = [...words].sort((a, b) => a.bbox.y0 - b.bbox.y0 || a.bbox.x0 - b.bbox.x0);
        const medianHeight = Math.max(8, median(sorted.map((word) => word.bbox.y1 - word.bbox.y0)));
        const groups = [];
        sorted.forEach((word) => {
          const centerY = (word.bbox.y0 + word.bbox.y1) / 2;
          let group = groups.find((candidate) => Math.abs(candidate.centerY - centerY) <= medianHeight * 0.72);
          if (!group) {
            group = { centerY, words: [] };
            groups.push(group);
          }
          group.words.push(word);
          group.centerY = (group.centerY * (group.words.length - 1) + centerY) / group.words.length;
        });
        return groups.flatMap((group) => splitWordGroupByColumnGap(group.words, width).map(createLineFromWords));
      }

      function collectOcrLines(data, width, height) {
        let rawLines = [];
        if (Array.isArray(data.lines) && data.lines.length) {
          rawLines = data.lines;
        } else if (Array.isArray(data.blocks)) {
          data.blocks.forEach((block) => {
            (block.paragraphs || []).forEach((paragraph) => {
              rawLines.push(...(paragraph.lines || []));
            });
          });
        }

        const rawLineWords = rawLines.flatMap((line) => collectOcrWords(line, width, height)).filter((word) => word.bbox);
        const allWords = collectOcrWords(data, width, height).filter((word) => word.bbox);
        const groupedWordLines = groupWordsIntoLines(allWords.length ? allWords : rawLineWords, width);

        const lines = rawLines
          .map((line) => {
            const words = collectOcrWords(line, width, height);
            const bbox = normalizeOcrBox(line.bbox || line, width, height) || unionOcrBoxes(words);
            return {
              text: normalizeOcrText(line.text || words.map((word) => word.text).join(" ")),
              confidence: Number(line.confidence),
              bbox,
              words,
            };
          })
          .filter((line) => line.text && line.bbox);

        if (groupedWordLines.length >= Math.max(4, Math.round(lines.length * 0.65))) {
          return groupedWordLines;
        }

        if (lines.length) {
          return lines;
        }

        const words = collectOcrWords(data, width, height).filter((word) => word.bbox);
        const grouped = groupWordsIntoLines(words, width);
        if (grouped.length) {
          return grouped;
        }

        return String(data.text || "")
          .split(/\r?\n/)
          .map((text, index) => normalizeOcrText(text))
          .filter(Boolean)
          .map((text, index, all) => {
            const rowHeight = height / Math.max(1, all.length);
            return {
              text,
              confidence: Number(data.confidence),
              bbox: { x0: 0, y0: Math.round(index * rowHeight), x1: width, y1: Math.round((index + 0.8) * rowHeight) },
              words: [],
            };
          });
      }

      function extractOcrPage(result, page, pageIndex, ocrCanvas) {
        const data = result && result.data ? result.data : {};
        return {
          pageIndex,
          pageName: page.displayName,
          width: ocrCanvas.width,
          height: ocrCanvas.height,
          confidence: Number(data.confidence),
          text: String(data.text || "").trim(),
          lines: collectOcrLines(data, ocrCanvas.width, ocrCanvas.height),
        };
      }

      function detectColumnLayout(lines, width) {
        const sorted = [...lines].sort((a, b) => a.bbox.y0 - b.bbox.y0 || a.bbox.x0 - b.bbox.x0);
        if (sorted.length < 6) {
          return { type: "single", sections: [{ title: "本文", lines: sorted }] };
        }

        const buildSections = (split, minimumLines) => {
          const full = [];
          const left = [];
          const right = [];
          sorted.forEach((line) => {
            const center = (line.bbox.x0 + line.bbox.x1) / 2;
            const boxWidth = line.bbox.x1 - line.bbox.x0;
            if (boxWidth > width * 0.82 && line.text.length <= 80) {
              full.push(line);
            } else if (center < split) {
              left.push(line);
            } else {
              right.push(line);
            }
          });

          if (left.length < minimumLines || right.length < minimumLines) {
            return null;
          }

          const sections = [];
          if (full.length) {
            sections.push({ title: "全幅", lines: full });
          }
          sections.push({ title: "左カラム", lines: left }, { title: "右カラム", lines: right });
          return { type: "two-column", sections };
        };

        const centers = sorted
          .map((line) => (line.bbox.x0 + line.bbox.x1) / 2)
          .sort((a, b) => a - b);
        let bestGap = 0;
        let split = width / 2;
        for (let index = 1; index < centers.length; index += 1) {
          const gap = centers[index] - centers[index - 1];
          const leftCount = index;
          const rightCount = centers.length - index;
          if (leftCount >= 3 && rightCount >= 3 && gap > bestGap) {
            bestGap = gap;
            split = (centers[index] + centers[index - 1]) / 2;
          }
        }

        if (bestGap < width * 0.16) {
          const centerFallback = buildSections(width / 2, 6);
          if (centerFallback) {
            return centerFallback;
          }
          return { type: "single", sections: [{ title: "本文", lines: sorted }] };
        }

        return buildSections(split, 3) || buildSections(width / 2, 6) || { type: "single", sections: [{ title: "本文", lines: sorted }] };
      }

      function shouldJoinWithoutSpace(left, right) {
        return /[\u3040-\u30ff\u3400-\u9fff]$/.test(left) || /^[\u3040-\u30ff\u3400-\u9fff]/.test(right);
      }

      function appendParagraphLine(current, text) {
        if (!current) {
          return text;
        }
        return shouldJoinWithoutSpace(current, text) ? `${current}${text}` : `${current} ${text}`;
      }

      function lineLooksLikeHeading(line, medianHeight, pageWidth) {
        const text = line.text;
        const height = line.bbox.y1 - line.bbox.y0;
        const short = text.length <= 32;
        const sentenceLike = /[。.!?！？]$/.test(text);
        const labelLike = /^[A-Za-z0-9０-９一-龥ぁ-んァ-ン\s()（）/・:+-]+$/.test(text);
        return short && !sentenceLike && labelLike && height > medianHeight * 1.24;
      }

      function markdownLineText(text) {
        return text.replace(/^#+\s*/, "").replace(/\s+([。、，,.])/, "$1").trim();
      }

      function renderLayoutLines(lines, pageWidth) {
        const sorted = [...lines].sort((a, b) => a.bbox.y0 - b.bbox.y0 || a.bbox.x0 - b.bbox.x0);
        const medianHeight = Math.max(8, median(sorted.map((line) => line.bbox.y1 - line.bbox.y0)));
        const output = [];
        let paragraph = "";
        let previous = null;
        const flush = () => {
          if (paragraph) {
            output.push(paragraph);
            paragraph = "";
          }
        };

        sorted.forEach((line) => {
          const text = markdownLineText(line.text);
          if (!text) {
            return;
          }
          const gap = previous ? line.bbox.y0 - previous.bbox.y1 : 0;
          const indentShift = previous ? Math.abs(line.bbox.x0 - previous.bbox.x0) : 0;
          const bullet = /^[•・●\-*]\s*/.test(text);
          const heading = lineLooksLikeHeading(line, medianHeight, pageWidth);

          if (heading) {
            flush();
            output.push(`### ${text}`);
          } else if (bullet) {
            flush();
            output.push(`- ${text.replace(/^[•・●\-*]\s*/, "")}`);
          } else {
            if (paragraph && (gap > medianHeight * 1.55 || indentShift > pageWidth * 0.09)) {
              flush();
            }
            paragraph = appendParagraphLine(paragraph, text);
          }
          previous = line;
        });
        flush();
        return output.join("\n\n");
      }

      function recoverLayoutMarkdown(ocrPages) {
        const pages = [];
        const stats = { twoColumnPages: 0, lineCount: 0 };
        ocrPages.forEach((page) => {
          const lines = page.lines.filter((line) => line.text && line.bbox);
          stats.lineCount += lines.length;
          const layout = detectColumnLayout(lines, page.width);
          if (layout.type === "two-column") {
            stats.twoColumnPages += 1;
          }
          const pageParts = [`## ${page.pageIndex + 1}件目 ${page.pageName}`];
          layout.sections.forEach((section) => {
            const body = renderLayoutLines(section.lines, page.width);
            if (body) {
              pageParts.push(`### ${section.title}`, body);
            }
          });
          pages.push(pageParts.join("\n\n"));
        });
        return {
          markdown: ["# 復元文書", ...pages].join("\n\n").trim(),
          stats,
        };
      }

      function runLayoutRecovery() {
        if (!state.ocrPages.length) {
          setOcrStatus("先にOCRを実行してください。", true);
          return;
        }

        setLayoutBusy(true);
        setOcrStatus("文書構造を復元中...");
        try {
          const recovered = recoverLayoutMarkdown(state.ocrPages);
          state.layoutText = recovered.markdown;
          layoutOutputEl.value = state.layoutText;
          setOcrStatus(`文書復元完了 · ${recovered.stats.lineCount}行 · ${recovered.stats.twoColumnPages}ページでカラム検出`);
        } catch (error) {
          state.layoutText = "";
          layoutOutputEl.value = "";
          setOcrStatus(error.message || "文書復元に失敗しました。", true);
        } finally {
          setLayoutBusy(false);
        }
      }

      async function runOcr() {
        if (!state.pages.length) {
          setOcrStatus("画像なし", true);
          return;
        }

        setOcrBusy(true);
        state.ocrText = "";
        state.ocrPages = [];
        state.ocrConfidence = null;
        state.layoutText = "";
        ocrOutputEl.value = "";
        layoutOutputEl.value = "";
        setOcrStatus("OCR準備中...");

        try {
          const Tesseract = await loadTesseract();
          const language = ocrLangEl.value;
          const chunks = [];
          const confidences = [];
          const ocrPages = [];

          for (let index = 0; index < state.pages.length; index += 1) {
            const page = state.pages[index];
            setOcrStatus(`OCR ${index + 1}/${state.pages.length} 準備中...`);
            const ocrCanvas = buildOcrCanvas(page);
            const result = await Tesseract.recognize(ocrCanvas.toDataURL("image/png"), language, {
              logger: (message) => setOcrStatus(`OCR ${index + 1}/${state.pages.length} · ${ocrProgressText(message)}`),
            });
            const text = result && result.data && result.data.text ? result.data.text : "";
            const confidence = result && result.data ? Number(result.data.confidence) : NaN;
            if (Number.isFinite(confidence)) {
              confidences.push(confidence);
            }
            chunks.push(formatOcrPageText(index, page, text, state.pages.length));
            ocrPages.push(extractOcrPage(result, page, index, ocrCanvas));
          }

          const joined = chunks.join("\n\n").trim();
          state.ocrText = joined;
          state.ocrPages = ocrPages;
          revokePdfUrl();
          if (confidences.length) {
            state.ocrConfidence = confidences.reduce((sum, value) => sum + value, 0) / confidences.length;
          }
          ocrOutputEl.value = joined || "文字を検出できませんでした。";
          setOcrStatus(
            state.ocrConfidence === null ? "OCR完了" : `OCR完了 · 信頼度 ${Math.round(state.ocrConfidence)}`
          );
        } catch (error) {
          state.ocrText = "";
          state.ocrPages = [];
          state.ocrConfidence = null;
          state.layoutText = "";
          ocrOutputEl.value = "";
          layoutOutputEl.value = "";
          setOcrStatus(error.message || "OCRに失敗しました。", true);
        } finally {
          setOcrBusy(false);
        }
      }

      async function copyOcrText() {
        if (!state.ocrText) {
          return;
        }

        try {
          await navigator.clipboard.writeText(state.ocrText);
          setOcrStatus("OCR結果をコピーしました。");
        } catch (_error) {
          setOcrStatus("コピーできませんでした。", true);
        }
      }

      function downloadOcrText() {
        if (!state.ocrText) {
          return;
        }

        const blob = new Blob([state.ocrText], { type: "text/plain;charset=utf-8" });

        link.download = `${sanitizePdfName(filenameInput.value)}.txt`;
        document.body.appendChild(link);

      async function copyLayoutText() {

          return;
        }

        try {
          await navigator.clipboard.writeText(state.layoutText);
          setOcrStatus("Markdownをコピーしました。");
        } catch (_error) {

        }
      }

      function downloadLayoutText() {
        if (!state.layoutText) {
          return;
        }

        const blob = new Blob([state.layoutText], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
