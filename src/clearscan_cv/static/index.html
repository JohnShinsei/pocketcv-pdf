          ["透視補正信頼度", `${Math.round(metrics.perspectiveConfidence * 100)}%`],
          ["文字行カーブ補正", metrics.dewarpApplied ? `${Math.round((metrics.dewarpMaxOffset || 0) * 10) / 10}px` : "未適用"],
          ["文字行傾き補正", `${Math.round((metrics.deskewAngle || 0) * 10) / 10}°`],
          ["影ムラ残り", `${Math.round((metrics.shadowResidual || 0) * 10) / 10}`],
          ["文字の墨量", `${Math.round((metrics.inkDensity || 0) * 1000) / 10}%`],
          ["加太りリスク", `${Math.round((metrics.boldnessRisk || 0) * 100)}%`],
          ["文字欠けリスク", `${Math.round((metrics.brokenStrokeRisk || 0) * 100)}%`],
          ["筆画細化", metrics.strokeThinApplied ? "適用" : "未適用"],
          ["エッジ密度", `${Math.round(metrics.edgeDensity * 1000) / 10}%`],
          ["コントラスト", `${Math.round(metrics.contrast * 10) / 10}`],
          ["二値化しきい値", `${metrics.threshold}`],
        ];

        context.font = "700 21px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        rows.forEach((row, index) => {
          const y = 872 + index * 39;
          context.fillStyle = index % 2 === 0 ? "#f6f8fb" : "#ffffff";
          context.fillRect(626, y - 24, 510, 32);
          context.fillStyle = "#687386";
          context.fillText(row[0], 648, y);
          context.fillStyle = "#157f72";
          context.textAlign = "right";
          context.fillText(row[1], 1110, y);
          context.textAlign = "left";
        });

        context.fillStyle = "#d9dee8";
        context.fillRect(64, 1462, 1072, 2);
        context.font = "700 22px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillStyle = "#687386";
        context.fillText("ブラウザ内で生成。画像はアップロードされません。", 64, 1518);
        return report;
      }

      async function processSourceCanvas(sourceCanvas, sourceBlob, name, manualCorners = null) {
        const renderMode = modeEl.value;
        const corrected = perspectiveCorrectCanvas(sourceCanvas, manualCorners);
        const enhanced =
          renderMode === "color"
            ? buildColorGeometryResult(corrected.canvas, corrected.detection)
            : (() => {
                const dewarped = dewarpCanvasByTextlineColumns(corrected.canvas, corrected.detection);
                const deskewed = deskewCanvasByTextLines(dewarped.canvas, dewarped.detection);
                return enhanceCanvas(deskewed.canvas, renderMode, deskewed.detection);
              })();
        const processedCanvas =
          renderMode === "report" ? buildAnalysisCanvas(sourceCanvas, enhanced.canvas, enhanced.edgeCanvas, enhanced.metrics) : enhanced.canvas;
        const outputMode = renderMode === "report" ? "report" : enhanced.metrics.selectedMode || renderMode;
        const previewType = outputMode === "binary" || outputMode === "edges" ? "image/png" : "image/jpeg";
        const processedBlob = await canvasToBlob(processedCanvas, previewType, 0.92);
        return {
          sourceBlob,
          sourceCanvas,
          name,
          displayName: name.replace(/\.[^.]+$/, "").slice(0, 28),
          sourceOriginalWidth: Number(sourceCanvas.dataset.originalWidth || sourceCanvas.width),
          sourceOriginalHeight: Number(sourceCanvas.dataset.originalHeight || sourceCanvas.height),
          canvas: processedCanvas,
          pdfMode: outputMode,
          metrics: enhanced.metrics,
          autoCorners: corrected.autoCorners || fallbackCorners(sourceCanvas),
          manualCorners: cloneCorners(manualCorners),
          previewUrl: URL.createObjectURL(processedBlob),
        };
      }

      async function processBlob(blob, name, manualCorners = null) {
        const image = await loadImage(blob);
        const sourceCanvas = drawImageToCanvas(image);
        return processSourceCanvas(sourceCanvas, blob, name, manualCorners);
      }

      function setupPendingCanvas() {
        const pending = state.pendingScan;
        if (!pending) {
          return;
        }

        const maxWidth = Math.max(260, pendingEditorEl.clientWidth || intakeEl.clientWidth || 360);
        const maxHeight = Math.max(260, Math.min(560, window.innerHeight * 0.52));
        pendingEditor.scale = Math.min(1, maxWidth / pending.sourceCanvas.width, maxHeight / pending.sourceCanvas.height);
        pendingCanvas.width = Math.max(1, Math.round(pending.sourceCanvas.width * pendingEditor.scale));
        pendingCanvas.height = Math.max(1, Math.round(pending.sourceCanvas.height * pendingEditor.scale));
      }

      function pendingToEditorPoint(sourcePoint) {
        return {
          x: sourcePoint.x * pendingEditor.scale,
          y: sourcePoint.y * pendingEditor.scale,
        };
      }

      function pendingEventToSourcePoint(event) {
        const pending = state.pendingScan;
        const rect = pendingCanvas.getBoundingClientRect();
        const canvasX = ((event.clientX - rect.left) / rect.width) * pendingCanvas.width;
        const canvasY = ((event.clientY - rect.top) / rect.height) * pendingCanvas.height;
        return {
          x: clamp(canvasX / pendingEditor.scale, 0, pending.sourceCanvas.width - 1),
          y: clamp(canvasY / pendingEditor.scale, 0, pending.sourceCanvas.height - 1),
        };
      }

      function drawPendingEditor() {
        const pending = state.pendingScan;
        if (!pending || !pending.corners) {
          return;
        }

        const context = pendingCanvas.getContext("2d");
        context.clearRect(0, 0, pendingCanvas.width, pendingCanvas.height);
        context.drawImage(pending.sourceCanvas, 0, 0, pendingCanvas.width, pendingCanvas.height);

        const points = pending.corners.map(pendingToEditorPoint);
        context.save();
        context.fillStyle = "rgba(21, 127, 114, 0.16)";
        context.strokeStyle = "#10b59f";
        context.lineWidth = 3;
        context.beginPath();
        points.forEach((point, index) => {
          if (index === 0) {
            context.moveTo(point.x, point.y);
          } else {
            context.lineTo(point.x, point.y);
          }
        });
        context.closePath();
        context.fill();
        context.stroke();

        const labels = ["左上", "右上", "右下", "左下"];
        points.forEach((point, index) => {
          context.beginPath();
          context.fillStyle = index === pendingEditor.draggingIndex ? "#d9892b" : "#157f72";
          context.strokeStyle = "#ffffff";
          context.lineWidth = 4;
          context.arc(point.x, point.y, 14, 0, Math.PI * 2);
          context.fill();
          context.stroke();
          context.font = "900 13px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
          context.textAlign = "center";
          context.textBaseline = "middle";
          context.fillStyle = "#ffffff";
          context.fillText(labels[index], point.x, point.y);
        });
        context.restore();
      }

      function nearestPendingCornerIndex(event) {
        const pending = state.pendingScan;
        if (!pending || !pending.corners) {
          return -1;
        }
        const rect = pendingCanvas.getBoundingClientRect();
        const canvasX = ((event.clientX - rect.left) / rect.width) * pendingCanvas.width;
        const canvasY = ((event.clientY - rect.top) / rect.height) * pendingCanvas.height;
        let bestIndex = -1;
        let bestDistance = Infinity;
        pending.corners.map(pendingToEditorPoint).forEach((point, index) => {
          const distance = Math.hypot(point.x - canvasX, point.y - canvasY);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        });
        return bestDistance <= 72 ? bestIndex : -1;
      }

      function closestPendingCornerIndex(event) {
        const pending = state.pendingScan;
        const rect = pendingCanvas.getBoundingClientRect();
        const canvasX = ((event.clientX - rect.left) / rect.width) * pendingCanvas.width;
        const canvasY = ((event.clientY - rect.top) / rect.height) * pendingCanvas.height;
        let bestIndex = 0;
        let bestDistance = Infinity;
        pending.corners.map(pendingToEditorPoint).forEach((point, index) => {
          const distance = Math.hypot(point.x - canvasX, point.y - canvasY);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        });
        return bestIndex;
      }

      async function openPendingScan(blob, name, options = {}) {
        setBusy(true);
        setStatus("四隅を検出中...");
        try {
          const sourceCanvas = options.sourceCanvas || drawImageToCanvas(await loadImage(blob));
          const detection = detectDocumentQuad(sourceCanvas);
          const autoCorners = detection.found ? cloneCorners(detection.corners) : fallbackCorners(sourceCanvas);
          state.pendingScan = {
            blob,
            name,
            sourceCanvas,
            autoCorners,
            corners: cloneCorners(options.initialCorners || autoCorners),
            replacePageIndex: Number.isInteger(options.replacePageIndex) ? options.replacePageIndex : -1,
          };
          pendingEditor.draggingIndex = -1;
          syncPendingEditor();
          setupPendingCanvas();
          drawPendingEditor();
          setBusy(false);
          setStatus("四隅を調整してから生成してください。");
        } catch (error) {
          state.pendingScan = null;
          syncPendingEditor();
          setBusy(false);
          setStatus(error.message || "画像を読み込めませんでした。", true);
          await openNextPendingScan();
        }
      }

      async function openNextPendingScan() {
        if (state.pendingScan || state.busy || !state.pendingQueue.length) {
          return;
        }
        const next = state.pendingQueue.shift();
        await openPendingScan(next.blob, next.name);
      }

      async function queueBlobForCornerEditing(blob, name) {
        revokePdfUrl();
        state.pendingQueue.push({ blob, name });
        await openNextPendingScan();
      }

      async function processPendingScan() {
        const pending = state.pendingScan;
        if (!pending || !pending.corners) {
          return;
        }

        revokePdfUrl();
        setBusy(true);
        setStatus("四隅からスキャンを生成中...");
        try {
          const page = await processSourceCanvas(pending.sourceCanvas, pending.blob, pending.name, cloneCorners(pending.corners));
          if (pending.replacePageIndex >= 0 && state.pages[pending.replacePageIndex]) {
            URL.revokeObjectURL(state.pages[pending.replacePageIndex].previewUrl);
            state.pages[pending.replacePageIndex] = page;
          } else {
            state.pages.push(page);
          }
          state.pendingScan = null;
          pendingEditor.draggingIndex = -1;
          syncPendingEditor();
          resetOcrResult();
          refreshPages();
          setStatus("指定した四隅でスキャンを生成しました。");
          await openNextPendingScan();
        } catch (error) {
          setBusy(false);
          setStatus(error.message || "四隅から生成できませんでした。", true);
        }
      }

      async function cancelPendingScan() {
        state.pendingScan = null;
        pendingEditor.draggingIndex = -1;
        syncPendingEditor();
        if (state.pendingQueue.length) {
          await openNextPendingScan();
        } else {
          updateStatus();
        }
      }

      function resetPendingCorners() {
        const pending = state.pendingScan;
        if (!pending) {
          return;
        }
        pending.corners = cloneCorners(pending.autoCorners) || fallbackCorners(pending.sourceCanvas);
        drawPendingEditor();
      }

      async function editPageInIntake(pageIndex) {
        const page = state.pages[pageIndex];
        if (!page) {
          return;
        }
        await openPendingScan(page.sourceBlob, page.name, {
          sourceCanvas: page.sourceCanvas,
          initialCorners: cloneCorners(page.manualCorners || page.autoCorners),
          replacePageIndex: pageIndex,
        });
      }

      async function reprocessPages() {
        if (!state.pages.length) {
          return;
        }

        revokePdfUrl();
        setBusy(true);
        setStatus("端末内で再処理中...");
        try {
          const sourcePages = state.pages.map((page) => ({ blob: page.sourceBlob, name: page.name, manualCorners: cloneCorners(page.manualCorners) }));
          state.pages.forEach((page) => URL.revokeObjectURL(page.previewUrl));
          state.pages = [];
          for (const page of sourcePages) {
            state.pages.push(await processBlob(page.blob, page.name, page.manualCorners));
          }
          resetOcrResult();
          refreshPages();
        } catch (error) {
          setBusy(false);
          setStatus(error.message || "再処理できませんでした。", true);
        }
      }

        context.restore();
      }

      function nearestCornerIndex(event) {
        const rect = cornerCanvas.getBoundingClientRect();
        const canvasX = ((event.clientX - rect.left) / rect.width) * cornerCanvas.width;
        const canvasY = ((event.clientY - rect.top) / rect.height) * cornerCanvas.height;
        let bestIndex = -1;

      function closestCornerIndex(event) {

        const canvasX = ((event.clientX - rect.left) / rect.width) * cornerCanvas.width;
        const canvasY = ((event.clientY - rect.top) / rect.height) * cornerCanvas.height;
        let bestIndex = 0;

        cornerEditor.corners.map(toEditorPoint).forEach((point, index) => {

      function closeCornerEditor() {
        cornerDialog.hidden = true;
        cornerEditor.pageIndex = -1;
        cornerEditor.corners = null;
        cornerEditor.autoCorners = null;
        cornerEditor.draggingIndex = -1;
      }

      async function applyCornerEditor() {
        const page = state.pages[cornerEditor.pageIndex];
        if (!page || !cornerEditor.corners) {
          return;
        }

        const pageIndex = cornerEditor.pageIndex;
        const manualCorners = cloneCorners(cornerEditor.corners);
        revokePdfUrl();
        setBusy(true);
        setStatus("四隅からスキャンを再生成中...");
        try {
          const updatedPage = await processSourceCanvas(page.sourceCanvas, page.sourceBlob, page.name, manualCorners);
          URL.revokeObjectURL(page.previewUrl);
          state.pages[pageIndex] = updatedPage;
          closeCornerEditor();
          resetOcrResult();
          refreshPages();
          setStatus("手動の四隅で再生成しました。");
        } catch (error) {
          setBusy(false);
          setStatus(error.message || "四隅から再生成できませんでした。", true);
        }
      }

      cornerCloseButton.addEventListener("click", closeCornerEditor);
      cornerDialog.addEventListener("click", (event) => {
        if (event.target === cornerDialog) {
          closeCornerEditor();
        }
      });

      cornerResetButton.addEventListener("click", () => {
        const page = state.pages[cornerEditor.pageIndex];
        if (!page) {
          return;
        }
        cornerEditor.corners = cloneCorners(cornerEditor.autoCorners) || fallbackCorners(page.sourceCanvas);
        drawCornerEditor();
      });

      cornerApplyButton.addEventListener("click", applyCornerEditor);

      cornerCanvas.addEventListener("pointerdown", (event) => {
        if (cornerDialog.hidden || !cornerEditor.corners) {
          return;
        }
        event.preventDefault();
        cornerEditor.draggingIndex = nearestCornerIndex(event);
        if (cornerEditor.draggingIndex === -1) {
          cornerEditor.draggingIndex = closestCornerIndex(event);
          cornerEditor.corners[cornerEditor.draggingIndex] = eventToSourcePoint(event);
        }
        cornerCanvas.setPointerCapture(event.pointerId);
        drawCornerEditor();
      });

      cornerCanvas.addEventListener("pointermove", (event) => {
        if (cornerEditor.draggingIndex === -1 || !cornerEditor.corners) {
          return;
        }
        event.preventDefault();
        cornerEditor.corners[cornerEditor.draggingIndex] = eventToSourcePoint(event);
        drawCornerEditor();
      });

      cornerCanvas.addEventListener("pointerup", (event) => {
        if (cornerEditor.draggingIndex !== -1) {
          cornerCanvas.releasePointerCapture(event.pointerId);
        }
        cornerEditor.draggingIndex = -1;
        drawCornerEditor();
      });

      cornerCanvas.addEventListener("pointercancel", () => {
        cornerEditor.draggingIndex = -1;
        drawCornerEditor();
      });

      pendingResetButton.addEventListener("click", resetPendingCorners);
      pendingCancelButton.addEventListener("click", cancelPendingScan);
      pendingProcessButton.addEventListener("click", processPendingScan);

      pendingCanvas.addEventListener("pointerdown", (event) => {
        if (!state.pendingScan || !state.pendingScan.corners) {
          return;
        }
        event.preventDefault();
        pendingEditor.draggingIndex = nearestPendingCornerIndex(event);
        if (pendingEditor.draggingIndex === -1) {
          pendingEditor.draggingIndex = closestPendingCornerIndex(event);
          state.pendingScan.corners[pendingEditor.draggingIndex] = pendingEventToSourcePoint(event);
        }
        pendingCanvas.setPointerCapture(event.pointerId);
        drawPendingEditor();
      });

      pendingCanvas.addEventListener("pointermove", (event) => {
        if (pendingEditor.draggingIndex === -1 || !state.pendingScan || !state.pendingScan.corners) {
          return;
        }
        event.preventDefault();
        state.pendingScan.corners[pendingEditor.draggingIndex] = pendingEventToSourcePoint(event);
        drawPendingEditor();
      });

      pendingCanvas.addEventListener("pointerup", (event) => {
        if (pendingEditor.draggingIndex !== -1) {
          pendingCanvas.releasePointerCapture(event.pointerId);
        }
        pendingEditor.draggingIndex = -1;
        drawPendingEditor();
      });

      pendingCanvas.addEventListener("pointercancel", () => {
        pendingEditor.draggingIndex = -1;
        drawPendingEditor();
      });

      window.addEventListener("resize", () => {
        if (!cornerDialog.hidden && cornerEditor.pageIndex >= 0) {
          setupCornerCanvas(state.pages[cornerEditor.pageIndex]);
          drawCornerEditor();
        }
        if (state.pendingScan) {
          setupPendingCanvas();
          drawPendingEditor();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !cornerDialog.hidden) {
          closeCornerEditor();
        } else if (event.key === "Escape" && state.pendingScan) {
          cancelPendingScan();
        }
      });

      function openCameraCapture() {
        cameraFileInput.click();
      }

      function textBytes(text) {
        return new TextEncoder().encode(text);
      }

      function concatBytes(chunks) {
        const size = chunks.reduce((total, chunk) => total + chunk.length, 0);
        const output = new Uint8Array(size);
        let offset = 0;
        chunks.forEach((chunk) => {
          output.set(chunk, offset);
          offset += chunk.length;
        });
        return output;
      }

      function fitCanvasForPdf(sourceCanvas) {
        const pixelScale = Math.sqrt(PDF_MAX_IMAGE_PIXELS / Math.max(1, sourceCanvas.width * sourceCanvas.height));
        const edgeScale = PDF_MAX_IMAGE_EDGE / Math.max(sourceCanvas.width, sourceCanvas.height);
        const scale = Math.min(1, pixelScale, edgeScale);
        if (scale >= 0.995) {
          return sourceCanvas;
        }

        const output = document.createElement("canvas");
        output.width = Math.max(1, Math.round(sourceCanvas.width * scale));
        output.height = Math.max(1, Math.round(sourceCanvas.height * scale));
        const context = output.getContext("2d");
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, output.width, output.height);
        context.drawImage(sourceCanvas, 0, 0, output.width, output.height);
        return output;
      }

      function grayscaleBytesFromCanvas(sourceCanvas) {
        const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const image = context.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        const gray = new Uint8Array(sourceCanvas.width * sourceCanvas.height);
        for (let i = 0, p = 0; i < image.data.length; i += 4, p += 1) {
          gray[p] = Math.round(luminance(image.data[i], image.data[i + 1], image.data[i + 2]));
        }
        return gray;
      }

      async function deflateBytes(bytes) {
        if (!("CompressionStream" in window)) {
          return null;
        }

        const compressedStream = new Blob([bytes]).stream().pipeThrough(new CompressionStream("deflate"));
        return new Uint8Array(await new Response(compressedStream).arrayBuffer());
      }

      function jpegQualityForPdfMode(mode) {
        if (mode === "report") {
          return 0.88;
        }
        if (mode === "gray") {
          return 0.87;
        }
        if (mode === "binary" || mode === "edges") {
          return 0.9;
        }
        return 0.91;
      }

      async function jpegBytesFromCanvas(pageCanvas, quality) {
        const blob = await canvasToBlob(pageCanvas, "image/jpeg", quality);
        return new Uint8Array(await blob.arrayBuffer());
      }

      async function encodePdfImageFromCanvas(pageCanvas, mode) {
        const canvasForPdf = fitCanvasForPdf(pageCanvas);
        if (mode === "binary" || mode === "edges") {
          const grayBytes = grayscaleBytesFromCanvas(canvasForPdf);
          const compressed = await deflateBytes(grayBytes);
          if (compressed && compressed.length < grayBytes.length) {
            return {
              bytes: compressed,
              width: canvasForPdf.width,
              height: canvasForPdf.height,
              colorSpace: "/DeviceGray",
              bitsPerComponent: 8,
              filter: "/FlateDecode",
            };
          }
        }

        return {
          bytes: await jpegBytesFromCanvas(canvasForPdf, jpegQualityForPdfMode(mode)),
          width: canvasForPdf.width,
          height: canvasForPdf.height,
          colorSpace: "/DeviceRGB",
          bitsPerComponent: 8,
          filter: "/DCTDecode",
        };
      }

      function pdfUtf16HexString(value) {
        const bytes = [0xfe, 0xff];
        for (let i = 0; i < value.length; i += 1) {
          const code = value.charCodeAt(i);
          bytes.push((code >> 8) & 0xff, code & 0xff);
        }
        return `<${bytes.map((byte) => byte.toString(16).padStart(2, "0").toUpperCase()).join("")}>`;
      }

      function pdfDateString(date = new Date()) {
        const pad = (value, length = 2) => String(value).padStart(length, "0");
        const offset = -date.getTimezoneOffset();
        const sign = offset >= 0 ? "+" : "-";
        const hours = pad(Math.floor(Math.abs(offset) / 60));
        const minutes = pad(Math.abs(offset) % 60);
        return `D:${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}${pad(date.getHours())}${pad(
          date.getMinutes()
        )}${pad(date.getSeconds())}${sign}${hours}'${minutes}'`;
      }

      function ocrPageForPdf(index, ocrPages) {
        return (
          (ocrPages || []).find((page) => page && page.pageIndex === index && Array.isArray(page.lines) && page.lines.length) || null
        );
      }

      function pdfHiddenTextCommands(ocrPage, drawWidth, drawHeight, originX, originY) {
        if (!ocrPage || !ocrPage.width || !ocrPage.height || !Array.isArray(ocrPage.lines)) {
          return "";
        }

        const scaleX = drawWidth / Math.max(1, ocrPage.width);
        const scaleY = drawHeight / Math.max(1, ocrPage.height);
        return ocrPage.lines
          .map((line) => {
            const text = normalizeOcrText(line.text);
            const box = line.bbox;
            if (!text || !box) {
              return "";
            }
            const x0 = clamp(Number(box.x0), 0, ocrPage.width);
            const y0 = clamp(Number(box.y0), 0, ocrPage.height);
            const x1 = clamp(Number(box.x1), 0, ocrPage.width);
            const y1 = clamp(Number(box.y1), 0, ocrPage.height);
            if (![x0, y0, x1, y1].every(Number.isFinite) || x1 <= x0 || y1 <= y0) {
              return "";
            }
            const pdfX = originX + x0 * scaleX;
            const pdfY = originY + (ocrPage.height - y1) * scaleY;
            const fontSize = clamp((y1 - y0) * scaleY * 0.92, 4, 32);
            return `BT /F1 ${fontSize.toFixed(2)} Tf 3 Tr 1 0 0 1 ${pdfX.toFixed(2)} ${pdfY.toFixed(2)} Tm ${pdfUtf16HexString(
              text
            )} Tj ET\n`;
          })
          .join("");
      }

      async function createPdfBlob(pages, title = "PocketCV PDF", ocrPages = []) {
        const encoder = new TextEncoder();
        const objects = new Map();
        let nextId = 1;
        const reserve = () => nextId++;

        const catalogId = reserve();
        const pagesId = reserve();
        const infoId = reserve();
        const fontId = reserve();
        const pageRefs = [];

        const imageData = [];
        for (const page of pages) {
          imageData.push(await encodePdfImageFromCanvas(page.canvas, page.pdfMode || "color"));
        }

        imageData.forEach((image, index) => {
          const pageId = reserve();
          const contentId = reserve();
          const imageId = reserve();
          pageRefs.push(`${pageId} 0 R`);

          const usableWidth = A4_WIDTH - PAGE_MARGIN * 2;
          const usableHeight = A4_HEIGHT - PAGE_MARGIN * 2;
          const scale = Math.min(usableWidth / image.width, usableHeight / image.height);
          const drawWidth = image.width * scale;
          const drawHeight = image.height * scale;
          const x = (A4_WIDTH - drawWidth) / 2;
          const y = (A4_HEIGHT - drawHeight) / 2;
          const imageName = `/Im${index + 1}`;
          const hiddenText = pdfHiddenTextCommands(ocrPageForPdf(index, ocrPages), drawWidth, drawHeight, x, y);
          const content = `q\n${drawWidth.toFixed(2)} 0 0 ${drawHeight.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(
            2
          )} cm\n${imageName} Do\nQ\n${hiddenText}`;
          const contentBytes = encoder.encode(content);

          objects.set(pageId, [
            textBytes(
              `<< /Type /Page /Parent ${pagesId} 0 R /MediaBox [0 0 ${A4_WIDTH} ${A4_HEIGHT}] /Resources << /XObject << ${imageName} ${imageId} 0 R >> /Font << /F1 ${fontId} 0 R >> >> /Contents ${contentId} 0 R >>`
            ),
          ]);
          objects.set(contentId, [
            textBytes(`<< /Length ${contentBytes.length} >>\nstream\n`),
            contentBytes,
            textBytes("endstream"),
          ]);
          objects.set(imageId, [
            textBytes(
              `<< /Type /XObject /Subtype /Image /Width ${image.width} /Height ${image.height} /ColorSpace ${image.colorSpace} /BitsPerComponent ${image.bitsPerComponent} /Filter ${image.filter} /Length ${image.bytes.length} >>\nstream\n`
            ),
            image.bytes,
            textBytes("\nendstream"),
          ]);
        });

        const now = pdfDateString();
        objects.set(catalogId, [textBytes(`<< /Type /Catalog /Pages ${pagesId} 0 R /Lang (ja-JP) >>`)]);
        objects.set(pagesId, [textBytes(`<< /Type /Pages /Count ${pages.length} /Kids [${pageRefs.join(" ")}] >>`)]);
        objects.set(fontId, [textBytes("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>")]);
        objects.set(infoId, [
          textBytes(
            `<< /Title ${pdfUtf16HexString(title)} /Author ${pdfUtf16HexString("PocketCV PDF")} /Creator ${pdfUtf16HexString(
              "PocketCV PDF"
            )} /Producer ${pdfUtf16HexString("PocketCV PDF local browser engine")} /CreationDate ${pdfUtf16HexString(
              now
            )} /ModDate ${pdfUtf16HexString(now)} >>`
          ),
        ]);

        const chunks = [textBytes("%PDF-1.4\n")];
        const offsets = [0];
        let byteOffset = chunks[0].length;
        for (let id = 1; id < nextId; id += 1) {
          offsets[id] = byteOffset;
          const header = textBytes(`${id} 0 obj\n`);
          chunks.push(header);
          byteOffset += header.length;

          const body = objects.get(id);
          body.forEach((chunk) => {
            chunks.push(chunk);
            byteOffset += chunk.length;
          });

          const footer = textBytes("\nendobj\n");
          chunks.push(footer);
          byteOffset += footer.length;
        }

        const xrefOffset = byteOffset;
        let xref = `xref\n0 ${nextId}\n0000000000 65535 f \n`;
        for (let id = 1; id < nextId; id += 1) {
          xref += `${String(offsets[id]).padStart(10, "0")} 00000 n \n`;
        }
        xref += `trailer\n<< /Size ${nextId} /Root ${catalogId} 0 R /Info ${infoId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF\n`;
        chunks.push(textBytes(xref));

        return new Blob([concatBytes(chunks)], { type: "application/pdf" });
      }

      async function generatePdf() {
        if (!state.pages.length) {
          return null;
        }

        revokePdfUrl();
        setBusy(true);
        setStatus("端末内でPDFを生成中...");
        try {
          const pdfTitle = sanitizePdfName(filenameInput.value);
          const blob = await createPdfBlob(state.pages, pdfTitle, state.ocrPages);
          if (!blob.size) {
            throw new Error("PDF生成に失敗しました。");
          }

          state.pdfUrl = URL.createObjectURL(blob);
          state.pdfBlob = blob;
          state.pdfName = `${pdfTitle}.pdf`;
          downloadEl.href = state.pdfUrl;
          downloadEl.download = state.pdfName;
          downloadEl.hidden = false;
          shareButton.hidden = false;
          shareButton.disabled = false;
          downloadEl.click();
          setBusy(false);
          const searchable = state.ocrPages.some((page) => page && Array.isArray(page.lines) && page.lines.length);
          setStatus(
            `PDF生成完了 - ${state.pages.length}件${searchable ? " / OCR文字層付き" : ""} / ${formatFileSize(blob.size)}`
          );
          return blob;
        } catch (error) {
          setBusy(false);
          setStatus(error.message || "PDF生成に失敗しました。", true);
          return null;
        }
      }

      async function sharePdf() {
        let pdfBlob = state.pdfBlob;
        if (!pdfBlob) {
          pdfBlob = await generatePdf();
        }

        const filename = state.pdfName || `${sanitizePdfName(filenameInput.value)}.pdf`;
        if (!pdfBlob) {
          setStatus("共有するPDFを生成できませんでした。", true);
          return;
        }

        if ("share" in navigator && typeof File !== "undefined") {
          const pdfFile = new File([pdfBlob], filename, { type: "application/pdf" });
          const shareData = {
            files: [pdfFile],
            title: "PocketCV PDF",
          };

          if (navigator.canShare && navigator.canShare(shareData)) {
            try {
              await navigator.share(shareData);
              setStatus(`PDFファイルを共有しました - ${formatFileSize(pdfBlob.size)}`);
              return;
            } catch (error) {
              if (error && error.name === "AbortError") {
                setStatus("共有をキャンセルしました。");
                return;
              }
            }
          }
        }

        downloadEl.click();
        setStatus("このブラウザはPDFファイル共有に非対応です。PDFを保存しました。");
      }

      async function registerServiceWorker() {
        if (!("serviceWorker" in navigator)) {
          return;
        }

        try {
          const registration = await navigator.serviceWorker.register("sw.js", { updateViaCache: "none" });
          registration.update();
        } catch (_error) {
          // Offline support is progressive enhancement; PDF generation still works.
        }
      }

      async function promptInstall() {
        const promptEvent = state.deferredInstallPrompt;
        if (!promptEvent) {
          return;
        }

        promptEvent.prompt();
        try {
          const choice = await promptEvent.userChoice;
          setStatus(choice.outcome === "accepted" ? "アプリ追加を開始しました。" : "追加をキャンセルしました。");
        } catch (_error) {
          setStatus("アプリ追加を完了できませんでした。", true);
        } finally {
          state.deferredInstallPrompt = null;
          updateInstallButton();
        }
      }

      startButton.addEventListener("click", openCameraCapture);
      pdfButton.addEventListener("click", generatePdf);
      shareButton.addEventListener("click", sharePdf);
      installButton.addEventListener("click", promptInstall);
      ocrRunButton.addEventListener("click", runOcr);
      layoutRunButton.addEventListener("click", runLayoutRecovery);
      ocrCopyButton.addEventListener("click", copyOcrText);
      ocrDownloadButton.addEventListener("click", downloadOcrText);
      layoutCopyButton.addEventListener("click", copyLayoutText);
      layoutDownloadButton.addEventListener("click", downloadLayoutText);
      docxDownloadButton.addEventListener("click", downloadDocxDocument);
      modeEl.addEventListener("change", reprocessPages);

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        state.deferredInstallPrompt = event;
        updateInstallButton();
      });

      window.addEventListener("appinstalled", () => {
        state.deferredInstallPrompt = null;
        updateInstallButton();
        setStatus("アプリを追加しました。");
      });

      window.addEventListener("load", registerServiceWorker);

      clearButton.addEventListener("click", () => {
        state.pages.forEach((page) => URL.revokeObjectURL(page.previewUrl));
        state.pages = [];
        revokePdfUrl();
        resetOcrResult();
        refreshPages();
      });

      cameraFileInput.addEventListener("change", async () => {
        const files = Array.from(cameraFileInput.files || []);
        cameraFileInput.value = "";
        for (const file of files) {
          await queueBlobForCornerEditing(file, file.name || `capture-${Date.now()}.jpg`);
        }
      });

      fileInput.addEventListener("change", async () => {
        const files = Array.from(fileInput.files || []);
        fileInput.value = "";
        for (const file of files) {
          await queueBlobForCornerEditing(file, file.name || `page-${Date.now()}.jpg`);
        }
      });

      refreshPages();
    </script>
  </body>
</html>
