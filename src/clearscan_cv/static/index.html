<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="data:," />
    <title>PocketCV PDF</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #687386;
        --line: #d9dee8;
        --surface: #f6f8fb;
        --accent: #157f72;
        --accent-dark: #0f5f56;
        --warn: #b73e6f;
        --sun: #d9892b;
        --shadow: 0 16px 45px rgba(26, 34, 44, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: #ffffff;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(320px, 430px) 1fr;
      }

      .panel {
        min-height: 100vh;
        padding: max(22px, env(safe-area-inset-top)) 22px max(22px, env(safe-area-inset-bottom));
        border-right: 1px solid var(--line);
        background: var(--surface);
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand-copy {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.05;
      }

      .app-subtitle {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        line-height: 1.35;
      }

      .mode-wrap {
        display: grid;
        gap: 6px;
        min-width: 132px;
      }

      .mode-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
      }

      .mode {
        width: 100%;
        min-width: 132px;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        background: #ffffff;
        color: var(--ink);
        font-weight: 700;
      }

      .camera {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0f1217;
        overflow: hidden;
        position: relative;
        min-height: 460px;
        box-shadow: var(--shadow);
      }

      video,
      canvas {
        width: 100%;
        height: 100%;
        min-height: 460px;
        display: block;
        object-fit: cover;
        background: #0f1217;
      }

      .empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        color: #dfe7f0;
        padding: 24px;
      }

      .empty strong {
        display: block;
        margin-bottom: 8px;
        font-size: 20px;
      }

      .empty span {
        color: #aeb9c6;
        line-height: 1.45;
        font-weight: 800;
      }

      .privacy-note {
        border: 1px solid #cfe5df;
        border-radius: 8px;
        background: #ecf7f4;
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 900;
        line-height: 1.45;
        padding: 11px 12px;
      }

      .field-label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .filename-input {
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: #ffffff;
        color: var(--ink);
        font-weight: 800;
      }

      .controls {
        display: grid;
        gap: 10px;
      }

      .control-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button,
      .file-button {
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px 14px;
        background: #ffffff;
        color: var(--ink);
        font-weight: 800;
        cursor: pointer;
        display: inline-grid;
        place-items: center;
        text-align: center;
      }

      button:disabled {
        opacity: 0.48;
        cursor: not-allowed;
        border-color: #d8dde6;
        background: #e9edf3;
        color: #7d8796;
      }

      .primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .primary:active {
        background: var(--accent-dark);
      }

      .capture {
        min-height: 58px;
        border-color: var(--sun);
        background: var(--sun);
        color: #1b1408;
      }

      .danger {
        border-color: #f0c5d5;
        color: var(--warn);
      }

      .file {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .workspace {
        padding: 22px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 18px;
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
      }

      .topbar-main {
        display: grid;
        gap: 7px;
        min-width: 0;
      }

      .status {
        color: var(--muted);
        font-weight: 700;
        min-height: 24px;
      }

      .quality-summary {
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 900;
      }

      .output-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 8px;
      }

      .download,
      .secondary-action {
        min-height: 40px;
        border: 1px solid #cfe5df;
        border-radius: 8px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 900;
        text-decoration: none;
        padding: 8px 12px;
        background: #ecf7f4;
      }

      .secondary-action {
        color: var(--ink);
        background: #ffffff;
      }

      .pages {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 14px;
        align-content: start;
      }

      .page {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(26, 34, 44, 0.08);
      }

      .page img {
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        display: block;
        background: #eef1f5;
      }

      .page-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px;
      }

      .page-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .page-footer span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .page-meta {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.35;
        padding: 0 10px 10px;
      }

      .mini {
        min-height: 34px;
        min-width: 40px;
        padding: 0 8px;
        border-radius: 8px;
        font-size: 12px;
      }

      .placeholder {
        min-height: 360px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-weight: 800;
        text-align: center;
        padding: 24px;
      }

      .corner-dialog {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(15, 18, 23, 0.7);
      }

      .corner-dialog[hidden] {
        display: none;
      }

      .corner-panel {
        width: min(100%, 1040px);
        max-height: calc(100vh - 32px);
        border-radius: 8px;
        background: #ffffff;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .corner-header,
      .corner-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .corner-actions {
        border-top: 1px solid var(--line);
        border-bottom: 0;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .corner-title {
        margin: 0;
        font-size: 18px;
      }

      .corner-stage {
        min-height: 0;
        padding: 14px;
        overflow: auto;
        background: #0f1217;
      }

      .corner-canvas {
        display: block;
        width: 100%;
        height: auto;
        min-height: 0;
        border-radius: 8px;
        background: #0f1217;
        touch-action: none;
        cursor: crosshair;
      }

      @media (max-width: 860px) {
        .app {
          grid-template-columns: 1fr;
        }

        .panel {
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .camera,
        video,
        canvas {
          min-height: 58vh;
        }

        .workspace {
          padding: 16px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .output-actions {
          justify-content: flex-start;
          width: 100%;
        }

        .brand {
          align-items: flex-start;
          flex-direction: column;
        }

        .mode-wrap {
          width: 100%;
        }

        .corner-panel {
          max-height: calc(100vh - 18px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <div class="brand">
          <div class="brand-copy">
            <h1>PocketCV PDF</h1>
            <p class="app-subtitle">スマホ内でスキャン画像とPDFを生成</p>
          </div>
          <label class="mode-wrap">
            <span class="mode-label">処理モード</span>
            <select id="mode" class="mode" aria-label="処理モード">
              <option value="binary">白黒スキャン</option>
              <option value="gray">グレースキャン</option>
              <option value="color">カラースキャン</option>
              <option value="report">解析レポート</option>
              <option value="edges">エッジ</option>
            </select>
          </label>
        </div>

        <div class="camera">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="canvas" hidden></canvas>
          <div id="empty" class="empty">
            <div>
              <strong>カメラ待機中</strong>
              <span>撮影または画像追加で処理を開始</span>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="privacy-note">画像はアップロードされず、端末内で処理されます。</div>
          <label class="field-label">
            <span>PDFファイル名</span>
            <input id="filename" class="filename-input" type="text" value="pocketcv-scan" autocomplete="off" />
          </label>
          <button id="start" type="button">カメラ起動</button>
          <button id="capture" class="capture" type="button" disabled>撮影して追加</button>
          <div class="control-row">
            <label class="file-button" for="file">画像を追加</label>
            <input id="file" class="file" type="file" accept="image/*" capture="environment" multiple />
            <button id="clear" class="danger" type="button" disabled>クリア</button>
          </div>
          <button id="pdf" class="primary" type="button" disabled>スキャンPDFを生成</button>
        </div>
      </aside>

      <section class="workspace">
        <div class="topbar">
          <div class="topbar-main">
            <div id="status" class="status">0件 - 端末内処理</div>
            <div id="quality-summary" class="quality-summary">評価待ち</div>
          </div>
          <div class="output-actions">
            <a id="download" class="download" hidden download="pocketcv-scan.pdf">PDFを保存</a>
            <button id="share" class="secondary-action" type="button" hidden disabled>PDFを共有</button>
            <button id="install" class="secondary-action" type="button" hidden disabled>アプリを追加</button>
          </div>
        </div>
        <div id="pages" class="pages">
          <div class="placeholder">まだ画像がありません</div>
        </div>
      </section>
    </main>

    <div id="corner-dialog" class="corner-dialog" hidden>
      <section class="corner-panel" role="dialog" aria-modal="true" aria-labelledby="corner-title">
        <div class="corner-header">
          <h2 id="corner-title" class="corner-title">四隅を調整</h2>
          <button id="corner-close" class="mini" type="button">閉じる</button>
        </div>
        <div class="corner-stage">
          <canvas id="corner-editor-canvas" class="corner-canvas"></canvas>
        </div>
        <div class="corner-actions">
          <button id="corner-reset" type="button">自動角に戻す</button>
          <button id="corner-apply" class="primary" type="button">この四隅で生成</button>
        </div>
      </section>
    </div>

    <script>
      const MAX_IMAGE_DIMENSION = 1800;
      const A4_WIDTH = 595.28;
      const A4_HEIGHT = 841.89;
      const PAGE_MARGIN = 24;
      const PDF_MAX_IMAGE_EDGE = 2200;
      const PDF_MAX_IMAGE_PIXELS = 2600000;

      const state = {
        pages: [],
        stream: null,
        pdfUrl: null,
        pdfBlob: null,
        pdfName: "",
        deferredInstallPrompt: null,
        busy: false,
      };

      const cornerEditor = {
        pageIndex: -1,
        corners: null,
        autoCorners: null,
        scale: 1,
        draggingIndex: -1,
      };

      const video = document.querySelector("#video");
      const canvas = document.querySelector("#canvas");
      const empty = document.querySelector("#empty");
      const startButton = document.querySelector("#start");
      const captureButton = document.querySelector("#capture");
      const fileInput = document.querySelector("#file");
      const clearButton = document.querySelector("#clear");
      const pdfButton = document.querySelector("#pdf");
      const pagesEl = document.querySelector("#pages");
      const statusEl = document.querySelector("#status");
      const qualitySummaryEl = document.querySelector("#quality-summary");
      const downloadEl = document.querySelector("#download");
      const shareButton = document.querySelector("#share");
      const installButton = document.querySelector("#install");
      const filenameInput = document.querySelector("#filename");
      const modeEl = document.querySelector("#mode");
      const cornerDialog = document.querySelector("#corner-dialog");
      const cornerCanvas = document.querySelector("#corner-editor-canvas");
      const cornerCloseButton = document.querySelector("#corner-close");
      const cornerResetButton = document.querySelector("#corner-reset");
      const cornerApplyButton = document.querySelector("#corner-apply");

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function setBusy(value) {
        state.busy = value;
        startButton.disabled = value;
        captureButton.disabled = value || !state.stream;
        fileInput.disabled = value;
        clearButton.disabled = value || state.pages.length === 0;
        pdfButton.disabled = value || state.pages.length === 0;
        shareButton.disabled = value || !state.pdfBlob;
        installButton.disabled = value || !state.deferredInstallPrompt;
        cornerResetButton.disabled = value;
        cornerApplyButton.disabled = value;
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "var(--warn)" : "var(--muted)";
      }

      function updateStatus() {
        const count = state.pages.length;
        setStatus(`${count}件 - 端末内処理`);
      }

      function qualityLabel(score) {
        if (score >= 82) {
          return "良好";
        }
        if (score >= 65) {
          return "確認";
        }
        return "再撮影推奨";
      }

      function updateQualitySummary() {
        if (!state.pages.length) {
          qualitySummaryEl.textContent = "評価待ち";
          return;
        }

        const average = state.pages.reduce((sum, page) => sum + page.metrics.qualityScore, 0) / state.pages.length;
        qualitySummaryEl.textContent = `平均品質 ${Math.round(average)} / 100 · ${qualityLabel(average)}`;
      }

      function sanitizePdfName(value) {
        const cleaned = value.trim().replace(/[\\/:*?"<>|]+/g, "-").replace(/\s+/g, "-");
        return cleaned || "pocketcv-report";
      }

      function formatFileSize(bytes) {
        if (bytes >= 1024 * 1024) {
          return `${Math.round((bytes / 1024 / 1024) * 10) / 10} MB`;
        }
        return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      }

      function cloneCorners(corners) {
        return corners ? corners.map((point) => ({ x: point.x, y: point.y })) : null;
      }

      function fallbackCorners(sourceCanvas) {
        const margin = Math.max(12, Math.min(sourceCanvas.width, sourceCanvas.height) * 0.05);
        return [
          { x: margin, y: margin },
          { x: sourceCanvas.width - margin, y: margin },
          { x: sourceCanvas.width - margin, y: sourceCanvas.height - margin },
          { x: margin, y: sourceCanvas.height - margin },
        ];
      }

      function revokePdfUrl() {
        if (state.pdfUrl) {
          URL.revokeObjectURL(state.pdfUrl);
          state.pdfUrl = null;
        }
        state.pdfBlob = null;
        state.pdfName = "";
        downloadEl.hidden = true;
        downloadEl.removeAttribute("href");
        shareButton.hidden = true;
        shareButton.disabled = true;
      }

      function updateInstallButton() {
        installButton.hidden = !state.deferredInstallPrompt;
        installButton.disabled = state.busy || !state.deferredInstallPrompt;
      }

      function refreshPages() {
        pagesEl.innerHTML = "";
        if (!state.pages.length) {
          const placeholder = document.createElement("div");
          placeholder.className = "placeholder";
          placeholder.textContent = "まだ画像がありません";
          pagesEl.appendChild(placeholder);
        }

        state.pages.forEach((page, index) => {
          const item = document.createElement("article");
          item.className = "page";

          const image = document.createElement("img");
          image.src = page.previewUrl;
          image.alt = `処理結果 ${index + 1}`;

          const footer = document.createElement("div");
          footer.className = "page-footer";

          const label = document.createElement("span");
          label.textContent = `${index + 1}件目 · ${page.displayName}`;

          const actions = document.createElement("div");
          actions.className = "page-actions";

          const moveUp = document.createElement("button");
          moveUp.className = "mini";
          moveUp.type = "button";
          moveUp.textContent = "上";
          moveUp.disabled = index === 0;
          moveUp.ariaLabel = `${index + 1}件目を上へ移動`;
          moveUp.addEventListener("click", () => {
            const previous = state.pages[index - 1];
            state.pages[index - 1] = page;
            state.pages[index] = previous;
            revokePdfUrl();
            refreshPages();
          });

          const moveDown = document.createElement("button");
          moveDown.className = "mini";
          moveDown.type = "button";
          moveDown.textContent = "下";
          moveDown.disabled = index === state.pages.length - 1;
          moveDown.ariaLabel = `${index + 1}件目を下へ移動`;
          moveDown.addEventListener("click", () => {
            const next = state.pages[index + 1];
            state.pages[index + 1] = page;
            state.pages[index] = next;
            revokePdfUrl();
            refreshPages();
          });

          const remove = document.createElement("button");
          remove.className = "mini danger";
          remove.type = "button";
          remove.textContent = "削除";
          remove.ariaLabel = `${index + 1}件目を削除`;
          remove.addEventListener("click", () => {
            URL.revokeObjectURL(page.previewUrl);
            state.pages.splice(index, 1);
            revokePdfUrl();
            refreshPages();
          });

          const corners = document.createElement("button");
          corners.className = "mini";
          corners.type = "button";
          corners.textContent = "角調整";
          corners.ariaLabel = `${index + 1}件目の四隅を調整`;
          corners.addEventListener("click", () => openCornerEditor(index));

          const saveImage = document.createElement("button");
          saveImage.className = "mini";
          saveImage.type = "button";
          saveImage.textContent = "画像保存";
          saveImage.ariaLabel = `${index + 1}件目のスキャン画像を保存`;
          saveImage.addEventListener("click", () => savePageImage(index));

          actions.append(saveImage, corners, moveUp, moveDown, remove);
          footer.append(label, actions);
          const meta = document.createElement("div");
          meta.className = "page-meta";
          meta.textContent = page.metrics
            ? `品質 ${Math.round(page.metrics.qualityScore)} · ${qualityLabel(page.metrics.qualityScore)} · ${
                page.manualCorners ? "手動補正" : "自動補正"
              } ${Math.round(
                page.metrics.perspectiveConfidence * 100
              )}% · エッジ ${
                Math.round(page.metrics.edgeDensity * 1000) / 10
              }%`
            : "端末内で処理済み";

          item.append(image, footer, meta);
          pagesEl.appendChild(item);
        });

        updateStatus();
        updateQualitySummary();
        setBusy(false);
      }

      function dataUrlToBlob(dataUrl) {
        const [metadata, data] = dataUrl.split(",");
        const mime = metadata.match(/data:(.*);base64/)[1];
        const binary = atob(data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return new Blob([bytes], { type: mime });
      }

      async function savePageImage(index) {
        const page = state.pages[index];
        if (!page) {
          return;
        }

        try {
          const blob = await canvasToBlob(page.canvas, "image/png");
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${sanitizePdfName(filenameInput.value)}-${index + 1}.png`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.setTimeout(() => URL.revokeObjectURL(url), 800);
          setStatus(`スキャン画像を保存しました - ${index + 1}件目`);
        } catch (error) {
          setStatus(error.message || "画像を保存できませんでした。", true);
        }
      }

      function canvasToBlob(sourceCanvas, type = "image/jpeg", quality = 0.92) {
        return new Promise((resolve, reject) => {
          if (sourceCanvas.toBlob) {
            sourceCanvas.toBlob((blob) => {
              if (blob) {
                resolve(blob);
              } else {
                reject(new Error("画像を書き出せませんでした。"));
              }
            }, type, quality);
            return;
          }

          try {
            resolve(dataUrlToBlob(sourceCanvas.toDataURL(type, quality)));
          } catch (error) {
            reject(error);
          }
        });
      }

      function loadImage(blob) {
        if ("createImageBitmap" in window) {
          return createImageBitmap(blob, { imageOrientation: "from-image" }).catch(() => createImageBitmap(blob));
        }

        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(blob);
          const image = new Image();
          image.onload = () => {
            URL.revokeObjectURL(url);
            resolve(image);
          };
          image.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error("画像を読み込めませんでした。"));
          };
          image.src = url;
        });
      }

      function drawImageToCanvas(image) {
        const width = image.width || image.naturalWidth;
        const height = image.height || image.naturalHeight;
        const scale = Math.min(1, MAX_IMAGE_DIMENSION / Math.max(width, height));
        const output = document.createElement("canvas");
        output.width = Math.max(1, Math.round(width * scale));
        output.height = Math.max(1, Math.round(height * scale));
        output.getContext("2d").drawImage(image, 0, 0, output.width, output.height);
        return output;
      }

      function luminance(r, g, b) {
        return 0.299 * r + 0.587 * g + 0.114 * b;
      }

      function pointDistance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function polygonArea(points) {
        let area = 0;
        for (let i = 0; i < points.length; i += 1) {
          const current = points[i];
          const next = points[(i + 1) % points.length];
          area += current.x * next.y - next.x * current.y;
        }
        return Math.abs(area) / 2;
      }

      function expandQuad(points, width, height, ratio = 0.006) {
        const center = points.reduce((sum, point) => ({ x: sum.x + point.x / points.length, y: sum.y + point.y / points.length }), {
          x: 0,
          y: 0,
        });
        return points.map((point) => ({
          x: clamp(center.x + (point.x - center.x) * (1 + ratio), 0, width - 1),
          y: clamp(center.y + (point.y - center.y) * (1 + ratio), 0, height - 1),
        }));
      }

      function detectDocumentQuad(sourceCanvas) {
        const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const { width, height } = sourceCanvas;
        const image = context.getImageData(0, 0, width, height);
        const data = image.data;
        const step = Math.max(1, Math.floor(Math.max(width, height) / 760));

        let sum = 0;
        let sumSquares = 0;
        let samples = 0;
        const histogram = new Array(256).fill(0);
        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const index = (y * width + x) * 4;
            const value = luminance(data[index], data[index + 1], data[index + 2]);
            sum += value;
            sumSquares += value * value;
            histogram[Math.round(value)] += 1;
            samples += 1;
          }
        }

        const mean = sum / Math.max(1, samples);
        const variance = sumSquares / Math.max(1, samples) - mean * mean;
        const threshold = clamp(
          Math.max(percentileFromHistogram(histogram, samples, 0.62), mean + Math.sqrt(Math.max(0, variance)) * 0.1),
          95,
          238
        );

        const extremes = {
          topLeft: { score: Infinity, point: null },
          topRight: { score: -Infinity, point: null },
          bottomRight: { score: -Infinity, point: null },
          bottomLeft: { score: Infinity, point: null },
        };

        let hits = 0;
        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const index = (y * width + x) * 4;
            if (luminance(data[index], data[index + 1], data[index + 2]) > threshold) {
              const sumScore = x + y;
              const diffScore = x - y;
              if (sumScore < extremes.topLeft.score) {
                extremes.topLeft = { score: sumScore, point: { x, y } };
              }
              if (diffScore > extremes.topRight.score) {
                extremes.topRight = { score: diffScore, point: { x, y } };
              }
              if (sumScore > extremes.bottomRight.score) {
                extremes.bottomRight = { score: sumScore, point: { x, y } };
              }
              if (diffScore < extremes.bottomLeft.score) {
                extremes.bottomLeft = { score: diffScore, point: { x, y } };
              }
              hits += 1;
            }
          }
        }

        const corners = [extremes.topLeft.point, extremes.topRight.point, extremes.bottomRight.point, extremes.bottomLeft.point];
        if (hits < samples * 0.04 || corners.some((point) => !point)) {
          return { found: false, confidence: 0, corners: null, threshold };
        }

        const expanded = expandQuad(corners, width, height);
        const areaRatio = polygonArea(expanded) / (width * height);
        const topWidth = pointDistance(expanded[0], expanded[1]);
        const bottomWidth = pointDistance(expanded[3], expanded[2]);
        const leftHeight = pointDistance(expanded[0], expanded[3]);
        const rightHeight = pointDistance(expanded[1], expanded[2]);
        const minSide = Math.min(topWidth, bottomWidth, leftHeight, rightHeight);
        if (areaRatio < 0.15 || minSide < Math.min(width, height) * 0.16) {
          return { found: false, confidence: 0, corners: null, threshold };
        }

        return {
          found: true,
          confidence: clamp(areaRatio * 1.35 + Math.min(hits / samples, 0.55), 0.1, 0.98),
          corners: expanded,
          threshold,
        };
      }

      function solveLinearSystem(matrix, values) {
        const size = values.length;
        const a = matrix.map((row, index) => row.concat(values[index]));

        for (let col = 0; col < size; col += 1) {
          let pivot = col;
          for (let row = col + 1; row < size; row += 1) {
            if (Math.abs(a[row][col]) > Math.abs(a[pivot][col])) {
              pivot = row;
            }
          }

          if (Math.abs(a[pivot][col]) < 1e-9) {
            throw new Error("透視補正の計算に失敗しました。");
          }

          [a[col], a[pivot]] = [a[pivot], a[col]];
          const divisor = a[col][col];
          for (let item = col; item <= size; item += 1) {
            a[col][item] /= divisor;
          }

          for (let row = 0; row < size; row += 1) {
            if (row === col) {
              continue;
            }
            const factor = a[row][col];
            for (let item = col; item <= size; item += 1) {
              a[row][item] -= factor * a[col][item];
            }
          }
        }

        return a.map((row) => row[size]);
      }

      function perspectiveCoefficients(corners, width, height) {
        const destination = [
          { x: 0, y: 0 },
          { x: width - 1, y: 0 },
          { x: width - 1, y: height - 1 },
          { x: 0, y: height - 1 },
        ];
        const matrix = [];
        const values = [];

        for (let i = 0; i < 4; i += 1) {
          const u = destination[i].x;
          const v = destination[i].y;
          const x = corners[i].x;
          const y = corners[i].y;
          matrix.push([u, v, 1, 0, 0, 0, -u * x, -v * x]);
          values.push(x);
          matrix.push([0, 0, 0, u, v, 1, -u * y, -v * y]);
          values.push(y);
        }

        return solveLinearSystem(matrix, values);
      }

      function sampleBilinear(data, width, height, x, y, channel) {
        if (x < 0 || y < 0 || x >= width - 1 || y >= height - 1) {
          return 255;
        }
        const x0 = Math.floor(x);
        const y0 = Math.floor(y);
        const xWeight = x - x0;
        const yWeight = y - y0;
        const index00 = (y0 * width + x0) * 4 + channel;
        const index10 = index00 + 4;
        const index01 = index00 + width * 4;
        const index11 = index01 + 4;
        const top = data[index00] * (1 - xWeight) + data[index10] * xWeight;
        const bottom = data[index01] * (1 - xWeight) + data[index11] * xWeight;
        return top * (1 - yWeight) + bottom * yWeight;
      }

      function warpPerspectiveCanvas(sourceCanvas, corners) {
        const targetWidth = Math.max(80, Math.round(Math.max(pointDistance(corners[0], corners[1]), pointDistance(corners[3], corners[2]))));
        const targetHeight = Math.max(80, Math.round(Math.max(pointDistance(corners[0], corners[3]), pointDistance(corners[1], corners[2]))));
        const scale = Math.min(1, MAX_IMAGE_DIMENSION / Math.max(targetWidth, targetHeight));
        const width = Math.max(1, Math.round(targetWidth * scale));
        const height = Math.max(1, Math.round(targetHeight * scale));
        const scaledCorners = corners.map((point) => ({ x: point.x, y: point.y }));
        const coefficients = perspectiveCoefficients(scaledCorners, width, height);

        const sourceContext = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const source = sourceContext.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        const output = document.createElement("canvas");
        output.width = width;
        output.height = height;
        const outputContext = output.getContext("2d");
        const target = outputContext.createImageData(width, height);
        const [a, b, c, d, e, f, g, h] = coefficients;

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const denominator = g * x + h * y + 1;
            const sourceX = (a * x + b * y + c) / denominator;
            const sourceY = (d * x + e * y + f) / denominator;
            const targetIndex = (y * width + x) * 4;
            target.data[targetIndex] = sampleBilinear(source.data, sourceCanvas.width, sourceCanvas.height, sourceX, sourceY, 0);
            target.data[targetIndex + 1] = sampleBilinear(source.data, sourceCanvas.width, sourceCanvas.height, sourceX, sourceY, 1);
            target.data[targetIndex + 2] = sampleBilinear(source.data, sourceCanvas.width, sourceCanvas.height, sourceX, sourceY, 2);
            target.data[targetIndex + 3] = 255;
          }
        }

        outputContext.putImageData(target, 0, 0);
        return output;
      }

      function perspectiveCorrectCanvas(sourceCanvas, manualCorners = null) {
        const detection = detectDocumentQuad(sourceCanvas);
        const selectedCorners = manualCorners || (detection.found ? detection.corners : null);
        if (!selectedCorners) {
          return { canvas: sourceCanvas, detection, autoCorners: null };
        }

        try {
          const isManual = Boolean(manualCorners);
          return {
            canvas: warpPerspectiveCanvas(sourceCanvas, selectedCorners),
            detection: {
              ...detection,
              found: true,
              confidence: isManual ? 0.99 : detection.confidence,
              corners: cloneCorners(selectedCorners),
              manual: isManual,
            },
            autoCorners: detection.found ? cloneCorners(detection.corners) : null,
          };
        } catch (error) {
          return { canvas: sourceCanvas, detection: { ...detection, found: false, confidence: 0 }, autoCorners: null };
        }
      }

      function percentileFromHistogram(histogram, total, percentile) {
        const target = total * percentile;
        let seen = 0;
        for (let i = 0; i < histogram.length; i += 1) {
          seen += histogram[i];
          if (seen >= target) {
            return i;
          }
        }
        return histogram.length - 1;
      }

      function otsuThreshold(histogram, total) {
        let sum = 0;
        for (let i = 0; i < histogram.length; i += 1) {
          sum += i * histogram[i];
        }

        let sumBackground = 0;
        let weightBackground = 0;
        let maxVariance = -1;
        let threshold = 150;
        for (let i = 0; i < histogram.length; i += 1) {
          weightBackground += histogram[i];
          if (weightBackground === 0) {
            continue;
          }

          const weightForeground = total - weightBackground;
          if (weightForeground === 0) {
            break;
          }

          sumBackground += i * histogram[i];
          const meanBackground = sumBackground / weightBackground;
          const meanForeground = (sum - sumBackground) / weightForeground;
          const variance = weightBackground * weightForeground * (meanBackground - meanForeground) ** 2;
          if (variance > maxVariance) {
            maxVariance = variance;
            threshold = i;
          }
        }
        return threshold;
      }

      function localPercentileFromHistogram(histogram, total, percentile) {
        if (total <= 0) {
          return 240;
        }
        return percentileFromHistogram(histogram, total, percentile);
      }

      function smoothTileValues(values, gridWidth, gridHeight) {
        const smoothed = new Float32Array(values.length);
        for (let y = 0; y < gridHeight; y += 1) {
          for (let x = 0; x < gridWidth; x += 1) {
            let sum = 0;
            let weight = 0;
            for (let oy = -1; oy <= 1; oy += 1) {
              for (let ox = -1; ox <= 1; ox += 1) {
                const sx = clamp(x + ox, 0, gridWidth - 1);
                const sy = clamp(y + oy, 0, gridHeight - 1);
                const currentWeight = ox === 0 && oy === 0 ? 4 : 1;
                sum += values[sy * gridWidth + sx] * currentWeight;
                weight += currentWeight;
              }
            }
            smoothed[y * gridWidth + x] = sum / Math.max(1, weight);
          }
        }
        return smoothed;
      }

      function interpolatedTileValue(values, gridWidth, gridHeight, tileSize, x, y) {
        const gx = clamp(x / tileSize - 0.5, 0, gridWidth - 1);
        const gy = clamp(y / tileSize - 0.5, 0, gridHeight - 1);
        const x0 = Math.floor(gx);
        const y0 = Math.floor(gy);
        const x1 = Math.min(gridWidth - 1, x0 + 1);
        const y1 = Math.min(gridHeight - 1, y0 + 1);
        const wx = gx - x0;
        const wy = gy - y0;
        const top = values[y0 * gridWidth + x0] * (1 - wx) + values[y0 * gridWidth + x1] * wx;
        const bottom = values[y1 * gridWidth + x0] * (1 - wx) + values[y1 * gridWidth + x1] * wx;
        return top * (1 - wy) + bottom * wy;
      }

      function cleanupBinaryImageData(data, width, height) {
        const pixelCount = width * height;
        const visited = new Uint8Array(pixelCount);
        const queue = new Int32Array(pixelCount);
        const whiteComponent = (size) => {
          for (let index = 0; index < size; index += 1) {
            const offset = queue[index] * 4;
            data[offset] = 255;
            data[offset + 1] = 255;
            data[offset + 2] = 255;
          }
        };

        for (let start = 0; start < pixelCount; start += 1) {
          if (visited[start] || data[start * 4] > 128) {
            continue;
          }

          let head = 0;
          let tail = 0;
          let minX = width;
          let minY = height;
          let maxX = 0;
          let maxY = 0;
          visited[start] = 1;
          queue[tail] = start;
          tail += 1;

          while (head < tail) {
            const pixel = queue[head];
            head += 1;
            const x = pixel % width;
            const y = Math.floor(pixel / width);
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);

            for (let dy = -1; dy <= 1; dy += 1) {
              const nextY = y + dy;
              if (nextY < 0 || nextY >= height) {
                continue;
              }
              for (let dx = -1; dx <= 1; dx += 1) {
                if (dx === 0 && dy === 0) {
                  continue;
                }
                const nextX = x + dx;
                if (nextX < 0 || nextX >= width) {
                  continue;
                }
                const nextPixel = nextY * width + nextX;
                if (!visited[nextPixel] && data[nextPixel * 4] <= 128) {
                  visited[nextPixel] = 1;
                  queue[tail] = nextPixel;
                  tail += 1;
                }
              }
            }
          }

          const area = tail;
          const boxWidth = maxX - minX + 1;
          const boxHeight = maxY - minY + 1;
          const touchesOuterEdge = minX <= 1 || minY <= 1 || maxX >= width - 2 || maxY >= height - 2;
          const removeDust = area <= 3 || (area <= 9 && boxWidth <= 5 && boxHeight <= 5);
          const removeEdgeStain =
            touchesOuterEdge &&
            area > Math.max(180, pixelCount * 0.00075) &&
            ((boxWidth > width * 0.16 && boxHeight > 10) || (boxHeight > height * 0.16 && boxWidth > 10));
          const removeLargeBlob = area > pixelCount * 0.012 && Math.min(boxWidth, boxHeight) > 18;

          if (removeDust || removeEdgeStain || removeLargeBlob) {
            whiteComponent(area);
          }
        }
      }

      function enhanceCanvas(sourceCanvas, mode, detection) {
        const renderMode = mode === "report" ? "color" : mode;
        const output = document.createElement("canvas");
        output.width = sourceCanvas.width;
        output.height = sourceCanvas.height;
        const edgeCanvas = document.createElement("canvas");
        edgeCanvas.width = sourceCanvas.width;
        edgeCanvas.height = sourceCanvas.height;

        const sourceContext = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const outputContext = output.getContext("2d");
        const edgeContext = edgeCanvas.getContext("2d");
        const image = sourceContext.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        const edgeImage = edgeContext.createImageData(sourceCanvas.width, sourceCanvas.height);
        const data = image.data;
        const pixelCount = sourceCanvas.width * sourceCanvas.height;
        const rawLum = new Uint8ClampedArray(pixelCount);
        const backgroundLum = new Float32Array(pixelCount);
        const illuminationLum = new Uint8ClampedArray(pixelCount);
        const normalizedLum = new Uint8ClampedArray(pixelCount);
        const inkLum = new Uint8ClampedArray(pixelCount);
        const tileSize = Math.max(42, Math.round(Math.max(sourceCanvas.width, sourceCanvas.height) / 34));
        const gridWidth = Math.ceil(sourceCanvas.width / tileSize);
        const gridHeight = Math.ceil(sourceCanvas.height / tileSize);
        const tileHistograms = Array.from({ length: gridWidth * gridHeight }, () => new Uint32Array(256));
        const tileCounts = new Uint32Array(gridWidth * gridHeight);
        const normalizedHistogram = new Array(256).fill(0);

        for (let y = 0; y < sourceCanvas.height; y += 1) {
          for (let x = 0; x < sourceCanvas.width; x += 1) {
            const pixel = y * sourceCanvas.width + x;
            const index = pixel * 4;
            const value = Math.round(luminance(data[index], data[index + 1], data[index + 2]));
            rawLum[pixel] = value;
            const tileX = Math.floor(x / tileSize);
            const tileY = Math.floor(y / tileSize);
            const tileIndex = tileY * gridWidth + tileX;
            tileHistograms[tileIndex][value] += 1;
            tileCounts[tileIndex] += 1;
          }
        }

        const tileBackgrounds = new Float32Array(gridWidth * gridHeight);
        for (let index = 0; index < tileBackgrounds.length; index += 1) {
          tileBackgrounds[index] = Math.max(120, localPercentileFromHistogram(tileHistograms[index], tileCounts[index], 0.76));
        }
        const smoothedBackgrounds = smoothTileValues(tileBackgrounds, gridWidth, gridHeight);

        for (let y = 0; y < sourceCanvas.height; y += 1) {
          for (let x = 0; x < sourceCanvas.width; x += 1) {
            const pixel = y * sourceCanvas.width + x;
            const background = clamp(interpolatedTileValue(smoothedBackgrounds, gridWidth, gridHeight, tileSize, x, y), 90, 255);
            backgroundLum[pixel] = background;
            const normalized = clamp(Math.round((rawLum[pixel] / Math.max(1, background)) * 255), 0, 255);
            normalizedLum[pixel] = normalized;
            normalizedHistogram[normalized] += 1;
          }
        }

        const low = percentileFromHistogram(normalizedHistogram, pixelCount, 0.025);
        const high = Math.max(low + 24, percentileFromHistogram(normalizedHistogram, pixelCount, 0.992));
        const otsu = otsuThreshold(normalizedHistogram, pixelCount);
        const threshold = clamp(Math.round((otsu - low) * (255 / (high - low))), 145, 210);
        let sum = 0;
        let sumSquares = 0;
        let edgeCount = 0;

        for (let pixel = 0; pixel < pixelCount; pixel += 1) {
          let normalized = clamp(Math.round((normalizedLum[pixel] - low) * (255 / (high - low))), 0, 255);
          if (backgroundLum[pixel] < 128 && rawLum[pixel] < 96) {
            illuminationLum[pixel] = 255;
            normalizedLum[pixel] = 255;
            inkLum[pixel] = 0;
            continue;
          }
          illuminationLum[pixel] = normalized;
          const darkness = Math.max(0, 250 - normalized);
          const ink = clamp(Math.round(Math.max(0, darkness - 24) * 2.15), 0, 255);
          let clean = clamp(Math.round(255 - ink * 1.02), 0, 255);
          if (normalized > 214 || ink < 18) {
            clean = 255;
          } else if (normalized > 190 && ink < 45) {
            clean = Math.max(246, Math.round(255 - (255 - normalized) * 0.05));
          } else if (clean > normalized) {
            clean = normalized;
          }
          normalizedLum[pixel] = clean;
          inkLum[pixel] = ink;
        }

        for (let y = 0; y < sourceCanvas.height; y += 1) {
          for (let x = 0; x < sourceCanvas.width; x += 1) {
            const pixel = y * sourceCanvas.width + x;
            const index = pixel * 4;
            const center = normalizedLum[pixel];
            const left = normalizedLum[y * sourceCanvas.width + Math.max(0, x - 1)];
            const right = normalizedLum[y * sourceCanvas.width + Math.min(sourceCanvas.width - 1, x + 1)];
            const top = normalizedLum[Math.max(0, y - 1) * sourceCanvas.width + x];
            const bottom = normalizedLum[Math.min(sourceCanvas.height - 1, y + 1) * sourceCanvas.width + x];
            const normCenter = illuminationLum[pixel];
            const normLeft = illuminationLum[y * sourceCanvas.width + Math.max(0, x - 1)];
            const normRight = illuminationLum[y * sourceCanvas.width + Math.min(sourceCanvas.width - 1, x + 1)];
            const normTop = illuminationLum[Math.max(0, y - 1) * sourceCanvas.width + x];
            const normBottom = illuminationLum[Math.min(sourceCanvas.height - 1, y + 1) * sourceCanvas.width + x];
            const blur = (left + right + top + bottom) / 4;
            const gradient = Math.abs(right - left) + Math.abs(bottom - top);
            const normalizedGradient = Math.abs(normRight - normLeft) + Math.abs(normBottom - normTop);
            const sharpenAmount = center < 235 || gradient > 32 ? 0.78 : 0.18;
            const sharpened = clamp(Math.round(center + (center - blur) * sharpenAmount), 0, 255);
            if (gradient > 42) {
              edgeCount += 1;
            }
            const edgeValue = gradient > 32 ? clamp(Math.round(gradient * 2.2), 0, 255) : 0;
            edgeImage.data[index] = edgeValue;
            edgeImage.data[index + 1] = edgeValue;
            edgeImage.data[index + 2] = edgeValue;
            edgeImage.data[index + 3] = 255;
            sum += sharpened;
            sumSquares += sharpened * sharpened;

            if (renderMode === "binary") {
              const textBody = inkLum[pixel] > 132 && normalizedGradient > 12 && sharpened < 128;
              const textEdge = inkLum[pixel] > 42 && normalizedGradient > 36 && sharpened < 218;
              const deepInk = normCenter < 54 && inkLum[pixel] > 104 && normalizedGradient > 18;
              const value = textBody || textEdge || deepInk ? 0 : 255;
              data[index] = value;
              data[index + 1] = value;
              data[index + 2] = value;
            } else if (renderMode === "gray") {
              data[index] = sharpened;
              data[index + 1] = sharpened;
              data[index + 2] = sharpened;
            } else if (renderMode === "edges") {
              data[index] = edgeValue;
              data[index + 1] = edgeValue;
              data[index + 2] = edgeValue;
            } else {
              const chroma = inkLum[pixel] > 34 ? 0.18 : 0.08;
              data[index] = clamp(Math.round(sharpened + (data[index] - rawLum[pixel]) * chroma), 0, 255);
              data[index + 1] = clamp(Math.round(sharpened + (data[index + 1] - rawLum[pixel]) * chroma), 0, 255);
              data[index + 2] = clamp(Math.round(sharpened + (data[index + 2] - rawLum[pixel]) * chroma), 0, 255);
            }
            data[index + 3] = 255;
          }
        }

        if (renderMode === "binary") {
          cleanupBinaryImageData(data, sourceCanvas.width, sourceCanvas.height);
        }

        outputContext.putImageData(image, 0, 0);
        edgeContext.putImageData(edgeImage, 0, 0);
        const mean = sum / Math.max(1, pixelCount);
        const contrast = Math.sqrt(Math.max(0, sumSquares / Math.max(1, pixelCount) - mean * mean));
        const qualityScore = clamp(
          (detection.found ? detection.confidence * 32 : 10) +
            clamp(contrast / 95, 0, 1) * 28 +
            clamp(edgeCount / Math.max(1, pixelCount) / 0.16, 0, 1) * 28 +
            clamp((mean - 90) / 150, 0, 1) * 12,
          0,
          100
        );
        return {
          canvas: output,
          edgeCanvas,
          metrics: {
            qualityScore,
            perspectiveConfidence: detection.found ? detection.confidence : 0,
            edgeDensity: edgeCount / Math.max(1, pixelCount),
            contrast,
            brightness: mean,
            threshold,
          },
        };
      }

      function drawContained(context, sourceCanvas, x, y, width, height) {
        context.fillStyle = "#f2f4f7";
        context.fillRect(x, y, width, height);
        const scale = Math.min(width / sourceCanvas.width, height / sourceCanvas.height);
        const drawWidth = sourceCanvas.width * scale;
        const drawHeight = sourceCanvas.height * scale;
        const drawX = x + (width - drawWidth) / 2;
        const drawY = y + (height - drawHeight) / 2;
        context.drawImage(sourceCanvas, drawX, drawY, drawWidth, drawHeight);
      }

      function buildAnalysisCanvas(sourceCanvas, processedCanvas, edgeCanvas, metrics) {
        const report = document.createElement("canvas");
        report.width = 1200;
        report.height = 1600;
        const context = report.getContext("2d");

        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, report.width, report.height);

        context.fillStyle = "#17202a";
        context.font = "700 54px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillText("PocketCV 画像処理レポート", 64, 96);
        context.font = "700 24px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillStyle = "#687386";
        context.fillText("端末内画像処理: 透視補正、照明補正、コントラスト、エッジ", 64, 136);

        context.font = "700 28px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillStyle = "#17202a";
        context.fillText("元画像", 64, 206);
        context.fillText("処理後", 626, 206);
        drawContained(context, sourceCanvas, 64, 230, 510, 520);
        drawContained(context, processedCanvas, 626, 230, 510, 520);

        context.font = "700 28px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillStyle = "#17202a";
        context.fillText("エッジマップ", 64, 832);
        drawContained(context, edgeCanvas, 64, 856, 510, 410);

        context.fillStyle = "#17202a";
        context.fillText("評価指標", 626, 832);
        const rows = [
          ["総合品質", `${Math.round(metrics.qualityScore)} / 100`],
          ["透視補正信頼度", `${Math.round(metrics.perspectiveConfidence * 100)}%`],
          ["エッジ密度", `${Math.round(metrics.edgeDensity * 1000) / 10}%`],
          ["コントラスト", `${Math.round(metrics.contrast * 10) / 10}`],
          ["二値化しきい値", `${metrics.threshold}`],
        ];

        context.font = "700 24px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        rows.forEach((row, index) => {
          const y = 872 + index * 63;
          context.fillStyle = index % 2 === 0 ? "#f6f8fb" : "#ffffff";
          context.fillRect(626, y - 36, 510, 50);
          context.fillStyle = "#687386";
          context.fillText(row[0], 648, y);
          context.fillStyle = "#157f72";
          context.textAlign = "right";
          context.fillText(row[1], 1110, y);
          context.textAlign = "left";
        });

        context.fillStyle = "#d9dee8";
        context.fillRect(64, 1378, 1072, 2);
        context.font = "700 22px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
        context.fillStyle = "#687386";
        context.fillText("ブラウザ内で生成。画像はアップロードされません。", 64, 1434);
        return report;
      }

      async function processSourceCanvas(sourceCanvas, sourceBlob, name, manualCorners = null) {
        const renderMode = modeEl.value;
        const corrected = perspectiveCorrectCanvas(sourceCanvas, manualCorners);
        const enhanced = enhanceCanvas(corrected.canvas, renderMode, corrected.detection);
        const processedCanvas =
          renderMode === "report" ? buildAnalysisCanvas(sourceCanvas, enhanced.canvas, enhanced.edgeCanvas, enhanced.metrics) : enhanced.canvas;
        const processedBlob = await canvasToBlob(processedCanvas, "image/jpeg", 0.92);
        return {
          sourceBlob,
          sourceCanvas,
          name,
          displayName: name.replace(/\.[^.]+$/, "").slice(0, 28),
          canvas: processedCanvas,
          pdfMode: renderMode,
          metrics: enhanced.metrics,
          autoCorners: corrected.autoCorners || fallbackCorners(sourceCanvas),
          manualCorners: cloneCorners(manualCorners),
          previewUrl: URL.createObjectURL(processedBlob),
        };
      }

      async function processBlob(blob, name, manualCorners = null) {
        const image = await loadImage(blob);
        const sourceCanvas = drawImageToCanvas(image);
        return processSourceCanvas(sourceCanvas, blob, name, manualCorners);
      }

      async function addBlob(blob, name) {
        revokePdfUrl();
        setBusy(true);
        setStatus("端末内で画像処理中...");
        try {
          const page = await processBlob(blob, name);
          state.pages.push(page);
          refreshPages();
        } catch (error) {
          setBusy(false);
          setStatus(error.message || "画像を処理できませんでした。", true);
        }
      }

      async function reprocessPages() {
        if (!state.pages.length) {
          return;
        }

        revokePdfUrl();
        setBusy(true);
        setStatus("端末内で再処理中...");
        try {
          const sourcePages = state.pages.map((page) => ({ blob: page.sourceBlob, name: page.name, manualCorners: cloneCorners(page.manualCorners) }));
          state.pages.forEach((page) => URL.revokeObjectURL(page.previewUrl));
          state.pages = [];
          for (const page of sourcePages) {
            state.pages.push(await processBlob(page.blob, page.name, page.manualCorners));
          }
          refreshPages();
        } catch (error) {
          setBusy(false);
          setStatus(error.message || "再処理できませんでした。", true);
        }
      }

      function setupCornerCanvas(page) {
        const maxWidth = Math.max(280, Math.min(980, window.innerWidth - 64));
        const maxHeight = Math.max(360, Math.min(720, window.innerHeight - 190));
        cornerEditor.scale = Math.min(1, maxWidth / page.sourceCanvas.width, maxHeight / page.sourceCanvas.height);
        cornerCanvas.width = Math.max(1, Math.round(page.sourceCanvas.width * cornerEditor.scale));
        cornerCanvas.height = Math.max(1, Math.round(page.sourceCanvas.height * cornerEditor.scale));
      }

      function toEditorPoint(sourcePoint) {
        return {
          x: sourcePoint.x * cornerEditor.scale,
          y: sourcePoint.y * cornerEditor.scale,
        };
      }

      function eventToSourcePoint(event) {
        const rect = cornerCanvas.getBoundingClientRect();
        const canvasX = ((event.clientX - rect.left) / rect.width) * cornerCanvas.width;
        const canvasY = ((event.clientY - rect.top) / rect.height) * cornerCanvas.height;
        const page = state.pages[cornerEditor.pageIndex];
        return {
          x: clamp(canvasX / cornerEditor.scale, 0, page.sourceCanvas.width - 1),
          y: clamp(canvasY / cornerEditor.scale, 0, page.sourceCanvas.height - 1),
        };
      }

      function drawCornerEditor() {
        const page = state.pages[cornerEditor.pageIndex];
        if (!page || !cornerEditor.corners) {
          return;
        }

        const context = cornerCanvas.getContext("2d");
        context.clearRect(0, 0, cornerCanvas.width, cornerCanvas.height);
        context.drawImage(page.sourceCanvas, 0, 0, cornerCanvas.width, cornerCanvas.height);

        const points = cornerEditor.corners.map(toEditorPoint);
        context.save();
        context.fillStyle = "rgba(21, 127, 114, 0.16)";
        context.strokeStyle = "#10b59f";
        context.lineWidth = 3;
        context.beginPath();
        points.forEach((point, index) => {
          if (index === 0) {
            context.moveTo(point.x, point.y);
          } else {
            context.lineTo(point.x, point.y);
          }
        });
        context.closePath();
        context.fill();
        context.stroke();

        const labels = ["左上", "右上", "右下", "左下"];
        points.forEach((point, index) => {
          context.beginPath();
          context.fillStyle = index === cornerEditor.draggingIndex ? "#d9892b" : "#157f72";
          context.strokeStyle = "#ffffff";
          context.lineWidth = 4;
          context.arc(point.x, point.y, 14, 0, Math.PI * 2);
          context.fill();
          context.stroke();
          context.font = "900 13px 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif";
          context.textAlign = "center";
          context.textBaseline = "middle";
          context.fillStyle = "#ffffff";
          context.fillText(labels[index], point.x, point.y);
        });
        context.restore();
      }

      function nearestCornerIndex(event) {
        const rect = cornerCanvas.getBoundingClientRect();
        const canvasX = ((event.clientX - rect.left) / rect.width) * cornerCanvas.width;
        const canvasY = ((event.clientY - rect.top) / rect.height) * cornerCanvas.height;
        let bestIndex = -1;
        let bestDistance = Infinity;
        cornerEditor.corners.map(toEditorPoint).forEach((point, index) => {
          const distance = Math.hypot(point.x - canvasX, point.y - canvasY);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        });
        return bestDistance <= 72 ? bestIndex : -1;
      }

      function closestCornerIndex(event) {
        const rect = cornerCanvas.getBoundingClientRect();
        const canvasX = ((event.clientX - rect.left) / rect.width) * cornerCanvas.width;
        const canvasY = ((event.clientY - rect.top) / rect.height) * cornerCanvas.height;
        let bestIndex = 0;
        let bestDistance = Infinity;
        cornerEditor.corners.map(toEditorPoint).forEach((point, index) => {
          const distance = Math.hypot(point.x - canvasX, point.y - canvasY);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        });
        return bestIndex;
      }

      function openCornerEditor(pageIndex) {
        const page = state.pages[pageIndex];
        if (!page) {
          return;
        }

        cornerEditor.pageIndex = pageIndex;
        cornerEditor.autoCorners = cloneCorners(page.autoCorners) || fallbackCorners(page.sourceCanvas);
        cornerEditor.corners = cloneCorners(page.manualCorners || page.autoCorners) || fallbackCorners(page.sourceCanvas);
        cornerEditor.draggingIndex = -1;
        setupCornerCanvas(page);
        cornerDialog.hidden = false;
        drawCornerEditor();
      }

      function closeCornerEditor() {
        cornerDialog.hidden = true;
        cornerEditor.pageIndex = -1;
        cornerEditor.corners = null;
        cornerEditor.autoCorners = null;
        cornerEditor.draggingIndex = -1;
      }

      async function applyCornerEditor() {
        const page = state.pages[cornerEditor.pageIndex];
        if (!page || !cornerEditor.corners) {
          return;
        }

        const pageIndex = cornerEditor.pageIndex;
        const manualCorners = cloneCorners(cornerEditor.corners);
        revokePdfUrl();
        setBusy(true);
        setStatus("四隅からスキャンを再生成中...");
        try {
          const updatedPage = await processSourceCanvas(page.sourceCanvas, page.sourceBlob, page.name, manualCorners);
          URL.revokeObjectURL(page.previewUrl);
          state.pages[pageIndex] = updatedPage;
          closeCornerEditor();
          refreshPages();
          setStatus("手動の四隅で再生成しました。");
        } catch (error) {
          setBusy(false);
          setStatus(error.message || "四隅から再生成できませんでした。", true);
        }
      }

      cornerCloseButton.addEventListener("click", closeCornerEditor);
      cornerDialog.addEventListener("click", (event) => {
        if (event.target === cornerDialog) {
          closeCornerEditor();
        }
      });

      cornerResetButton.addEventListener("click", () => {
        const page = state.pages[cornerEditor.pageIndex];
        if (!page) {
          return;
        }
        cornerEditor.corners = cloneCorners(cornerEditor.autoCorners) || fallbackCorners(page.sourceCanvas);
        drawCornerEditor();
      });

      cornerApplyButton.addEventListener("click", applyCornerEditor);

      cornerCanvas.addEventListener("pointerdown", (event) => {
        if (cornerDialog.hidden || !cornerEditor.corners) {
          return;
        }
        event.preventDefault();
        cornerEditor.draggingIndex = nearestCornerIndex(event);
        if (cornerEditor.draggingIndex === -1) {
          cornerEditor.draggingIndex = closestCornerIndex(event);
          cornerEditor.corners[cornerEditor.draggingIndex] = eventToSourcePoint(event);
        }
        cornerCanvas.setPointerCapture(event.pointerId);
        drawCornerEditor();
      });

      cornerCanvas.addEventListener("pointermove", (event) => {
        if (cornerEditor.draggingIndex === -1 || !cornerEditor.corners) {
          return;
        }
        event.preventDefault();
        cornerEditor.corners[cornerEditor.draggingIndex] = eventToSourcePoint(event);
        drawCornerEditor();
      });

      cornerCanvas.addEventListener("pointerup", (event) => {
        if (cornerEditor.draggingIndex !== -1) {
          cornerCanvas.releasePointerCapture(event.pointerId);
        }
        cornerEditor.draggingIndex = -1;
        drawCornerEditor();
      });

      cornerCanvas.addEventListener("pointercancel", () => {
        cornerEditor.draggingIndex = -1;
        drawCornerEditor();
      });

      window.addEventListener("resize", () => {
        if (!cornerDialog.hidden && cornerEditor.pageIndex >= 0) {
          setupCornerCanvas(state.pages[cornerEditor.pageIndex]);
          drawCornerEditor();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !cornerDialog.hidden) {
          closeCornerEditor();
        }
      });

      async function startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("この端末では画像追加を使用してください。", true);
          return;
        }

        setBusy(true);
        try {
          state.stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1920 },
              height: { ideal: 2560 },
            },
            audio: false,
          });
          video.srcObject = state.stream;
          empty.hidden = true;
          setBusy(false);
          updateStatus();
        } catch (error) {
          state.stream = null;
          setBusy(false);
          setStatus("カメラプレビューを利用できません。画像追加を使用してください。", true);
        }
      }

      async function capturePage() {
        if (!state.stream || !video.videoWidth) {
          return;
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await canvasToBlob(canvas, "image/jpeg", 0.94);
        await addBlob(blob, `capture-${Date.now()}.jpg`);
      }

      function textBytes(text) {
        return new TextEncoder().encode(text);
      }

      function concatBytes(chunks) {
        const size = chunks.reduce((total, chunk) => total + chunk.length, 0);
        const output = new Uint8Array(size);
        let offset = 0;
        chunks.forEach((chunk) => {
          output.set(chunk, offset);
          offset += chunk.length;
        });
        return output;
      }

      function fitCanvasForPdf(sourceCanvas) {
        const pixelScale = Math.sqrt(PDF_MAX_IMAGE_PIXELS / Math.max(1, sourceCanvas.width * sourceCanvas.height));
        const edgeScale = PDF_MAX_IMAGE_EDGE / Math.max(sourceCanvas.width, sourceCanvas.height);
        const scale = Math.min(1, pixelScale, edgeScale);
        if (scale >= 0.995) {
          return sourceCanvas;
        }

        const output = document.createElement("canvas");
        output.width = Math.max(1, Math.round(sourceCanvas.width * scale));
        output.height = Math.max(1, Math.round(sourceCanvas.height * scale));
        const context = output.getContext("2d");
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, output.width, output.height);
        context.drawImage(sourceCanvas, 0, 0, output.width, output.height);
        return output;
      }

      function grayscaleBytesFromCanvas(sourceCanvas) {
        const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
        const image = context.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        const gray = new Uint8Array(sourceCanvas.width * sourceCanvas.height);
        for (let i = 0, p = 0; i < image.data.length; i += 4, p += 1) {
          gray[p] = Math.round(luminance(image.data[i], image.data[i + 1], image.data[i + 2]));
        }
        return gray;
      }

      async function deflateBytes(bytes) {
        if (!("CompressionStream" in window)) {
          return null;
        }

        const compressedStream = new Blob([bytes]).stream().pipeThrough(new CompressionStream("deflate"));
        return new Uint8Array(await new Response(compressedStream).arrayBuffer());
      }

      function jpegQualityForPdfMode(mode) {
        if (mode === "report") {
          return 0.88;
        }
        if (mode === "gray") {
          return 0.87;
        }
        if (mode === "binary" || mode === "edges") {
          return 0.9;
        }
        return 0.91;
      }

      async function jpegBytesFromCanvas(pageCanvas, quality) {
        const blob = await canvasToBlob(pageCanvas, "image/jpeg", quality);
        return new Uint8Array(await blob.arrayBuffer());
      }

      async function encodePdfImageFromCanvas(pageCanvas, mode) {
        const canvasForPdf = fitCanvasForPdf(pageCanvas);
        if (mode === "binary" || mode === "edges") {
          const grayBytes = grayscaleBytesFromCanvas(canvasForPdf);
          const compressed = await deflateBytes(grayBytes);
          if (compressed && compressed.length < grayBytes.length) {
            return {
              bytes: compressed,
              width: canvasForPdf.width,
              height: canvasForPdf.height,
              colorSpace: "/DeviceGray",
              bitsPerComponent: 8,
              filter: "/FlateDecode",
            };
          }
        }

        return {
          bytes: await jpegBytesFromCanvas(canvasForPdf, jpegQualityForPdfMode(mode)),
          width: canvasForPdf.width,
          height: canvasForPdf.height,
          colorSpace: "/DeviceRGB",
          bitsPerComponent: 8,
          filter: "/DCTDecode",
        };
      }

      function pdfUtf16HexString(value) {
        const bytes = [0xfe, 0xff];
        for (let i = 0; i < value.length; i += 1) {
          const code = value.charCodeAt(i);
          bytes.push((code >> 8) & 0xff, code & 0xff);
        }
        return `<${bytes.map((byte) => byte.toString(16).padStart(2, "0").toUpperCase()).join("")}>`;
      }

      function pdfDateString(date = new Date()) {
        const pad = (value, length = 2) => String(value).padStart(length, "0");
        const offset = -date.getTimezoneOffset();
        const sign = offset >= 0 ? "+" : "-";
        const hours = pad(Math.floor(Math.abs(offset) / 60));
        const minutes = pad(Math.abs(offset) % 60);
        return `D:${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}${pad(date.getHours())}${pad(
          date.getMinutes()
        )}${pad(date.getSeconds())}${sign}${hours}'${minutes}'`;
      }

      async function createPdfBlob(pages, title = "PocketCV PDF") {
        const encoder = new TextEncoder();
        const objects = new Map();
        let nextId = 1;
        const reserve = () => nextId++;

        const catalogId = reserve();
        const pagesId = reserve();
        const infoId = reserve();
        const pageRefs = [];

        const imageData = [];
        for (const page of pages) {
          imageData.push(await encodePdfImageFromCanvas(page.canvas, page.pdfMode || "color"));
        }

        imageData.forEach((image, index) => {
          const pageId = reserve();
          const contentId = reserve();
          const imageId = reserve();
          pageRefs.push(`${pageId} 0 R`);

          const usableWidth = A4_WIDTH - PAGE_MARGIN * 2;
          const usableHeight = A4_HEIGHT - PAGE_MARGIN * 2;
          const scale = Math.min(usableWidth / image.width, usableHeight / image.height);
          const drawWidth = image.width * scale;
          const drawHeight = image.height * scale;
          const x = (A4_WIDTH - drawWidth) / 2;
          const y = (A4_HEIGHT - drawHeight) / 2;
          const imageName = `/Im${index + 1}`;
          const content = `q\n${drawWidth.toFixed(2)} 0 0 ${drawHeight.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)} cm\n${imageName} Do\nQ\n`;
          const contentBytes = encoder.encode(content);

          objects.set(pageId, [
            textBytes(
              `<< /Type /Page /Parent ${pagesId} 0 R /MediaBox [0 0 ${A4_WIDTH} ${A4_HEIGHT}] /Resources << /XObject << ${imageName} ${imageId} 0 R >> >> /Contents ${contentId} 0 R >>`
            ),
          ]);
          objects.set(contentId, [
            textBytes(`<< /Length ${contentBytes.length} >>\nstream\n`),
            contentBytes,
            textBytes("endstream"),
          ]);
          objects.set(imageId, [
            textBytes(
              `<< /Type /XObject /Subtype /Image /Width ${image.width} /Height ${image.height} /ColorSpace ${image.colorSpace} /BitsPerComponent ${image.bitsPerComponent} /Filter ${image.filter} /Length ${image.bytes.length} >>\nstream\n`
            ),
            image.bytes,
            textBytes("\nendstream"),
          ]);
        });

        const now = pdfDateString();
        objects.set(catalogId, [textBytes(`<< /Type /Catalog /Pages ${pagesId} 0 R /Lang (ja-JP) >>`)]);
        objects.set(pagesId, [textBytes(`<< /Type /Pages /Count ${pages.length} /Kids [${pageRefs.join(" ")}] >>`)]);
        objects.set(infoId, [
          textBytes(
            `<< /Title ${pdfUtf16HexString(title)} /Author ${pdfUtf16HexString("PocketCV PDF")} /Creator ${pdfUtf16HexString(
              "PocketCV PDF"
            )} /Producer ${pdfUtf16HexString("PocketCV PDF local browser engine")} /CreationDate ${pdfUtf16HexString(
              now
            )} /ModDate ${pdfUtf16HexString(now)} >>`
          ),
        ]);

        const chunks = [textBytes("%PDF-1.4\n")];
        const offsets = [0];
        let byteOffset = chunks[0].length;
        for (let id = 1; id < nextId; id += 1) {
          offsets[id] = byteOffset;
          const header = textBytes(`${id} 0 obj\n`);
          chunks.push(header);
          byteOffset += header.length;

          const body = objects.get(id);
          body.forEach((chunk) => {
            chunks.push(chunk);
            byteOffset += chunk.length;
          });

          const footer = textBytes("\nendobj\n");
          chunks.push(footer);
          byteOffset += footer.length;
        }

        const xrefOffset = byteOffset;
        let xref = `xref\n0 ${nextId}\n0000000000 65535 f \n`;
        for (let id = 1; id < nextId; id += 1) {
          xref += `${String(offsets[id]).padStart(10, "0")} 00000 n \n`;
        }
        xref += `trailer\n<< /Size ${nextId} /Root ${catalogId} 0 R /Info ${infoId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF\n`;
        chunks.push(textBytes(xref));

        return new Blob([concatBytes(chunks)], { type: "application/pdf" });
      }

      async function generatePdf() {
        if (!state.pages.length) {
          return;
        }

        revokePdfUrl();
        setBusy(true);
        setStatus("端末内でPDFを生成中...");
        try {
          const pdfTitle = sanitizePdfName(filenameInput.value);
          const blob = await createPdfBlob(state.pages, pdfTitle);
          if (!blob.size) {
            throw new Error("PDF生成に失敗しました。");
          }

          state.pdfUrl = URL.createObjectURL(blob);
          state.pdfBlob = blob;
          state.pdfName = `${pdfTitle}.pdf`;
          downloadEl.href = state.pdfUrl;
          downloadEl.download = state.pdfName;
          downloadEl.hidden = false;
          shareButton.hidden = false;
          shareButton.disabled = false;
          downloadEl.click();
          setBusy(false);
          setStatus(`PDF生成完了 - ${state.pages.length}件 / ${formatFileSize(blob.size)}`);
        } catch (error) {
          setBusy(false);
          setStatus(error.message || "PDF生成に失敗しました。", true);
        }
      }

      async function sharePdf() {
        if (!state.pdfBlob) {
          setStatus("共有するPDFがありません。", true);
          return;
        }

        const filename = state.pdfName || `${sanitizePdfName(filenameInput.value)}.pdf`;
        if ("share" in navigator && typeof File !== "undefined") {
          const pdfFile = new File([state.pdfBlob], filename, { type: "application/pdf" });
          const shareData = {
            files: [pdfFile],
            title: "PocketCV PDF",
            text: "PocketCV PDFで生成した画像処理レポート",
          };

          if (!navigator.canShare || navigator.canShare(shareData)) {
            try {
              await navigator.share(shareData);
              setStatus("PDF共有を開始しました。");
              return;
            } catch (error) {
              if (error && error.name === "AbortError") {
                setStatus("共有をキャンセルしました。");
                return;
              }
            }
          }
        }

        downloadEl.click();
        setStatus("このブラウザはPDF共有に非対応です。PDFを保存してください。");
      }

      async function registerServiceWorker() {
        if (!("serviceWorker" in navigator)) {
          return;
        }

        try {
          await navigator.serviceWorker.register("sw.js");
        } catch (_error) {
          // Offline support is progressive enhancement; PDF generation still works.
        }
      }

      async function promptInstall() {
        const promptEvent = state.deferredInstallPrompt;
        if (!promptEvent) {
          return;
        }

        promptEvent.prompt();
        try {
          const choice = await promptEvent.userChoice;
          setStatus(choice.outcome === "accepted" ? "アプリ追加を開始しました。" : "追加をキャンセルしました。");
        } catch (_error) {
          setStatus("アプリ追加を完了できませんでした。", true);
        } finally {
          state.deferredInstallPrompt = null;
          updateInstallButton();
        }
      }

      startButton.addEventListener("click", startCamera);
      captureButton.addEventListener("click", capturePage);
      pdfButton.addEventListener("click", generatePdf);
      shareButton.addEventListener("click", sharePdf);
      installButton.addEventListener("click", promptInstall);
      modeEl.addEventListener("change", reprocessPages);

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        state.deferredInstallPrompt = event;
        updateInstallButton();
      });

      window.addEventListener("appinstalled", () => {
        state.deferredInstallPrompt = null;
        updateInstallButton();
        setStatus("アプリを追加しました。");
      });

      window.addEventListener("load", registerServiceWorker);

      clearButton.addEventListener("click", () => {
        state.pages.forEach((page) => URL.revokeObjectURL(page.previewUrl));
        state.pages = [];
        revokePdfUrl();
        refreshPages();
      });

      fileInput.addEventListener("change", async () => {
        const files = Array.from(fileInput.files || []);
        fileInput.value = "";
        for (const file of files) {
          await addBlob(file, file.name || `page-${Date.now()}.jpg`);
        }
      });

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        startButton.disabled = true;
      }

      refreshPages();
    </script>
  </body>
</html>
