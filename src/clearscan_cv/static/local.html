<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PocketCV PDF Local</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1d2733;
        --muted: #657386;
        --line: #d9e0ea;
        --accent: #157f72;
        --warn: #a43b55;
        --paper: #ffffff;
        --shell: #f5f7fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--shell);
        color: var(--ink);
        font-family: "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 24px auto 48px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-end;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 18px;
        align-items: start;
      }

      section {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 18px;
        letter-spacing: 0;
      }

      label {
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      input,
      select,
      button {
        min-height: 42px;
        border-radius: 7px;
        border: 1px solid var(--line);
        padding: 8px 10px;
        font: inherit;
        color: var(--ink);
        background: #ffffff;
      }

      input[type="checkbox"] {
        min-height: 0;
        width: 18px;
        height: 18px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 12px;
        color: var(--ink);
      }

      button {
        cursor: pointer;
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
      }

      button.secondary {
        background: #ffffff;
        color: var(--accent);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .status {
        margin-top: 14px;
        min-height: 24px;
        color: var(--muted);
        font-weight: 700;
      }

      .status.error {
        color: var(--warn);
      }

      .preview {
        width: 100%;
        max-height: 70vh;
        object-fit: contain;
        border: 1px solid var(--line);
        background: #eef2f6;
        display: none;
      }

      .preview.ready {
        display: block;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 10px;
        resize: vertical;
        font: 13px/1.5 Consolas, "Yu Gothic", monospace;
      }

      .downloads {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .downloads a {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 8px 12px;
        border-radius: 7px;
        border: 1px solid var(--accent);
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }

      @media (max-width: 860px) {
        header,
        .grid {
          display: block;
        }

        section {
          margin-bottom: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>PocketCV PDF Local</h1>
          <p>この画面は 127.0.0.1 の FastAPI に画像を送り、Python/OpenCV で処理します。外部サーバーには送信しません。</p>
        </div>
        <button id="health" class="secondary" type="button">API確認</button>
      </header>

      <div class="grid">
        <section>
          <h2>ローカル処理</h2>
          <form id="scan-form">
            <label>
              画像ファイル
              <input id="file" name="file" type="file" accept="image/*" required />
            </label>
            <label>
              出力モード
              <select id="mode" name="mode">
                <option value="auto">おすすめ自動</option>
                <option value="gray">グレースキャン</option>
                <option value="binary">白黒スキャン</option>
                <option value="color">カラー裁切のみ</option>
              </select>
            </label>
            <label>
              OCR 言語
              <select id="ocr-lang" name="ocr_lang">
                <option value="jpn+eng">日本語+英語</option>
                <option value="chi_sim+eng">中国語+英語</option>
                <option value="eng">英語</option>
              </select>
            </label>
            <label class="check"><input id="readability" type="checkbox" checked /> 品質診断</label>
            <label class="check"><input id="ocr" type="checkbox" /> OCR 実行</label>
            <label class="check"><input id="searchable-pdf" type="checkbox" /> OCR 文字層付き PDF</label>
            <label class="check"><input id="docx" type="checkbox" /> DOCX 生成</label>
            <label class="check"><input id="auto-dewarp" type="checkbox" checked /> 軽量 dewarp</label>
            <button id="submit" type="submit">本機でスキャン生成</button>
          </form>
          <div id="status" class="status">待機中</div>
        </section>

        <section>
          <h2>処理結果</h2>
          <img id="preview" class="preview" alt="処理後プレビュー" />
          <div id="downloads" class="downloads"></div>
          <textarea id="report" readonly placeholder="品質レポート / OCR 結果"></textarea>
        </section>
      </div>
    </main>

    <script>
      const form = document.querySelector("#scan-form");
      const fileEl = document.querySelector("#file");
      const modeEl = document.querySelector("#mode");
      const ocrLangEl = document.querySelector("#ocr-lang");
      const readabilityEl = document.querySelector("#readability");
      const ocrEl = document.querySelector("#ocr");
      const searchablePdfEl = document.querySelector("#searchable-pdf");
      const docxEl = document.querySelector("#docx");
      const autoDewarpEl = document.querySelector("#auto-dewarp");
      const submitButton = document.querySelector("#submit");
      const statusEl = document.querySelector("#status");
      const previewEl = document.querySelector("#preview");
      const downloadsEl = document.querySelector("#downloads");
      const reportEl = document.querySelector("#report");
      const healthButton = document.querySelector("#health");

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function base64ToBlob(base64, type) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return new Blob([bytes], { type });
      }

      function addDownload(label, base64, type, filename) {
        if (!base64) {
          return;
        }
        const blob = base64ToBlob(base64, type);
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.textContent = label;
        downloadsEl.appendChild(link);
      }

      function selectedFilename(suffix) {
        const name = (fileEl.files[0] && fileEl.files[0].name ? fileEl.files[0].name : "pocketcv")
          .replace(/\.[^.]+$/, "")
          .replace(/[\\/:*?"<>|]+/g, "-");
        return `${name}${suffix}`;
      }

      async function checkApi() {
        try {
          const response = await fetch("/api/health");
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const payload = await response.json();
          setStatus(`API OK · OCR ${payload.recommended_ocr_engine || "未導入"}`);
          reportEl.value = JSON.stringify(payload, null, 2);
        } catch (error) {
          setStatus(error.message || "API確認に失敗しました。", true);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!fileEl.files.length) {
          setStatus("画像を選択してください。", true);
          return;
        }

        submitButton.disabled = true;
        previewEl.classList.remove("ready");
        previewEl.removeAttribute("src");
        downloadsEl.replaceChildren();
        reportEl.value = "";
        setStatus("本機の Python/OpenCV で処理中...");

        const body = new FormData();
        body.append("file", fileEl.files[0]);
        body.append("mode", modeEl.value);
        body.append("auto_warp", "true");
        body.append("auto_dewarp", autoDewarpEl.checked ? "true" : "false");
        body.append("readability", readabilityEl.checked ? "true" : "false");
        body.append("ocr", ocrEl.checked || searchablePdfEl.checked || docxEl.checked ? "true" : "false");
        body.append("ocr_lang", ocrLangEl.value);
        body.append("searchable_pdf", searchablePdfEl.checked ? "true" : "false");
        body.append("docx", docxEl.checked ? "true" : "false");
        body.append("pdf", "true");

        try {
          const response = await fetch("/api/process", { method: "POST", body });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || `HTTP ${response.status}`);
          }

          previewEl.src = `data:image/png;base64,${payload.image_base64}`;
          previewEl.classList.add("ready");
          addDownload("PNG保存", payload.image_base64, "image/png", selectedFilename("-scan.png"));
          addDownload("PDF保存", payload.pdf_base64, "application/pdf", selectedFilename(".pdf"));
          addDownload("DOCX保存", payload.docx_base64, "application/vnd.openxmlformats-officedocument.wordprocessingml.document", selectedFilename(".docx"));
          reportEl.value = JSON.stringify(
            {
              selected_mode: payload.report && payload.report.selected_mode,
              quality_diagnostics: payload.report && payload.report.quality_diagnostics,
              readability: payload.readability,
              ocr_text: payload.ocr && payload.ocr.text,
              layout_markdown: payload.layout_markdown,
            },
            null,
            2
          );
          const status = payload.report && payload.report.quality_diagnostics && payload.report.quality_diagnostics.status;
          setStatus(`完了 · ${payload.report.selected_mode || modeEl.value} · ${status || "diagnostic"}`);
        } catch (error) {
          setStatus(error.message || "処理に失敗しました。", true);
        } finally {
          submitButton.disabled = false;
        }
      });

      healthButton.addEventListener("click", checkApi);
      checkApi();
    </script>
  </body>
</html>
